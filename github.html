<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD SMC + Fractal Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050709;
            --surface: #090d12;
            --panel: #0b1018;
            --border: #1c2a3a;
            --gold: #f5c842;
            --green: #00e5a0;
            --red: #ff4060;
            --blue: #3de0ff;
            --text: #c8d8e8;
            --muted: #3d5068;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { 
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            transition: all 0.3s;
        }
        .card:hover { border-color: var(--gold); }
        .card-title { font-size: 12px; color: var(--muted); letter-spacing: 2px; margin-bottom: 10px; font-weight: 700; }
        .card-value { font-size: 20px; font-weight: 900; font-family: 'Orbitron'; }
        .bull { color: var(--green); }
        .bear { color: var(--red); }
        .wait { color: var(--blue); }
        .table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .table th, .table td { padding: 8px; text-align: left; border-bottom: 1px solid var(--border); }
        .table th { color: var(--muted); font-weight: 700; }
        .signal-box { 
            background: rgba(245,200,66,0.08);
            border: 1px solid rgba(245,200,66,0.3);
            border-radius: 8px;
            padding: 16px;
            margin: 10px 0;
        }
        .ob-box { background: rgba(168,85,247,0.06); border-left: 4px solid var(--gold); }
        .fvg-box { background: rgba(61,224,255,0.06); border-left: 4px solid var(--blue); }
        .fractal-box { background: rgba(0,229,160,0.06); border-left: 4px solid var(--green); }
        button {
            background: rgba(245,200,66,0.15);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 10px;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        button:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">⚡ XAUUSD SMC + FRACTAL ENGINE</div>

    <!-- Live Price from TradingView -->
    <div class="card" style="background: rgba(245,200,66,0.1); border: 2px solid var(--gold);">
        <div class="card-title">📡 LIVE PRICE (TradingView)</div>
        <div class="card-value gold" id="live-price">Loading...</div>
        <div style="font-size: 10px; color: var(--muted); margin-top: 8px;">
            Ticks: <span id="tick-count">0</span> | Status: <span id="tv-status">Connecting...</span>
        </div>
    </div>

    <!-- TradingView Widget (hidden, for price scraping) -->
    <div id="tv-widget" style="position: absolute; left: -9999px; width: 1px; height: 1px;">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
            {
                "symbol": "OANDA:XAUUSD",
                "width": "100%",
                "colorTheme": "dark",
                "isTransparent": true,
                "locale": "en"
            }
            </script>
        </div>
    </div>

    <!-- Timeframe Selector -->
    <div style="margin-bottom: 20px;">
        <button onclick="selectTF('M1')">M1</button>
        <button onclick="selectTF('M5')">M5</button>
        <button onclick="selectTF('M15')">M15</button>
        <button onclick="selectTF('M30')">M30</button>
        <button onclick="selectTF('H1')">H1</button>
        <button onclick="runAnalysis()" style="margin-left: 20px; background: linear-gradient(135deg, var(--gold), #e8a020);">
            🔄 ANALYZE
        </button>
    </div>

    <!-- Results Grid -->
    <div class="grid" id="results-grid"></div>

    <!-- Detailed Analysis Panel -->
    <div class="card" style="margin-top: 30px;">
        <div class="header" style="margin: 0 0 20px 0; font-size: 16px;">📊 DETAILED ANALYSIS</div>
        <div id="analysis-panel"></div>
    </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// CORE ENGINE: Price History + OHLCV Building
// ════════════════════════════════════════════════════════════════

window._priceHistory = [];
window._activeTF = 'M5';
const MAX_TICKS = 200000;
const TF_SECONDS = { M1: 60, M3: 180, M5: 300, M15: 900, M30: 1800, H1: 3600 };

// Price recording
function recordPrice(price) {
    if (!price || price < 1000 || price > 20000) return;
    window._priceHistory.push({ price, time: Date.now() });
    if (window._priceHistory.length > MAX_TICKS) window._priceHistory.shift();
    document.getElementById('tick-count').textContent = window._priceHistory.length;
}

// Build candles from ticks
function buildCandles(tf) {
    const tfMs = TF_SECONDS[tf] * 1000;
    const buckets = new Map();
    
    for (const tick of window._priceHistory) {
        const key = Math.floor(tick.time / tfMs) * tfMs;
        const b = buckets.get(key);
        if (!b) {
            buckets.set(key, { 
                open: tick.price, high: tick.price, low: tick.price, close: tick.price, 
                time: key, volume: 1 
            });
        } else {
            b.high = Math.max(b.high, tick.price);
            b.low = Math.min(b.low, tick.price);
            b.close = tick.price;
            b.volume++;
        }
    }
    
    return Array.from(buckets.values()).sort((a, b) => a.time - b.time);
}

// ════════════════════════════════════════════════════════════════
// SMC ENGINE: Order Blocks, FVG, Fractals
// ════════════════════════════════════════════════════════════════

function findOrderBlocks(candles) {
    const obs = [];
    for (let i = 5; i < candles.length - 2; i++) {
        // Bullish OB: Last bearish candle before strong bullish move
        if (candles[i].close < candles[i].open && // bearish
            candles[i+1].close > candles[i].open && // strong bullish
            candles[i+2].close > candles[i+1].close) {
            obs.push({
                type: 'BULL',
                high: Math.max(candles[i].high, candles[i].low),
                low: Math.min(candles[i].high, candles[i].low),
                index: i
            });
        }
        // Bearish OB: Last bullish candle before strong bearish move
        if (candles[i].close > candles[i].open && // bullish
            candles[i+1].close < candles[i].open && // strong bearish
            candles[i+2].close < candles[i+1].close) {
            obs.push({
                type: 'BEAR',
                high: Math.max(candles[i].high, candles[i].low),
                low: Math.min(candles[i].high, candles[i].low),
                index: i
            });
        }
    }
    return obs.slice(-3); // Last 3 blocks
}

function findFVG(candles) {
    const fvgs = [];
    for (let i = 1; i < candles.length - 1; i++) {
        // Bullish FVG: gap up, no trade between candles
        if (candles[i].low > candles[i-1].high) {
            fvgs.push({
                type: 'BULL',
                top: candles[i].low,
                bottom: candles[i-1].high,
                index: i
            });
        }
        // Bearish FVG: gap down
        if (candles[i].high < candles[i-1].low) {
            fvgs.push({
                type: 'BEAR',
                top: candles[i-1].low,
                bottom: candles[i].high,
                index: i
            });
        }
    }
    return fvgs.slice(-3);
}

function findFractals(candles) {
    const fracs = [];
    for (let i = 2; i < candles.length - 2; i++) {
        // Up fractal
        if (candles[i].high > candles[i-1].high && candles[i].high > candles[i-2].high &&
            candles[i].high > candles[i+1].high && candles[i].high > candles[i+2].high) {
            fracs.push({ type: 'UP', price: candles[i].high, index: i });
        }
        // Down fractal
        if (candles[i].low < candles[i-1].low && candles[i].low < candles[i-2].low &&
            candles[i].low < candles[i+1].low && candles[i].low < candles[i+2].low) {
            fracs.push({ type: 'DOWN', price: candles[i].low, index: i });
        }
    }
    return fracs.slice(-2);
}

// ════════════════════════════════════════════════════════════════
// DECISION LOGIC: Per-Indicator Analysis
// ════════════════════════════════════════════════════════════════

function analyzeCandles(candles) {
    if (candles.length < 20) return null;
    
    const price = candles[candles.length - 1].close;
    const closes = candles.map(c => c.close);
    const highs = candles.map(c => c.high);
    const lows = candles.map(c => c.low);
    
    const results = {
        price,
        indicators: {},
        smcSignals: {},
        finalDecision: 'WAIT',
        entry: null,
        sl: null,
        tp: null
    };
    
    // ── EMA Trend ──
    const ema9 = closes.slice(-9).reduce((a,b) => a+b) / 9;
    const ema21 = closes.slice(-21).reduce((a,b) => a+b) / 21;
    const ema50 = closes.slice(-Math.min(50, closes.length)).reduce((a,b) => a+b) / Math.min(50, closes.length);
    
    if (ema9 > ema21 && ema21 > ema50) results.indicators.EMA = 'BUY';
    else if (ema9 < ema21 && ema21 < ema50) results.indicators.EMA = 'SELL';
    else results.indicators.EMA = 'WAIT';
    
    // ── RSI ──
    let gains = 0, losses = 0;
    for (let i = closes.length - 14; i < closes.length; i++) {
        const d = closes[i] - closes[i-1];
        if (d > 0) gains += d;
        else losses -= d;
    }
    const rsi = 100 - 100 / (1 + (gains/14) / (losses/14 + 0.001));
    if (rsi > 60) results.indicators.RSI = 'BUY';
    else if (rsi < 40) results.indicators.RSI = 'SELL';
    else results.indicators.RSI = 'WAIT';
    
    // ── SMC: Order Blocks ──
    const obs = findOrderBlocks(candles);
    if (obs.length > 0) {
        const lastOB = obs[obs.length - 1];
        if (lastOB.type === 'BULL' && price > lastOB.low && price < lastOB.high) {
            results.smcSignals.OB = { signal: 'BUY', reason: 'Price in Bullish OB' };
        } else if (lastOB.type === 'BEAR' && price > lastOB.low && price < lastOB.high) {
            results.smcSignals.OB = { signal: 'SELL', reason: 'Price in Bearish OB' };
        }
    }
    
    // ── SMC: FVG ──
    const fvgs = findFVG(candles);
    if (fvgs.length > 0) {
        const lastFVG = fvgs[fvgs.length - 1];
        if (lastFVG.type === 'BULL' && price < lastFVG.bottom) {
            results.smcSignals.FVG = { signal: 'BUY', reason: 'Price approaching Bullish FVG' };
        } else if (lastFVG.type === 'BEAR' && price > lastFVG.top) {
            results.smcSignals.FVG = { signal: 'SELL', reason: 'Price approaching Bearish FVG' };
        }
    }
    
    // ── SMC: Fractals ──
    const fracs = findFractals(candles);
    if (fracs.length >= 2) {
        const lastUp = fracs.filter(f => f.type === 'UP').slice(-1)[0];
        const lastDown = fracs.filter(f => f.type === 'DOWN').slice(-1)[0];
        
        if (lastUp && lastDown) {
            if (lastUp.index > lastDown.index && price > lastDown.price) {
                results.smcSignals.Fractal = { signal: 'BUY', reason: 'Bullish Fractal confirmed' };
            } else if (lastDown.index > lastUp.index && price < lastUp.price) {
                results.smcSignals.Fractal = { signal: 'SELL', reason: 'Bearish Fractal confirmed' };
            }
        }
    }
    
    // ── FINAL DECISION ──
    // All indicators must AGREE (not vote-based)
    const buySignals = Object.values(results.indicators).filter(s => s === 'BUY').length;
    const sellSignals = Object.values(results.indicators).filter(s => s === 'SELL').length;
    const smcBuy = Object.values(results.smcSignals).filter(s => s?.signal === 'BUY').length;
    const smcSell = Object.values(results.smcSignals).filter(s => s?.signal === 'SELL').length;
    
    if (buySignals >= 2 && smcBuy >= 1) {
        results.finalDecision = 'BUY';
        results.entry = price;
        results.sl = price - (ema9 - ema21) * 2;
        results.tp = price + (ema9 - ema21) * 4;
    } else if (sellSignals >= 2 && smcSell >= 1) {
        results.finalDecision = 'SELL';
        results.entry = price;
        results.sl = price + (ema21 - ema9) * 2;
        results.tp = price - (ema21 - ema9) * 4;
    }
    
    return results;
}

// ════════════════════════════════════════════════════════════════
// TRADINGVIEW PRICE SCRAPING
// ════════════════════════════════════════════════════════════════

function getTVPrice() {
    try {
        const iframe = document.querySelector('.tradingview-widget-container iframe');
        if (!iframe) return null;
        
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        const spans = doc.querySelectorAll('span');
        
        for (const span of spans) {
            const text = span.textContent.match(/[\d]{4}\.[\d]{2,}/);
            if (text) {
                const price = parseFloat(text[0]);
                if (price > 1000 && price < 20000) return price;
            }
        }
    } catch(e) {}
    return null;
}

function startPriceFeed() {
    setInterval(() => {
        const price = getTVPrice();
        if (price) {
            recordPrice(price);
            document.getElementById('live-price').textContent = price.toFixed(2);
            document.getElementById('tv-status').textContent = '✅ Live';
        }
    }, 1000);
}

// ════════════════════════════════════════════════════════════════
// UI RENDERING
// ════════════════════════════════════════════════════════════════

function selectTF(tf) {
    window._activeTF = tf;
    document.querySelectorAll('button').forEach(b => {
        b.style.opacity = b.textContent === tf ? '1' : '0.6';
    });
}

function runAnalysis() {
    const candles = buildCandles(window._activeTF);
    if (!candles || candles.length < 20) {
        alert(`Need more data for ${window._activeTF}`);
        return;
    }
    
    const analysis = analyzeCandles(candles);
    renderResults(analysis);
}

function renderResults(analysis) {
    const grid = document.getElementById('results-grid');
    
    // Decision Card
    const decisionColor = analysis.finalDecision === 'BUY' ? '--green' : 
                         analysis.finalDecision === 'SELL' ? '--red' : '--blue';
    
    grid.innerHTML = `
        <div class="card" style="border: 2px solid var(${decisionColor});">
            <div class="card-title">DECISION</div>
            <div class="card-value" style="color: var(${decisionColor});">${analysis.finalDecision}</div>
        </div>
        <div class="card">
            <div class="card-title">ENTRY</div>
            <div class="card-value gold">${analysis.entry?.toFixed(2) || '—'}</div>
        </div>
        <div class="card">
            <div class="card-title">STOP LOSS</div>
            <div class="card-value red">${analysis.sl?.toFixed(2) || '—'}</div>
        </div>
        <div class="card">
            <div class="card-title">TAKE PROFIT</div>
            <div class="card-value green">${analysis.tp?.toFixed(2) || '—'}</div>
        </div>
    `;
    
    // Detailed Panel
    let html = '<table class="table"><tr><th>INDICATOR</th><th>SIGNAL</th></tr>';
    
    for (const [ind, sig] of Object.entries(analysis.indicators)) {
        const sigClass = sig === 'BUY' ? 'bull' : sig === 'SELL' ? 'bear' : 'wait';
        html += `<tr><td>${ind}</td><td class="${sigClass}">${sig}</td></tr>`;
    }
    
    html += '</table><h3 style="margin-top: 20px; color: var(--gold);">📊 SMC SIGNALS</h3>';
    
    for (const [smc, data] of Object.entries(analysis.smcSignals)) {
        const sigClass = data.signal === 'BUY' ? 'bull' : 'bear';
        html += `<div class="signal-box"><strong>${smc}:</strong> <span class="${sigClass}">${data.signal}</span> - ${data.reason}</div>`;
    }
    
    document.getElementById('analysis-panel').innerHTML = html;
}

// Start
startPriceFeed();
</script>
</body>
</html>
