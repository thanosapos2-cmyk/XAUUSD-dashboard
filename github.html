<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>XAUUSD SMC FVG FRACTAL Engine</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body { background: #050709; color: #d2dde8; font-family: 'Share Tech Mono', monospace; margin:0; padding:0; }
h1 { font-family: 'Orbitron',sans-serif; color: #f5c842; letter-spacing:4px;}
.engine-table { width:100%; border-collapse:collapse; background:#0b1018; margin-bottom:30px;}
.engine-table th, .engine-table td { border:1px solid #1c2a3a; padding:8px 10px; font-size:12px; text-align:left;}
.engine-table th { background: #101826; color: #f5c842; font-family:'Orbitron',sans-serif; font-size:12px;}
.engine-table .buy   { color:#00e5a0; font-weight:bold;}
.engine-table .sell  { color:#ff4060; font-weight:bold;}
.engine-table .wait  { color:#3de0ff; font-weight:bold;}
.engine-table td:last-child { font-family:'Orbitron',monospace; }
.stat { display:inline-block; min-width:98px;}
.timeframe-label { color:#f5c842; font-size:16px; font-family:'Orbitron',sans-serif; }
</style>
</head>
<body>
  <h1>XAUUSD PRO – SMC/FVG/FRACTAL Engine</h1>
  <div id="tv-widget-container" style="margin-bottom:18px;">
    <!-- TradingView Single Quote widget for scrape-tick feed -->
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async defer>
      {
        "symbol": "OANDA:XAUUSD",
        "width": "300",
        "colorTheme": "dark",
        "isTransparent": true,
        "locale": "en"
      }
      </script>
    </div>
  </div>
  <div id="tick-status" style="font-family:'Share Tech Mono',monospace; color:#f5c842;margin-bottom:8px;">Ticks: 0 / 200,000</div>
  <div id="smc-tables"></div>
  <script>
    // -------- Οι μοναδικές σου global μεταβλητές --------
    window._ticks    = []; // {price, time}
    const MAX_TICKS  = 200000;
    const TIMEFRAMES = {M1:60, M3:180, M5:300, M15:900, M30:1800, M45:2700, H1:3600};

    // ---------- 1. Real-time τιμή από TradingView iframe (scrape) ----------
    function pollTV() {
      try {
        const tv = document.querySelector('.tradingview-widget-container iframe');
        if (!tv) { setTimeout(pollTV,1000); return; }
        let lastPrice = 0;
        setInterval(() => {
          try {
            const doc = tv.contentDocument || tv.contentWindow.document;
            const el = doc.querySelector('[class*="price"]');
            if (el && el.textContent) {
              const price = parseFloat(el.textContent.replace(/[^\d.]/g,''));
              if (price && price > 1000 && price < 30000) {
                // -- Record tick --
                if (!window._ticks.length || price !== lastPrice) {
                  window._ticks.push({price, time: Date.now()});
                  lastPrice = price;
                  if (window._ticks.length > MAX_TICKS) window._ticks.shift();
                  document.getElementById('tick-status').textContent = 
                    'Ticks: ' + window._ticks.length + ' / ' + MAX_TICKS + 
                    ' | Last: ' + price.toFixed(2);
                  runSMCEngine();
                }
              }
            }
          } catch(e){}
        }, 1000);
      } catch(e){
        setTimeout(pollTV,1000);
      }
    }
    setTimeout(pollTV, 3000);

    // ---------- 2. Candle builder for each TF ----------
    function buildCandles(tf) {
      const ms = TIMEFRAMES[tf]*1000, arr = window._ticks;
      if (!arr.length) return [];
      const buckets = new Map();
      for (let t of arr) {
        const k = Math.floor(t.time / ms) * ms;
        const b = buckets.get(k) || {open:t.price,close:t.price,low:t.price,high:t.price,vol:1,time:k};
        b.close = t.price; b.vol++; if(t.price<b.low) b.low=t.price; if(t.price>b.high) b.high=t.price;
        buckets.set(k, b);
      }
      return [...buckets.values()].sort((a,b)=>a.time-b.time);
    }

    // ---------- 3. SMC - Order Block finder -----------
    function findOrderBlocks(candles) {
      // Πολύ απλή: Bullish όταν αυτό το bearish candle ακολουθείται από συγκριτικό strong bullish move
      // Bearish το ανάποδο
      const obs = [];
      for(let i=2;i<candles.length-2;i++) {
        // Bullish OB: last bearish candle before a big bullish candle
        if(candles[i].close < candles[i].open &&
           candles[i+1].close > candles[i+1].open &&
           candles[i+1].close > candles[i].open+((candles[i].open-candles[i].close)*1.5)) {
          obs.push({type:'BULL OB', price:candles[i].low, idx:i});
        }
        // Bearish OB: last bullish candle before a big bearish move
        if(candles[i].close > candles[i].open &&
           candles[i+1].close < candles[i+1].open &&
           candles[i+1].close < candles[i].open-((candles[i].close-candles[i].open)*1.5)) {
          obs.push({type:'BEAR OB', price:candles[i].high, idx:i});
        }
      }
      return obs.slice(-2); // Μεχρι 2 ανά TF
    }

    // ---------- 4. FVG - Fair Value Gap finder ----------
    function findFVGs(candles) {
      // FVG: gap between last 3 candles, bull if c3.low > c1.high, bear if c3.high < c1.low
      const fvg = [];
      for(let i=2;i<candles.length;i++) {
        const c1=candles[i-2], c2=candles[i-1], c3=candles[i];
        if (c3.low > c1.high)   fvg.push({type:'BULL FVG', price:c1.high, idx:i});
        if (c3.high < c1.low)   fvg.push({type:'BEAR FVG', price:c1.low,  idx:i});
      }
      return fvg.slice(-2);
    }

    // ---------- 5. Βρες σημαντικά fractal swings (5-bar) ----------
    function findFractals(candles) {
      const hi =[], lo=[];
      for(let i=2;i<candles.length-2;i++) {
        if(  candles[i].high > candles[i-2].high && candles[i].high > candles[i-1].high
          && candles[i].high > candles[i+1].high && candles[i].high > candles[i+2].high)
          hi.push({idx:i, price:candles[i].high});
        if(  candles[i].low  < candles[i-2].low  && candles[i].low  < candles[i-1].low
          && candles[i].low  < candles[i+1].low  && candles[i].low  < candles[i+2].low)
          lo.push({idx:i, price:candles[i].low});
      }
      return {hi,lo};
    }

    // ---------- 6. Fractal Pattern Similarity Forecast ----------
    function fractalSimilarityForecast(closes) {
      if (closes.length < 25) return {dir:'WAIT', target:null, conf:0};
      // last 10 as pattern, scan whole history for most similar, what happened after
      const pattern = closes.slice(-10);
      let bestScore=99, bestIdx=null, afterMove=0;
      for(let i=0;i<closes.length-20;i++){
        const window = closes.slice(i,i+10);
        let score = 0, dsum = 0;
        for(let j=1;j<10;j++) dsum += Math.abs(window[j]-window[j-1]-(pattern[j]-pattern[j-1]));
        score = dsum/10;
        if(score < bestScore) { bestScore=score; bestIdx=i; }
      }
      if(bestIdx!==null && closes[bestIdx+15]) {
        afterMove = closes[bestIdx+15]-closes[bestIdx+9];
      }
      return {
        dir: afterMove>0 ? 'BUY' : afterMove<0 ? 'SELL' : 'WAIT',
        target: afterMove ? closes[closes.length-1] + afterMove : null,
        conf:Math.max(0,90-bestScore*40)
      }
    }

    // ---------- 7. Entry logic per indicator (strict, όχι συνδυασμός score) ----------
    function evaluateEntry(obs, fvgs, fractal, lastPrice) {
      // -- Κάθε δείκτης πρέπει να πληρεί τα δικά του σκληρά κριτήρια --
      let obDir = "WAIT", obAt = 0;
      if(obs.some(o=>o.type==='BULL OB' && lastPrice>=o.price)) obDir="BUY", obAt=obs.find(o=>o.type==='BULL OB').price;
      if(obs.some(o=>o.type==='BEAR OB' && lastPrice<=o.price)) obDir="SELL", obAt=obs.find(o=>o.type==='BEAR OB').price;

      let fvgDir = "WAIT", fvgAt=0;
      if(fvgs.some(f=>f.type==='BULL FVG' && lastPrice>=f.price)) fvgDir="BUY", fvgAt=fvgs.find(f=>f.type==='BULL FVG').price;
      if(fvgs.some(f=>f.type==='BEAR FVG' && lastPrice<=f.price)) fvgDir="SELL", fvgAt=fvgs.find(f=>f.type==='BEAR FVG').price;

      // Pattern forecast
      let fracDir = fractal.dir, fracTgt = fractal.target, fracConf=fractal.conf;

      // --- Για να έχουμε entry: και οι 3 δείκτες (OB, FVG, fractal) πρέπει να συμφωνούν ---
      if(obDir==="BUY" && fvgDir==="BUY" && fracDir==="BUY") return {entry:"BUY", entryPoint:lastPrice, stop:obAt||fvgAt, target:fracTgt, conf:fracConf};
      if(obDir==="SELL" && fvgDir==="SELL" && fracDir==="SELL") return {entry:"SELL", entryPoint:lastPrice, stop:obAt||fvgAt, target:fracTgt, conf:fracConf};
      return {entry:"WAIT", entryPoint:"—", stop:"—", target:"—", conf:0};
    }

    // ---------- 8. Κύρια μηχανή/πίνακας ανά TF ----------
    function runSMCEngine() {
      const tfs = Object.keys(TIMEFRAMES);
      let html = '';
      for(let tf of tfs) {
        const candles = buildCandles(tf);
        if (candles.length < 25) {
          html += `<div><span class="timeframe-label">${tf}</span> : Συλλογή δεδο��ένων (${candles.length} candles)...</div>`;
          continue;
        }
        // SMC blocks, FVGs, fractal forecast
        const ob   = findOrderBlocks(candles);
        const fvg  = findFVGs(candles);
        const frac = findFractals(candles);
        const closes = candles.map(c=>c.close);
        const fractalSim = fractalSimilarityForecast(closes);

        // Entry eval (strict agreement)
        const res = evaluateEntry(ob, fvg, fractalSim, closes[closes.length-1]);

        html += `<table class="engine-table">
        <tr><th colspan=6 style="text-align:left;font-size:14px;">${tf} timeframe</th></tr>
        <tr>
        <th>Last price</th>
        <th>Order Block</th>
        <th>FVG</th>
        <th>Fractal Sim.</th>
        <th>ENTRY DECISION</th>
        <th>SL/TP</th>
        </tr>
        <tr>
        <td>${closes[closes.length-1].toFixed(2)}</td>
        <td>${ob.map(o=>o.type+': '+o.price.toFixed(2)).join('<br>')||'—'}</td>
        <td>${fvg.map(f=>f.type+': '+f.price.toFixed(2)).join('<br>')||'—'}</td>
        <td>${fractalSim.dir} → ${fractalSim.target?fractalSim.target.toFixed(2):'—'}<br>Conf:${fractalSim.conf}%</td>
        <td class="${res.entry==='BUY'?'buy':res.entry==='SELL'?'sell':'wait'}">${res.entry}</td>
        <td>
          SL:${res.stop!=="—"?(res.entry==='BUY'?('<span style=color:#ff4060;>'+(res.entryPoint-res.stop).toFixed(2)+'</span>'):(res.entry==='SELL'?('<span style=color:#ff4060;>'+(res.stop-res.entryPoint).toFixed(2)+'</span>'):''):'—'}<br>
          TP:${res.target&&res.target!=="—"?('<span style=color:#00e5a0;>'+res.target.toFixed(2)+'</span>'):'—'}
        </td>
        </tr></table>`;
      }
      document.getElementById('smc-tables').innerHTML = html;
    }
  </script>
</body>
</html>
