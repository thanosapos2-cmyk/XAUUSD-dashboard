<script>
// ======== TICK HISTORY ENGINE ========
const TF_MAP = {M1:60,M3:180,M5:300,M15:900,M30:1800,M45:2700,H1:3600}; // sec
const tfs   = ["M1","M3","M5","M15","M30","M45","H1"];
const MAX_TICKS = 200000;

window._priceHistory = [];
window._totalTicksEver = 0;
window._activeTF = "M5";

// --- TradingView price scraping ---
function startTVPriceScrape() {
  setInterval(()=>{
    const wrap = document.querySelector('.tradingview-widget-container');
    if (!wrap) return;
    const allSpans = wrap.querySelectorAll('span, div');
    for(const el of allSpans){
      const txt = el.textContent.trim().replace(/,/g,'');
      const val = parseFloat(txt);
      if(val>1000&&val<20000&&txt.includes('.')){
        recordPrice(val);
        updatePriceDisplay(val);
        break;
      }
    }
  }, 1000);
}
function updatePriceDisplay(val) {
  const el = document.getElementById('live-price');
  if(el) el.textContent = val?val.toFixed(2):"";
  const dot = document.getElementById('tick-dot');
  if (dot) {
    dot.style.background = "#00e598";
    setTimeout(()=>{dot.style.background="#333";},650);
  }
}

// --- RECORD ---
function recordPrice(price) {
  if (!price || price < 1000) return;
  window._priceHistory.push({price: price, time: Date.now()});
  window._totalTicksEver++;
  if (window._priceHistory.length > MAX_TICKS) window._priceHistory.shift();
  document.getElementById('history-tick-count').textContent = window._priceHistory.length.toLocaleString('el-GR');
}

// --- OHLCV ENGINE PER TF ---
function buildCandlesFromHistory(tf) {
  const history = window._priceHistory;
  if (history.length < 10) return null;
  const tfMs = (TF_MAP[tf] || 300)*1000;
  const bucketMap = new Map();
  for (let i = 0; i < history.length; i++) {
    const tick = history[i];
    const key = Math.floor(tick.time / tfMs) * tfMs;
    const b = bucketMap.get(key);
    if (!b) { bucketMap.set(key, {open: tick.price, high: tick.price, low: tick.price, close: tick.price, time: key}); }
    else {
      if (tick.price > b.high) b.high = tick.price;
      if (tick.price < b.low) b.low = tick.price;
      b.close = tick.price;
    }
  }
  return Array.from(bucketMap.values()).sort((a, b) => a.time - b.time);
}

// ======== SMC ORDER BLOCK DETECTION ========
function detectOrderBlocks(candles, minSize=4) {
  // Bullish: last down candle before strong up move, Bearish: το ανάποδο
  if (!candles || candles.length < minSize+4) return [];
  const obs = [];
  for (let i = 2; i < candles.length - 4; i++) {
    const c = candles[i], next2 = candles[i+1], after = candles[i+2];
    // Bullish OB condition: down, then up candles with range + next close > OB high
    if ((c.close < c.open) && (next2.close > next2.open) && after.close > c.high) {
      obs.push({idx: i, type: "BULL", price: c.low, label:"Bull OB"});
    }
    // Bearish OB: up, then down, next close < OB low
    else if ((c.close > c.open) && (next2.close < next2.open) && after.close < c.low) {
      obs.push({idx: i, type: "BEAR", price: c.high, label:"Bear OB"});
    }
  }
  return obs.slice(-5); // τελευταια 5 μόνο
}

// ======== FVG DETECTOR ========
function detectFVG(candles) {
  if (!candles || candles.length < 4) return [];
  const fvg = [];
  for (let i = 2; i < candles.length; i++) {
    const c1 = candles[i-2], c2 = candles[i-1], c3 = candles[i];
    // Bullish FVG: c3.low > c1.high   || Bearish: c3.high < c1.low
    if (c1 && c3) {
      if (c3.low > c1.high) fvg.push({idx:i,type:"BULL",price:c3.low,label:"Bull FVG"});
      if (c3.high < c1.low) fvg.push({idx:i,type:"BEAR",price:c3.high,label:"Bear FVG"});
    }
  }
  return fvg.slice(-5);
}

// ======== FRACTAL PATTERN SIMILARITY ========
function findSwingPoints(highs, lows, minStrength=3) {
  const n = highs.length, swings=[];
  for(let i=minStrength; i<n-minStrength; i++){
    let isHigh = true, isLow = true;
    for(let j=1;j<=minStrength;j++){
      if(highs[i]<=highs[i-j]||highs[i]<=highs[i+j])isHigh=false;
      if(lows[i]>=lows[i-j]||lows[i]>=lows[i+j])isLow=false;
    }
    if(isHigh) swings.push({idx:i,price:highs[i],type:'H'});
    if(isLow)  swings.push({idx:i,price:lows[i],type:'L'});
  }
  return swings;
}
// Pattern repetition & projection
function findPatternRepetition(closes, lookback=10, historyLen=180) {
  if (closes.length < lookback + historyLen + 12) return null;
  const recent = closes.slice(-lookback);
  const recentNorm = [];
  for (let i = 1; i < recent.length; i++) recentNorm.push((recent[i]-recent[i-1])/recent[i-1]*100);
  const recentMean = recentNorm.reduce((a,b)=>a+b,0)/recentNorm.length;
  const recentStd  = Math.sqrt(recentNorm.reduce((s,v)=>s+(v-recentMean)**2,0)/recentNorm.length)||0.001;
  let best=null, bestScore=1e9, bestMove=0;
  for (let s=closes.length-lookback-historyLen-12; s<closes.length-lookback-12; s++){
    const window = closes.slice(s, s+lookback);
    const windowNorm=[];
    for(let i=1;i<window.length;i++)windowNorm.push((window[i]-window[i-1])/window[i-1]*100);
    const winMean=windowNorm.reduce((a,b)=>a+b,0)/windowNorm.length;
    const winStd=Math.sqrt(windowNorm.reduce((s,v)=>s+(v-winMean)**2,0)/windowNorm.length)||0.001;
    let diff=0;
    for (let i=0;i<recentNorm.length;i++){
      const rn = (recentNorm[i]-recentMean)/recentStd;
      const wn = (windowNorm[i]-winMean)/winStd;
      diff+=(rn-wn)**2;
    }
    const score=Math.sqrt(diff/recentNorm.length);
    if(score<bestScore){
      bestScore=score;
      const after=closes.slice(s+lookback,s+lookback+8);
      bestMove=(after.length>=2)?((after[after.length-1]-after[0])/after[0]*100):0;
      best={score,bestMove};
    }
  }
  // Clamp similarity scale 0(best)-2(worst) to 100-0
  const similarity = Math.max(0,Math.min(100,100-bestScore*63))|0;
  return best?{similarity,direction:best.bestMove>0?"UP":"DOWN",projected:best.bestMove.toFixed(2)+"%"}:null;
}
