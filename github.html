<script>
// ══════════════════════════════════════════════════════════════
// SMC + FRACTALS TRADING SYSTEM
// ══════════════════════════════════════════════════════════════

// GLOBALS
let priceHistory = []; // [{price, time}]
let lastPrice = 3200;
let selectedTF = 'M1';
const TF_SECONDS = { M1: 60, M5: 300, M15: 900, M30: 1800, H1: 3600 };
const MAX_TICKS = 70000;

// ══════════════════════════════════════════════════════════════
// 1. LOAD & SAVE TICKS
// ══════════════════════════════════════════════════════════════

function loadTicks() {
  try {
    const saved = localStorage.getItem('xau_ticks');
    if (saved) {
      const ticks = JSON.parse(saved);
      const oneDayAgo = Date.now() - 86400000;
      priceHistory = ticks.filter(t => t.time > oneDayAgo);
      console.log(`✅ Loaded ${priceHistory.length} ticks from storage`);
    }
  } catch(e) { console.warn('Load error:', e); }
}

function saveTicks() {
  try {
    const oneDayAgo = Date.now() - 86400000;
    const recent = priceHistory.filter(t => t.time > oneDayAgo);
    localStorage.setItem('xau_ticks', JSON.stringify(recent));
    localStorage.setItem('xau_ticks_ts', Date.now().toString());
  } catch(e) {}
}

function recordTick(price) {
  if (!price || price < 1000 || price > 20000) return;
  
  priceHistory.push({ price, time: Date.now() });
  lastPrice = price;
  
  // Keep memory bounded
  if (priceHistory.length > MAX_TICKS) {
    priceHistory.shift();
  }
  
  // Save every 30 ticks
  if (priceHistory.length % 30 === 0) {
    saveTicks();
  }
  
  updateUI();
}

// ══════════════════════════════════════════════════════════════
// 2. BUILD CANDLES FROM TICKS
// ══════════════════════════════════════════════════════════════

function buildCandles(tf) {
  if (priceHistory.length < 2) return null;
  
  const tfMs = TF_SECONDS[tf] * 1000;
  const candles = {};
  
  for (const tick of priceHistory) {
    const bucket = Math.floor(tick.time / tfMs) * tfMs;
    
    if (!candles[bucket]) {
      candles[bucket] = {
        time: bucket,
        open: tick.price,
        high: tick.price,
        low: tick.price,
        close: tick.price,
        volume: 1
      };
    } else {
      candles[bucket].high = Math.max(candles[bucket].high, tick.price);
      candles[bucket].low = Math.min(candles[bucket].low, tick.price);
      candles[bucket].close = tick.price;
      candles[bucket].volume++;
    }
  }
  
  return Object.values(candles).sort((a, b) => a.time - b.time);
}

// ══════════════════════════════════════════════════════════════
// 3. FRACTAL DETECTION
// ══════════════════════════════════════════════════════════════

function findFractals(highs, lows) {
  const n = highs.length;
  if (n < 5) return { up: null, down: null };
  
  let upFrac = null, downFrac = null;
  
  for (let i = 2; i < n - 2; i++) {
    // Bullish fractal: high is highest in 5-candle window
    if (highs[i] > highs[i-1] && highs[i] > highs[i-2] &&
        highs[i] > highs[i+1] && highs[i] > highs[i+2]) {
      upFrac = { idx: i, price: highs[i] };
    }
    // Bearish fractal: low is lowest in 5-candle window
    if (lows[i] < lows[i-1] && lows[i] < lows[i-2] &&
        lows[i] < lows[i+1] && lows[i] < lows[i+2]) {
      downFrac = { idx: i, price: lows[i] };
    }
  }
  
  return { up: upFrac, down: downFrac };
}

// ══════════════════════════════════════════════════════════════
// 4. ORDER BLOCKS (SMC)
// ══════════════════════════════════════════════════════════════

function findOrderBlocks(candles) {
  if (!candles || candles.length < 10) return [];
  
  const obs = [];
  const n = candles.length;
  
  for (let i = n - 10; i < n - 2; i++) {
    const current = candles[i];
    const next = candles[i + 1];
    const lastPrice = candles[n-1].close;
    
    // Bullish OB: strong bullish candle after bearish (mitigated if price breaks below)
    if (current.close < current.open && next.close > next.open) {
      const obLow = Math.min(current.low, next.low);
      const obHigh = Math.max(current.high, next.high);
      const isMitigated = lastPrice < obLow;
      
      obs.push({
        type: 'BULL_OB',
        level: (obLow + obHigh) / 2,
        lowbound: obLow,
        highbound: obHigh,
        mitigated: isMitigated,
        candles: [i, i+1]
      });
    }
    
    // Bearish OB: strong bearish candle after bullish
    if (current.close > current.open && next.close < next.open) {
      const obLow = Math.min(current.low, next.low);
      const obHigh = Math.max(current.high, next.high);
      const isMitigated = lastPrice > obHigh;
      
      obs.push({
        type: 'BEAR_OB',
        level: (obLow + obHigh) / 2,
        lowbound: obLow,
        highbound: obHigh,
        mitigated: isMitigated,
        candles: [i, i+1]
      });
    }
  }
  
  return obs.slice(-3); // Return last 3
}

// ══════════════════════════════════════════════════════════════
// 5. FAIR VALUE GAPS (FVG)
// ══════════════════════════════════════════════════════════════

function findFVGs(candles) {
  if (!candles || candles.length < 3) return [];
  
  const fvgs = [];
  const n = candles.length;
  
  for (let i = n - 20; i < n - 2; i++) {
    if (i < 0) continue;
    
    const c1 = candles[i];
    const c2 = candles[i + 1];
    const c3 = candles[i + 2];
    
    // Bullish FVG: gap between c1.high and c3.low
    if (c1.high < c3.low) {
      const gap = { top: c3.low, bottom: c1.high };
      const lastPrice = candles[n-1].close;
      const isFilled = lastPrice <= gap.bottom;
      
      fvgs.push({
        type: 'BULL_FVG',
        top: gap.top,
        bottom: gap.bottom,
        filled: isFilled,
        candles: [i, i+1, i+2]
      });
    }
    
    // Bearish FVG: gap between c3.high and c1.low
    if (c3.high < c1.low) {
      const gap = { top: c1.low, bottom: c3.high };
      const lastPrice = candles[n-1].close;
      const isFilled = lastPrice >= gap.top;
      
      fvgs.push({
        type: 'BEAR_FVG',
        top: gap.top,
        bottom: gap.bottom,
        filled: isFilled,
        candles: [i, i+1, i+2]
      });
    }
  }
  
  return fvgs.slice(-3);
}

// ══════════════════════════════════════════════════════════════
// 6. PATTERN SIMILARITY
// ══════════════════════════════════════════════════════════════

function calcPatternSimilarity(candles) {
  if (!candles || candles.length < 20) return 0;
  
  const closes = candles.map(c => c.close);
  const n = closes.length;
  
  // Recent 10 candles pattern
  const recent = closes.slice(-10).map(p => p);
  const recentReturns = [];
  for (let i = 1; i < recent.length; i++) {
    recentReturns.push((recent[i] - recent[i-1]) / recent[i-1] * 100);
  }
  
  // Search in history for similar pattern
  let bestMatch = 0;
  for (let i = 30; i < closes.length - 10; i++) {
    const window = closes.slice(i, i + 10);
    const windowReturns = [];
    for (let j = 1; j < window.length; j++) {
      windowReturns.push((window[j] - window[j-1]) / window[j-1] * 100);
    }
    
    // Calculate similarity (lower = more similar)
    let diff = 0;
    for (let j = 0; j < recentReturns.length; j++) {
      diff += Math.abs(recentReturns[j] - windowReturns[j]);
    }
    const similarity = 100 - Math.min(diff, 100);
    if (similarity > bestMatch) bestMatch = similarity;
  }
  
  return bestMatch;
}

// ══════════════════════════════════════════════════════════════
// 7. ENTRY DECISION ENGINE
// ══════════════════════════════════════════════════════════════

function analyzeForEntry(candles) {
  if (!candles || candles.length < 10) return null;
  
  const closes = candles.map(c => c.close);
  const highs = candles.map(c => c.high);
  const lows = candles.map(c => c.low);
  const currentPrice = closes[closes.length - 1];
  
  // Conditions:
  let bullishConditions = 0;
  let bearishConditions = 0;
  
  // 1. FRACTALS
  const fractals = findFractals(highs, lows);
  if (fractals.up && !fractals.down) bullishConditions++;
  if (fractals.down && !fractals.up) bearishConditions++;
  
  // 2. ORDER BLOCKS
  const obs = findOrderBlocks(candles);
  const bullObs = obs.filter(o => o.type === 'BULL_OB' && !o.mitigated);
  const bearObs = obs.filter(o => o.type === 'BEAR_OB' && !o.mitigated);
  if (bullObs.length > 0) bullishConditions++;
  if (bearObs.length > 0) bearishConditions++;
  
  // 3. FVG
  const fvgs = findFVGs(candles);
  const bullFvgs = fvgs.filter(f => f.type === 'BULL_FVG' && !f.filled);
  const bearFvgs = fvgs.filter(f => f.type === 'BEAR_FVG' && !f.filled);
  if (bullFvgs.length > 0) bullishConditions++;
  if (bearFvgs.length > 0) bearishConditions++;
  
  // 4. RECENT TREND (last 5 candles)
  let upCandles = 0;
  for (let i = Math.max(0, closes.length - 5); i < closes.length; i++) {
    if (closes[i] > closes[i-1] || i === 0) upCandles++;
  }
  if (upCandles >= 3) bullishConditions++;
  if (upCandles <= 2) bearishConditions++;
  
  // 5. PATTERN SIMILARITY
  const patternSim = calcPatternSimilarity(candles);
  if (patternSim > 70) {
    bullishConditions++; // Favor the recent pattern
  }
  
  // VERDICT
  let direction = 'WAIT';
  if (bullishConditions >= 3) direction = 'BUY';
  else if (bearishConditions >= 3) direction = 'SELL';
  
  // Calculate SL / TP based on ATR
  const atr = candles.slice(-14).reduce((sum, c, i, a) =>
    i > 0 ? sum + Math.max(c.high-c.low, Math.abs(c.high-a[i-1].close), Math.abs(c.low-a[i-1].close)) : sum, 0) / 13;
  
  const entry = currentPrice;
  const sl = direction === 'BUY' ? entry - atr * 1.5 : entry + atr * 1.5;
  const tp = direction === 'BUY' ? entry + atr * 3 : entry - atr * 3;
  
  return {
    direction,
    entry: entry.toFixed(2),
    sl: sl.toFixed(2),
    tp: tp.toFixed(2),
    rr: ((Math.abs(tp - entry) / Math.abs(entry - sl)).toFixed(1)),
    bullishConditions,
    bearishConditions,
    atr: atr.toFixed(2),
    patternSim: patternSim.toFixed(0),
    fractals,
    obs,
    fvgs
  };
}

// ═════════════════════════════���════════════════════════════════
// 8. UI RENDERING
// ══════════════════════════════════════════════════════════════

function selectTF(btn, tf) {
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTF = tf;
  refreshAnalysis();
}

function refreshAnalysis() {
  const candles = buildCandles(selectedTF);
  if (!candles || candles.length < 10) {
    document.getElementById('analysisGrid').innerHTML = 
      `<div class="card" style="grid-column: 1/-1;"><div class="card-title">⏳ Waiting for data (${priceHistory.length} ticks)</div></div>`;
    return;
  }
  
  const analysis = analyzeForEntry(candles);
  renderAnalysis(analysis, candles, selectedTF);
}

function renderAnalysis(analysis, candles, tf) {
  if (!analysis) return;
  
  const grid = document.getElementById('analysisGrid');
  const directionClass = analysis.direction === 'BUY' ? 'signal-buy' :
                         analysis.direction === 'SELL' ? 'signal-sell' : 'signal-wait';
  const directionEmoji = analysis.direction === 'BUY' ? '▲' :
                         analysis.direction === 'SELL' ? '▼' : '◆';
  
  const closes = candles.map(c => c.close);
  const ema9 = closes.slice(-9).reduce((a,b) => a+b, 0) / 9;
  const ema21 = closes.slice(-21).reduce((a,b) => a+b, 0) / Math.min(21, closes.length);
  
  html = `
  <div class="card" style="grid-column: 1/-1;">
    <div class="card-title">${tf} TIMEFRAME ANALYSIS</div>
    <div style="margin-bottom: 16px;">
      <div class="signal-badge ${directionClass}">
        ${directionEmoji} ${analysis.direction}
      </div>
    </div>
    
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px;">
      <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; text-align: center;">
        <div style="font-size: 10px; color: var(--muted); margin-bottom: 4px;">ENTRY</div>
        <div style="font-family: Orbitron; font-size: 14px; color: var(--gold); font-weight: 700;">${analysis.entry}</div>
      </div>
      <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; text-align: center;">
        <div style="font-size: 10px; color: var(--muted); margin-bottom: 4px;">STOP LOSS</div>
        <div style="font-family: Orbitron; font-size: 14px; color: var(--red); font-weight: 700;">${analysis.sl}</div>
      </div>
      <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; text-align: center;">
        <div style="font-size: 10px; color: var(--muted); margin-bottom: 4px;">TAKE PROFIT</div>
        <div style="font-family: Orbitron; font-size: 14px; color: var(--green); font-weight: 700;">${analysis.tp}</div>
      </div>
      <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; text-align: center;">
        <div style="font-size: 10px; color: var(--muted); margin-bottom: 4px;">R/R RATIO</div>
        <div style="font-family: Orbitron; font-size: 14px; color: var(--blue); font-weight: 700;">1:${analysis.rr}</div>
      </div>
    </div>
    
    <table class="table">
      <tr>
        <td>Bullish Conditions</td>
        <td style="color: var(--green); font-weight: 700;">${analysis.bullishConditions}/5</td>
      </tr>
      <tr>
        <td>Bearish Conditions</td>
        <td style="color: var(--red); font-weight: 700;">${analysis.bearishConditions}/5</td>
      </tr>
      <tr>
        <td>ATR (14)</td>
        <td>${analysis.atr}</td>
      </tr>
      <tr>
        <td>Pattern Similarity</td>
        <td style="color: var(--blue);">${analysis.patternSim}%</td>
      </tr>
      <tr>
        <td>EMA 9 / EMA 21</td>
        <td>${ema9.toFixed(2)} / ${ema21.toFixed(2)}</td>
      </tr>
      <tr>
        <td>Candles</td>
        <td>${candles.length}</td>
      </tr>
    </table>
  </div>
  `;
  
  // Fractals
  if (analysis.fractals.up || analysis.fractals.down) {
    html += `
    <div class="card">
      <div class="card-title">🌿 FRACTALS</div>
      ${analysis.fractals.up ? `<div class="stat"><span class="stat-label">Bullish Fractal</span><span class="stat-value status-bull">${analysis.fractals.up.price.toFixed(2)}</span></div>` : ''}
      ${analysis.fractals.down ? `<div class="stat"><span class="stat-label">Bearish Fractal</span><span class="stat-value status-bear">${analysis.fractals.down.price.toFixed(2)}</span></div>` : ''}
    </div>
    `;
  }
  
  // Order Blocks
  if (analysis.obs.length > 0) {
    html += `
    <div class="card">
      <div class="card-title">🧱 ORDER BLOCKS</div>
      ${analysis.obs.map(ob => `
        <div class="stat">
          <span class="stat-label">${ob.type} ${ob.mitigated ? '(MITIGATED)' : '(ACTIVE)'}</span>
          <span class="stat-value ${ob.type === 'BULL_OB' ? 'status-bull' : 'status-bear'}">${ob.level.toFixed(2)}</span>
        </div>
      `).join('')}
    </div>
    `;
  }
  
  // FVGs
  if (analysis.fvgs.length > 0) {
    html += `
    <div class="card">
      <div class="card-title">🕳️ FAIR VALUE GAPS</div>
      ${analysis.fvgs.map(fvg => `
        <div class="stat">
          <span class="stat-label">${fvg.type} ${fvg.filled ? '(FILLED)' : '(UNFILLED)'}</span>
          <span class="stat-value" style="font-size: 11px;">${fvg.bottom.toFixed(2)} - ${fvg.top.toFixed(2)}</span>
        </div>
      `).join('')}
    </div>
    `;
  }
  
  grid.innerHTML = html;
}

function updateUI() {
  // Update price
  document.getElementById('live-price').textContent = lastPrice.toFixed(2);
  
  // Update tick counter
  const tickInfo = document.getElementById('tick-info');
  tickInfo.textContent = `🔄 ${priceHistory.length} ticks | M1: ${buildCandles('M1')?.length || 0} | M5: ${buildCandles('M5')?.length || 0} | M15: ${buildCandles('M15')?.length || 0}`;
  
  refreshAnalysis();
}

// ══════════════════════════════════════════════════════════════
// 9. PRICE FEED & AUTO-REFRESH
// ══════════════════════════════════════════════════════════════

async function fetchPrice() {
  try {
    const res = await fetch('https://api.gold-api.com/price/XAU');
    const data = await res.json();
    if (data.price) {
      recordTick(data.price);
    }
  } catch(e) {
    // Fallback: add small random movement to last price
    if (lastPrice > 0) {
      const noise = lastPrice * (Math.random() - 0.5) * 0.0001;
      recordTick(lastPrice + noise);
    }
  }
}

// Initial load
loadTicks();
refreshAnalysis();

// Price update every 2 seconds
setInterval(fetchPrice, 2000);

// Save ticks every minute
setInterval(saveTicks, 60000);

// Auto-refresh analysis every 10 seconds
setInterval(refreshAnalysis, 10000);
</script>
