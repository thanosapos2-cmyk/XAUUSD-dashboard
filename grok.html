<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>XAUUSD SMC Scanner v2.7 - Fixed Ticks</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#050709;--panel:#0b1018;--border:#1c2a3a;--gold:#f5c842;--green:#00e5a0;--red:#ff4060;--muted:#5a7090;--text:#c8d8e8;}
*{box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;margin:0;padding:0;}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:2px solid var(--border);position:sticky;top:0;background:rgba(5,7,9,0.98);z-index:30;}
.logo{font-family:'Orbitron',sans-serif;color:var(--gold);font-weight:900;letter-spacing:3px;font-size:23px;}
.live-badge{font-family:'Share Tech Mono',monospace;background:rgba(0,229,160,0.12);padding:8px 16px;border-radius:30px;color:var(--green);font-size:14px;display:flex;align-items:center;gap:8px;}
.container{padding:20px;max-width:1300px;margin:0 auto}
.panel-card{background:var(--panel);border:1px solid var(--border);padding:20px;border-radius:14px;margin-bottom:16px;}
.small{font-size:13px;color:var(--muted)}
</style>
</head>
<body>

<header class="header">
  <div class="logo">XAU/USD SMC SCANNER v2.7</div>
  <div class="live-badge">
    <span class="status-dot" id="live-dot" style="width:14px;height:14px;background:var(--muted);border-radius:50%;display:inline-block;"></span>
    <span id="live-status-text">Περιμένουμε ticks...</span>
  </div>
</header>

<div class="container">
  <div class="panel-card">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div>
        <strong>Τρέχουσα τιμή:</strong> 
        <span id="last-price" style="font-family:Orbitron,sans-serif;font-size:28px;color:var(--gold);margin-left:10px;">—</span>
      </div>
      <div>
        Ticks: <b id="tick-count" style="color:var(--gold)">0</b> / 200.000
      </div>
    </div>
  </div>

  <div class="panel-card">
    <button onclick="forceAnalyze()" style="padding:12px 24px;background:var(--gold);color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">ΑΝΑΛΥΣΗ ΤΩΡΑ</button>
    <button onclick="clearTicks()" style="margin-left:10px;padding:12px 20px;background:transparent;border:1px solid #555;color:var(--muted);">Clear Ticks</button>
  </div>

  <div id="results-panel" class="panel-card">
    <h3 style="margin:0 0 12px 0;color:var(--gold);">Αποτελέσματα</h3>
    <div id="results-body" style="font-family:monospace;font-size:14px; line-height:1.6;"></div>
  </div>
</div>

<script>
// ==================== STATE ====================
window._priceHistory = [];
window._lastKnownPrice = null;

// Load from storage
try {
  const saved = localStorage.getItem('xau_ticks_v27');
  if (saved) window._priceHistory = JSON.parse(saved);
} catch(e) {}

// ==================== RECORD TICK ====================
function recordPrice(price) {
  if (!price || price < 1000) return;
  window._priceHistory.push({price, time: Date.now()});
  if (window._priceHistory.length > 200000) window._priceHistory.shift();
  
  window._lastKnownPrice = price;
  
  // Update UI
  document.getElementById('last-price').textContent = price.toFixed(2);
  document.getElementById('tick-count').textContent = window._priceHistory.length.toLocaleString('el-GR');
  document.getElementById('live-dot').style.background = 'var(--green)';
  document.getElementById('live-status-text').textContent = 'LIVE • Ticks: ' + window._priceHistory.length;

  // Save occasionally
  if (window._priceHistory.length % 50 === 0) {
    localStorage.setItem('xau_ticks_v27', JSON.stringify(window._priceHistory));
  }

  drawSpark();
  analyzeThrottled();
}

// ==================== SPARK ====================
function drawSpark() {
  const canvas = document.createElement('canvas'); // αν δεν υπάρχει, μπορείς να προσθέσεις <canvas id="spark"> στο HTML
  // (για απλότητα εδώ παραλείπουμε πλήρες canvas, μπορείς να το προσθέσεις αν θες)
  console.log('Spark updated with', window._priceHistory.length, 'ticks');
}

// ==================== IMPROVED PRICE READER (v2.7) ====================
function startPriceReader() {
  console.log('🚀 Starting aggressive price reader...');

  const container = document.getElementById('tv-widget-wrap');
  if (!container) {
    console.error('TV widget container not found');
    return;
  }

  // Πολύ επιθετικός τρόπος: ψάχνουμε κάθε 300ms σε όλα τα elements
  setInterval(() => {
    try {
      // Βρίσκουμε όλα τα στοιχεία που μπορεί να έχουν την τιμή
      const allElements = container.querySelectorAll('*');
      for (let el of allElements) {
        const text = (el.textContent || '').trim();
        // Ταιριάζει με XAUUSD τιμές (π.χ. 3175.45 ή 3,175.45)
        const match = text.match(/(\d{1,4}[.,]\d{2})/);
        if (match) {
          let val = parseFloat(match[1].replace(',', ''));
          if (val > 2000 && val < 4000) {   // εύρος XAUUSD
            // Ελέγχουμε αν είναι νέα τιμή
            if (!window._lastKnownPrice || Math.abs(window._lastKnownPrice - val) > 0.005) {
              console.log('✅ Captured real price:', val);
              recordPrice(val);
              return; // βρήκαμε → σταματάμε το loop
            }
          }
        }
      }
    } catch(e) {}
  }, 300);
}

// Ξεκινάμε τον reader
setTimeout(startPriceReader, 1500);

// ==================== Απλή Ανάλυση (placeholder) ====================
function analyzeAllTimeframes() {
  const body = document.getElementById('results-body');
  if (window._priceHistory.length < 30) {
    body.innerHTML = '<p style="color:#888;">Περιμένουμε περισσότερα ticks για να εμφανιστούν signals...</p>';
    return;
  }
  body.innerHTML = `<p style="color:var(--green);">✅ Έχουμε ${window._priceHistory.length} ticks.<br>Τα signals θα εμφανιστούν μόλις συγκεντρωθούν αρκετά δεδομένα ανά TF.</p>`;
}

const analyzeThrottled = () => { /* μπορείς να βάλεις εδώ την πλήρη analyzeAllTimeframes από προηγούμενες εκδόσεις */ };

// Controls
window.forceAnalyze = () => { analyzeAllTimeframes(); };
window.clearTicks = () => {
  if (confirm('Διαγραφή όλων των ticks;')) {
    window._priceHistory = [];
    localStorage.removeItem('xau_ticks_v27');
    document.getElementById('tick-count').textContent = '0';
    document.getElementById('last-price').textContent = '—';
    analyzeAllTimeframes();
  }
};

console.log('%c v2.7 loaded - περιμένουμε ticks από TradingView widget', 'color:#f5c842;font-weight:bold');
</script>
</body>
</html>
