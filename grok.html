<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>XAUUSD SMC Scanner v2.8</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050709;--panel:#0b1018;--border:#1c2a3a;--gold:#f5c842;--green:#00e5a0;--red:#ff4060;--muted:#5a7090;--text:#c8d8e8;
}
*{box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;margin:0;padding:0;}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:2px solid var(--border);position:sticky;top:0;background:rgba(5,7,9,0.97);z-index:30}
.logo{font-family:'Orbitron',sans-serif;color:var(--gold);font-weight:900;letter-spacing:3px;font-size:22px}
.live-badge{font-family:'Share Tech Mono',monospace;background:rgba(0,229,160,0.1);padding:8px 14px;border-radius:30px;color:var(--green);font-size:13px;display:flex;align-items:center;gap:6px}
.container{padding:20px;max-width:1280px;margin:0 auto}
.tf-row{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0;background:rgba(11,16,24,0.6);padding:8px;border-radius:12px}
.tf-btn{background:var(--panel);border:1px solid var(--border);color:var(--muted);padding:10px 18px;border-radius:8px;cursor:pointer;font-family:'Orbitron',sans-serif}
.tf-btn.active{background:rgba(245,200,66,0.15);border-color:var(--gold);color:var(--gold)}
.grid{display:grid;grid-template-columns:1fr;gap:16px}
.panel-card{background:var(--panel);border:1px solid var(--border);padding:18px;border-radius:14px}
.table{width:100%;border-collapse:collapse;font-family:'Share Tech Mono',monospace}
.table th{background:rgba(245,200,66,0.08);padding:10px;border-bottom:2px solid var(--border);color:var(--gold)}
.table td{padding:10px;border-bottom:1px solid rgba(28,42,58,0.5)}
.canvas-spark{width:100%;height:42px;border-radius:10px}
</style>
</head>
<body>

<header class="header">
  <div class="logo">XAU/USD SMC SCANNER v2.8</div>
  <div class="live-badge">
    <span class="status-dot" id="live-dot" style="background:var(--muted);width:12px;height:12px;border-radius:50%"></span>
    <span id="live-status-text">Περιμένουμε ticks...</span>
  </div>
</header>

<div class="container">
  <div style="display:flex;justify-content:space-between;margin-bottom:12px">
    <div class="small">Ticks: <b id="tick-count">0</b> / 200.000</div>
    <div style="font-family:'Orbitron',sans-serif;font-size:24px;color:var(--gold)" id="last-price">—</div>
  </div>

  <div class="tf-row">
    <button class="tf-btn active" onclick="selectTF(this)">M1</button>
    <button class="tf-btn" onclick="selectTF(this)">M3</button>
    <button class="tf-btn" onclick="selectTF(this)">M5</button>
    <button class="tf-btn" onclick="selectTF(this)">M15</button>
    <button class="tf-btn" onclick="selectTF(this)">M30</button>
    <button class="tf-btn" onclick="selectTF(this)">M45</button>
    <button class="tf-btn" onclick="selectTF(this)">H1</button>
  </div>

  <div class="grid">
    <div class="panel-card">
      <h3 style="margin:0 0 12px 0;color:var(--gold)">Αποτελέσματα Ανάλυσης</h3>
      <table class="table" id="results-table">
        <thead><tr>
          <th>TF</th><th>OB</th><th>FVG</th><th>Fractal</th><th>MSB</th><th>Decision</th><th>Entry</th><th>SL</th><th>TP</th>
        </tr></thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>

    <div class="panel-card">
      <div style="font-weight:700;color:var(--gold);margin-bottom:8px">Spark Line</div>
      <canvas id="spark-canvas" class="canvas-spark"></canvas>
    </div>
  </div>

  <div style="margin-top:20px">
    <button onclick="forceAnalyze()" style="padding:12px 24px;background:var(--gold);color:black;border:none;border-radius:8px;font-weight:bold">ΑΝΑΛΥΣΗ ΤΩΡΑ</button>
    <button onclick="clearTicks()" style="margin-left:10px;padding:12px 20px;background:transparent;border:1px solid var(--border);color:var(--muted)">Clear Ticks</button>
  </div>
</div>

<script>
// ==================== SETTINGS ====================
const MAX_TICKS = 200000;
const TF_MAP = {M1:60, M3:180, M5:300, M15:900, M30:1800, M45:2700, H1:3600};
const TFS = ['M1','M3','M5','M15','M30','M45','H1'];

// ==================== STATE ====================
window._priceHistory = [];
window._lastKnownPrice = null;
window._signalStability = {};

// Load saved ticks
try {
  const saved = localStorage.getItem('xau_ticks_v28');
  if (saved) window._priceHistory = JSON.parse(saved);
} catch(e) {}

// ==================== RECORD PRICE ====================
function recordPrice(price) {
  if (!price || typeof price !== 'number' || price < 1000) return;

  window._priceHistory.push({price, time: Date.now()});
  if (window._priceHistory.length > MAX_TICKS) window._priceHistory.shift();

  window._lastKnownPrice = price;

  // Update UI
  document.getElementById('last-price').textContent = price.toFixed(2);
  document.getElementById('tick-count').textContent = window._priceHistory.length.toLocaleString('el-GR');
  document.getElementById('live-dot').style.background = 'var(--green)';
  document.getElementById('live-status-text').textContent = 'LIVE';

  drawSpark();
  analyzeThrottled();

  // Save every 50 ticks
  if (window._priceHistory.length % 50 === 0) {
    localStorage.setItem('xau_ticks_v28', JSON.stringify(window._priceHistory));
  }
}

// ==================== SPARK ====================
function drawSpark() {
  const canvas = document.getElementById('spark-canvas');
  if (!canvas || window._priceHistory.length < 2) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.offsetWidth, h = canvas.offsetHeight, dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr; canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const pts = window._priceHistory.slice(-120).map(t => t.price);
  const min = Math.min(...pts), max = Math.max(...pts), range = max - min || 1;
  const toX = i => (i / (pts.length - 1)) * w;
  const toY = v => h - ((v - min) / range) * (h - 8);

  ctx.beginPath();
  ctx.moveTo(toX(0), toY(pts[0]));
  for (let i = 1; i < pts.length; i++) ctx.lineTo(toX(i), toY(pts[i]));
  ctx.strokeStyle = '#00e5a0';
  ctx.lineWidth = 2;
  ctx.stroke();
}

// ==================== AGGRESSIVE PRICE READER v2.8 ====================
function startPriceReader() {
  console.log("Starting price reader v2.8...");

  setInterval(() => {
    try {
      const widget = document.getElementById('tv-widget-wrap');
      if (!widget) return;

      // Βρίσκουμε την τιμή με πολλούς τρόπους
      const text = widget.textContent || widget.innerText || '';
      const matches = text.match(/(\d{3,4}[.,]\d{1,2})/g);

      if (matches) {
        for (let m of matches) {
          const val = parseFloat(m.replace(',', ''));
          if (val > 2000 && val < 4000) {
            const last = window._priceHistory[window._priceHistory.length - 1];
            if (!last || Math.abs(last.price - val) > 0.01) {
              console.log('✅ Real tick captured:', val);
              recordPrice(val);
              return;
            }
          }
        }
      }
    } catch(e) {}
  }, 350);
}

setTimeout(startPriceReader, 1000);

// ==================== PLACEHOLDER ANALYSIS ====================
function analyzeAllTimeframes() {
  const tbody = document.getElementById('results-body');
  if (window._priceHistory.length < 20) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;color:#888;padding:20px">Περιμένουμε περισσότερα ticks για να εμφανιστούν signals...</td></tr>`;
    return;
  }
  tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;color:var(--green)">Έχουμε ${window._priceHistory.length} ticks.<br>Η πλήρης ανάλυση θα προστεθεί σύντομα.</td></tr>`;
}

const analyzeThrottled = (() => {
  let timer;
  return () => {
    clearTimeout(timer);
    timer = setTimeout(analyzeAllTimeframes, 1500);
  };
})();

window.forceAnalyze = () => analyzeAllTimeframes();
window.clearTicks = () => {
  if (confirm('Διαγραφή όλων των ticks;')) {
    window._priceHistory = [];
    localStorage.removeItem('xau_ticks_v28');
    document.getElementById('tick-count').textContent = '0';
    document.getElementById('last-price').textContent = '—';
    analyzeAllTimeframes();
  }
};
window.selectTF = (btn) => {
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
};

// Bootstrap
if (window._priceHistory.length > 0) {
  window._lastKnownPrice = window._priceHistory[window._priceHistory.length-1].price;
  document.getElementById('last-price').textContent = window._lastKnownPrice.toFixed(2);
}

setTimeout(() => {
  analyzeAllTimeframes();
}, 800);

console.log('%cXAUUSD Scanner v2.8 loaded', 'color:#f5c842;font-weight:bold');
</script>
</body>
</html>
