<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAUUSD Pro Trading System - SMC EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050709; --surface: #090d12; --panel: #0b1018; --border: #1c2a3a;
  --gold: #f5c842; --gold2: #e8a020; --gold-glow: rgba(245,200,66,0.25);
  --green: #00e5a0; --red: #ff4060; --blue: #3de0ff; --purple: #a855f7;
  --text: #c8d8e8; --muted: #3d5068; --muted2: #5a7090;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 14px; min-height: 100vh; overflow-x: hidden; }
body::before { content:''; position: fixed; inset:0; background-image: linear-gradient(rgba(245,200,66,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(245,200,66,0.025) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index:0; }

.header { position: sticky; top:0; z-index:200; background: rgba(5,7,9,0.96); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
.logo { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900; letter-spacing: 4px; background: linear-gradient(135deg, var(--gold), var(--gold2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.tabs { display:flex; gap:2px; padding: 0 28px; background: var(--surface); border-bottom: 1px solid var(--border); position: relative; z-index:10; }
.tab { padding: 12px 22px; font-family:'Orbitron',sans-serif; font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color: var(--muted2); cursor:pointer; border-bottom: 2px solid transparent; transition: 0.25s; }
.tab.active { color:var(--gold); border-bottom-color: var(--gold); }

.panel { display:none; padding: 24px 28px; position:relative; z-index:1; }
.panel.active { display:block; }

.grid3 { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:14px; }
.stat-card { background: var(--panel); border: 1px solid var(--border); border-radius:6px; padding:16px; transition: 0.25s; }
.decision-box { margin-top:10px; padding:15px; border-radius:4px; text-align:center; font-family:'Orbitron'; font-weight:900; font-size: 20px; }
.BUY { color: var(--green); border: 1px solid var(--green); background: rgba(0,229,160,0.05); }
.SELL { color: var(--red); border: 1px solid var(--red); background: rgba(255,64,96,0.05); }
.WAIT { color: var(--muted2); border: 1px solid var(--border); border-style: dashed; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">XAU/USD PRO</div>
  <div id="tv-widget-container" style="width:250px;">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
      { "symbol": "FX_IDC:XAUUSD", "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "en" }
      </script>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('smc-strict', this)">⚡ SMC STRICT</div>
  <div class="tab" onclick="showTab('original-content', this)">📊 OLD SYSTEM</div>
</div>

<div id="smc-strict" class="panel active">
    <div style="margin-bottom:20px;">
        <span style="font-family:'Share Tech Mono'; color:var(--gold)">LIVE ENGINE:</span>
        <span id="engine-status" style="color:var(--red)">SEARCHING...</span> | 
        <span style="font-family:'Share Tech Mono'; color:var(--gold)">TICKS:</span>
        <span id="smc-tick-count">0</span>
    </div>
    <div class="grid3" id="smc-grid"></div>
</div>

<div id="original-content" class="panel">
    <p style="color:var(--muted2)">Εδώ βρίσκεται ο παλιός σας κώδικας και τα γραφήματα...</p>
</div>

<script>
// --- GLOBAL MEMORY ---
let smcHistory = [];
const SMC_MAX = 200000;
const SMC_TFS = ['M1', 'M5', 'M15', 'M30', 'H1'];
const SMC_SEC = { M1: 60, M5: 300, M15: 900, M30: 1800, H1: 3600 };

// --- ΔΙΚΟΣ ΣΟΥ ΤΡΟΠΟΣ SCRAPING (ΑΠΟ ΤΟ WIDGET ΣΟΥ) ---
function runScraper() {
    const spans = document.querySelectorAll('.tradingview-widget-container span');
    let found = null;
    spans.forEach(s => {
        const val = parseFloat(s.innerText.replace(/,/g, ''));
        if (!isNaN(val) && val > 1500 && s.innerText.includes('.')) {
            found = val;
        }
    });

    if (found) {
        const now = Date.now();
        if (smcHistory.length === 0 || smcHistory[smcHistory.length - 1].p !== found) {
            smcHistory.push({ p: found, t: now });
            if (smcHistory.length > SMC_MAX) smcHistory.shift();
            
            document.getElementById('engine-status').innerText = "ONLINE";
            document.getElementById('engine-status').style.color = "var(--green)";
            document.getElementById('smc-tick-count').innerText = smcHistory.length.toLocaleString();
        }
    }
}

// --- SMC LOGIC (STRICT) ---
function getSMC(tf) {
    const candles = buildCandles(tf);
    if (candles.length < 15) return { decision: 'WAIT', ob: 'NONE', fvg: 'NONE', frac: 'NONE' };

    const last = candles[candles.length - 1];
    const prev = candles[candles.length - 2];
    const p3 = candles[candles.length - 3];

    // 1. Order Block (Strict)
    const obBull = candles.slice(-15, -2).find(c => c.close < c.open && prev.close > c.high);
    const obBear = candles.slice(-15, -2).find(c => c.close > c.open && prev.close < c.low);

    // 2. FVG (Imbalance)
    const fvgBull = prev.low > p3.high;
    const fvgBear = prev.high < p3.low;

    // 3. Fractal Similarity
    const isBot = prev.low < p3.low && prev.low < last.low;
    const isTop = prev.high > p3.high && prev.high > last.high;

    let decision = 'WAIT';
    if (obBull && fvgBull && isBot) decision = 'BUY';
    if (obBear && fvgBear && isTop) decision = 'SELL';

    return {
        decision,
        ob: obBull ? 'BULL OB' : (obBear ? 'BEAR OB' : 'NONE'),
        fvg: fvgBull ? 'BULLISH' : (fvgBear ? 'BEARISH' : 'NONE'),
        frac: isBot ? 'BULL' : (isTop ? 'BEAR' : 'NEUTRAL')
    };
}

function buildCandles(tf) {
    const ms = SMC_SEC[tf] * 1000;
    const candles = [];
    if (smcHistory.length === 0) return [];
    let cur = null;
    smcHistory.forEach(tick => {
        const bucket = Math.floor(tick.t / ms) * ms;
        if (!cur || cur.time !== bucket) {
            if (cur) candles.push(cur);
            cur = { time: bucket, open: tick.p, high: tick.p, low: tick.p, close: tick.p };
        } else {
            cur.high = Math.max(cur.high, tick.p);
            cur.low = Math.min(cur.low, tick.p);
            cur.close = tick.p;
        }
    });
    return candles;
}

function updateUI() {
    const grid = document.getElementById('smc-grid');
    if (!grid) return;
    let html = '';
    SMC_TFS.forEach(tf => {
        const data = getSMC(tf);
        html += `
            <div class="stat-card">
                <div style="font-family:'Orbitron'; color:var(--gold); border-bottom:1px solid var(--border); padding-bottom:5px; margin-bottom:10px;">${tf} TIMEFRAME</div>
                <div style="display:flex; justify-content:space-between; font-size:12px; margin:5px 0;"><span>Order Block:</span><b>${data.ob}</b></div>
                <div style="display:flex; justify-content:space-between; font-size:12px; margin:5px 0;"><span>FVG Imbalance:</span><b>${data.fvg}</b></div>
                <div style="display:flex; justify-content:space-between; font-size:12px; margin:5px 0;"><span>Fractal Sim.:</span><b>${data.frac}</b></div>
                <div class="decision-box ${data.decision}">${data.decision}</div>
            </div>`;
    });
    grid.innerHTML = html;
}

function showTab(id, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}

// EXECUTION
setInterval(runScraper, 1000);
setInterval(updateUI, 2000);
</script>

</body>
</html>
