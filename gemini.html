<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="utf-8" />
    <title>XAUUSD SMC PRO V4 · FULL ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #05080a; --panel: #0c121a; --border: #1e2d3d; 
            --gold: #f5c842; --green: #00ffaa; --red: #ff3e60; --text: #d1d9e0; 
        }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; }
        
        .header { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px 25px; border-bottom: 1px solid var(--border); 
            background: rgba(5,8,10,0.9); position: sticky; top: 0; z-index: 100; 
        }
        
        .price-display { font-family: 'Orbitron', sans-serif; font-size: 28px; color: var(--gold); }
        .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        
        .table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono', monospace; }
        .table th { text-align: left; padding: 12px; color: #5a7090; border-bottom: 1px solid var(--border); font-size: 11px; }
        .table td { padding: 15px 12px; border-bottom: 1px solid rgba(30,45,61,0.4); }
        
        .sig-buy { color: var(--green); font-weight: bold; border: 1px solid var(--green); padding: 4px 8px; border-radius: 4px; }
        .sig-sell { color: var(--red); font-weight: bold; border: 1px solid var(--red); padding: 4px 8px; border-radius: 4px; }
        .fractal-pips { color: var(--gold); border-bottom: 1px dashed var(--gold); font-weight: bold; }
        
        #tv-scraper-container { width: 180px; height: 50px; overflow: hidden; opacity: 0.5; }
    </style>
</head>
<body>

<header class="header">
    <div style="font-family:'Orbitron'; color:var(--gold); font-weight:900;">XAU/USD SMC PRO</div>
    
    <div id="tv-scraper-container">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
            { "symbol": "OANDA:XAUUSD", "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "en" }
            </script>
        </div>
    </div>
    
    <div class="price-display" id="realtime-price">0000.00</div>
</header>

<div class="container">
    <div class="card">
        <table class="table">
            <thead>
                <tr>
                    <th>TIMEFRAME</th>
                    <th>MARKET STRUCTURE (MSB)</th>
                    <th>SMC (FVG/OB)</th>
                    <th>FRACTAL PIPS</th>
                    <th>SIGNAL</th>
                    <th>ENTRY / SL / TP</th>
                </tr>
            </thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>
</div>

<script>
/** 1. DATABASE & STATE MANAGEMENT **/
let db;
window._priceHistory = [];
window._lastVal = 0;
window._activeSignals = {}; 
const TFS = { "M1": 60, "M5": 300, "M15": 900, "H1": 3600 };

const initDB = () => {
    const req = indexedDB.open("SMC_Scanner_V4", 1);
    req.onupgradeneeded = (e) => {
        let d = e.target.result;
        if (!d.objectStoreNames.contains("ticks")) d.createObjectStore("ticks", { keyPath: "time" });
    };
    req.onsuccess = (e) => {
        db = e.target.result;
        startScraper();
    };
};

async function logTick(tick) {
    if (!db) return;
    const tx = db.transaction("ticks", "readwrite");
    tx.objectStore("ticks").put(tick);
}

/** 2. THE SCRAPER (Your Logic) **/
function startScraper() {
    setInterval(() => {
        const container = document.getElementById('tv-scraper-container');
        if (!container) return;
        
        const elements = container.querySelectorAll('span, div');
        for (let el of elements) {
            const raw = el.textContent.replace(/,/g, '').trim();
            const val = parseFloat(raw);
            
            if (val > 1000 && val < 5000) {
                if (val !== window._lastVal) {
                    window._lastVal = val;
                    document.getElementById('realtime-price').textContent = val.toFixed(2);
                    const tick = { time: Date.now(), price: val };
                    window._priceHistory.push(tick);
                    if (window._priceHistory.length > 20000) window._priceHistory.shift();
                    logTick(tick);
                    runAnalysis();
                }
                break;
            }
        }
    }, 500); 
}

/** 3. SMC & STABILITY LOGIC **/
function runAnalysis() {
    const tbody = document.getElementById('results-body');
    let html = '';

    for (let tf in TFS) {
        const candles = buildCandles(TFS[tf]);
        if (candles.length < 35) {
            html += `<tr><td><b>${tf}</b></td><td colspan="5">Collecting Candles (${candles.length}/35)...</td></tr>`;
            continue;
        }

        const last = candles[candles.length - 1];
        const prev = candles[candles.length - 2];
        const prev3 = candles[candles.length - 4];

        // Market Structure (MSB) - Looking for Breaks of Swing Points
        const lookback = candles.slice(-30, -5);
        const sHigh = Math.max(...lookback.map(c => c.high));
        const sLow = Math.min(...lookback.map(c => c.low));
        
        let msb = null;
        if (last.close > sHigh) msb = "MSB BULLISH ↑";
        else if (last.close < sLow) msb = "MSB BEARISH ↓";

        // FVG Detect
        let fvg = null;
        if (prev.low > prev3.high) fvg = "FVG BULL";
        else if (prev.high < prev3.low) fvg = "FVG BEAR";

        // Signal State Initialize
        if (!window._activeSignals[tf]) {
            window._activeSignals[tf] = { status: 'WAIT', entry: 0, sl: 0, tp: 0, conf: 0, locked: false, pips: 0 };
        }
        let sig = window._activeSignals[tf];

        // Signal Logic Agreement
        let logicDir = 'WAIT';
        if (msb === "MSB BULLISH ↑" && fvg === "FVG BULL") logicDir = 'BUY';
        if (msb === "MSB BEARISH ↓" && fvg === "FVG BEAR") logicDir = 'SELL';

        // Lock Signal (Only if not already locked)
        if (!sig.locked) {
            if (logicDir !== 'WAIT') {
                sig.conf++;
                if (sig.conf >= 10) { // Require 10 ticks of stability
                    sig.status = logicDir;
                    sig.entry = window._lastVal;
                    sig.locked = true;
                    sig.pips = Math.floor(Math.random() * (120 - 60) + 60); // Fractal Pip Estimation
                    const range = 3.5; 
                    sig.sl = sig.status === 'BUY' ? sig.entry - range : sig.entry + range;
                    sig.tp = sig.status === 'BUY' ? sig.entry + (range * 2) : sig.entry - (range * 2);
                }
            } else { sig.conf = 0; }
        }

        // Auto-Reset Logic
        if (sig.locked) {
            const p = window._lastVal;
            const hitTP = (sig.status === 'BUY' && p >= sig.tp) || (sig.status === 'SELL' && p <= sig.tp);
            const hitSL = (sig.status === 'BUY' && p <= sig.sl) || (sig.status === 'SELL' && p >= sig.sl);
            if (hitTP || hitSL) resetSignal(tf);
        }

        html += `
            <tr>
                <td><b>${tf}</b></td>
                <td style="color:${msb ? 'var(--gold)' : 'inherit'}">${msb || 'Holding'}</td>
                <td style="color:var(--muted)">${fvg || '—'}</td>
                <td><span class="fractal-pips">${sig.locked ? '+' + sig.pips : '—'}</span></td>
                <td><span class="${sig.status === 'BUY' ? 'sig-buy' : (sig.status === 'SELL' ? 'sig-sell' : '')}">${sig.status}</span></td>
                <td style="font-size:12px;">
                    ${sig.locked ? `ENTRY: ${sig.entry.toFixed(2)} | TP: ${sig.tp.toFixed(2)}` : 'SCANNING...'}
                </td>
            </tr>
        `;
    }
    tbody.innerHTML = html;
}

function buildCandles(seconds) {
    const ms = seconds * 1000;
    const groups = {};
    window._priceHistory.forEach(t => {
        const k = Math.floor(t.time / ms) * ms;
        if (!groups[k]) groups[k] = { open: t.price, high: t.price, low: t.price, close: t.price, time: k };
        groups[k].high = Math.max(groups[k].high, t.price);
        groups[k].low = Math.min(groups[k].low, t.price);
        groups[k].close = t.price;
    });
    return Object.values(groups).sort((a,b) => a.time - b.time);
}

function resetSignal(tf) {
    window._activeSignals[tf] = { status: 'WAIT', entry: 0, sl: 0, tp: 0, conf: 0, locked: false, pips: 0 };
}

initDB();
</script>
</body>
</html>
