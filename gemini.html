<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>XAUUSD SMC - ORIGINAL SCRAPER FIX</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #050709; --surface: #090d12; --panel: #0b1018; --border: #1c2a3a;
        --gold: #f5c842; --green: #00e5a0; --red: #ff4060; --text: #c8d8e8; --muted: #5a7090;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; padding: 20px; }

    /* WIDGET - ΤΑΥΤΟΣΗΜΟ ΜΕ ΤΟ ΔΙΚΟ ΣΟΥ */
    #tv-widget-container {
        width: 100%; height: 80px; margin-bottom: 20px; border: 1px solid var(--border);
    }

    .header-bar { display: flex; justify-content: space-between; background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
    .price-main { font-family: 'Orbitron'; font-size: 26px; color: var(--gold); font-weight: 900; }
    .status-info { text-align: right; font-size: 11px; color: var(--muted); }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
    .tf-label { font-family: 'Orbitron'; color: var(--gold); font-size: 16px; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

    .metric { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; }
    .val-text { font-weight: bold; color: var(--text); }

    .decision { margin-top: 15px; padding: 15px; border-radius: 6px; text-align: center; font-family: 'Orbitron'; border: 2px solid var(--border); font-size: 20px; font-weight: 900; }
    .BUY { border-color: var(--green); color: var(--green); background: rgba(0,229,160,0.05); }
    .SELL { border-color: var(--red); color: var(--red); background: rgba(255,64,96,0.05); }
    .WAIT { color: var(--muted); border-style: dashed; }
</style>
</head>
<body>

<div id="tv-widget-container">
    <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
        { "symbol": "FX_IDC:XAUUSD", "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "en" }
        </script>
    </div>
</div>

<div class="header-bar">
    <div>
        <span style="font-size: 10px; color: var(--muted)">LIVE XAUUSD (FROM DOM)</span>
        <div id="price-display" class="price-main">SEARCHING...</div>
    </div>
    <div class="status-info">
        TICKS IN MEMORY: <span id="tick-count" style="color: var(--text)">0</span><br>
        ENGINE STATUS: <span id="engine-status" style="color: var(--red)">STALLED</span>
    </div>
</div>

<div class="grid" id="main-grid"></div>

<script>
// --- GLOBALS ---
let tickHistory = [];
const MAX_TICKS = 200000;
const tFrames = ['M1', 'M5', 'M15', 'M30', 'H1'];
const TF_SEC = { M1: 60, M5: 300, M15: 900, M30: 1800, H1: 3600 };

// --- Ο ΑΥΘΕΝΤΙΚΟΣ ΣΟΥ ΤΡΟΠΟΣ (RECURSIVE DOM SEARCH) ---
function findPriceInDOM() {
    // Σαρώνουμε όλα τα spans και divs στο container του widget
    const elements = document.getElementById('tv-widget-container').querySelectorAll('span, div');
    let found = null;

    for (let el of elements) {
        if (el.children.length === 0) { // Μόνο τελικά στοιχεία κειμένου
            const txt = el.innerText.replace(/,/g, '');
            const val = parseFloat(txt);
            // Έλεγχος αν η τιμή είναι λογική για Χρυσό και έχει δεκαδικά
            if (!isNaN(val) && val > 1500 && val < 4000 && txt.includes('.')) {
                found = val;
                break;
            }
        }
    }

    if (found) {
        processTick(found);
        document.getElementById('engine-status').innerText = "RUNNING";
        document.getElementById('engine-status').style.color = "var(--green)";
    }
}

function processTick(price) {
    const now = Date.now();
    // Καταγραφή μόνο αν αλλάξει η τιμή
    if (tickHistory.length === 0 || tickHistory[tickHistory.length - 1].p !== price) {
        tickHistory.push({ p: price, t: now });
        if (tickHistory.length > MAX_TICKS) tickHistory.shift();

        document.getElementById('price-display').innerText = price.toFixed(2);
        document.getElementById('tick-count').innerText = tickHistory.length.toLocaleString();
    }
}

// --- STRICT SMC LOGIC ---
function runSMC(tf) {
    const candles = getCandles(tf);
    if (candles.length < 12) return { decision: 'WAIT', ob: 'NONE', fvg: 'NONE', frac: 'NONE' };

    const last = candles[candles.length - 1];
    const prev = candles[candles.length - 2];
    const p3 = candles[candles.length - 3];

    // 1. Order Block (OB)
    const obBull = candles.slice(-12, -2).find(c => c.close < c.open && candles[candles.length-2].close > c.high);
    const obBear = candles.slice(-12, -2).find(c => c.close > c.open && candles[candles.length-2].close < c.low);

    // 2. FVG
    const fvgBull = prev.low > p3.high;
    const fvgBear = prev.high < p3.low;

    // 3. Fractal Pattern Similarity
    const isBot = prev.low < p3.low && prev.low < last.low;
    const isTop = prev.high > p3.high && prev.high > last.high;

    let dec = 'WAIT';
    // Strict Confluence: Πρέπει να υπάρχουν και τα 3
    if (obBull && fvgBull && isBot) dec = 'BUY';
    if (obBear && fvgBear && isTop) dec = 'SELL';

    return {
        decision: dec,
        ob: obBull ? 'BULL OB' : (obBear ? 'BEAR OB' : 'NONE'),
        fvg: fvgBull ? 'BULL' : (fvgBear ? 'BEAR' : 'NONE'),
        frac: isBot ? 'BULL' : (isTop ? 'BEAR' : 'NEUTRAL')
    };
}

function getCandles(tf) {
    const ms = TF_SEC[tf] * 1000;
    const res = [];
    if (tickHistory.length === 0) return [];
    let cur = null;
    tickHistory.forEach(tick => {
        const b = Math.floor(tick.t / ms) * ms;
        if (!cur || cur.time !== b) {
            if (cur) res.push(cur);
            cur = { time: b, open: tick.p, high: tick.p, low: tick.p, close: tick.p };
        } else {
            cur.high = Math.max(cur.high, tick.p);
            cur.low = Math.min(cur.low, tick.p);
            cur.close = tick.p;
        }
    });
    return res;
}

function updateUI() {
    const main = document.getElementById('main-grid');
    let html = '';
    tFrames.forEach(tf => {
        const s = runSMC(tf);
        html += `
            <div class="card">
                <div class="tf-label">${tf} TIMEFRAME</div>
                <div class="metric"><span>Order Block</span><span class="val-text">${s.ob}</span></div>
                <div class="metric"><span>FVG Imbalance</span><span class="val-text">${s.fvg}</span></div>
                <div class="metric"><span>Fractal Sim.</span><span class="val-text">${s.frac}</span></div>
                <div class="decision ${s.decision}">${s.decision}</div>
            </div>`;
    });
    main.innerHTML = html;
}

// Εκκίνηση Scraper (Κάθε 800ms αναζήτηση στο DOM)
setInterval(findPriceInDOM, 800);
// Εκκίνηση UI (Κάθε 2 δευτερόλεπτα)
setInterval(updateUI, 2000);
</script>
</body>
</html>
