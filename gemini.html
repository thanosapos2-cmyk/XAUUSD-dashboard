<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD STRICT SMC ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508; --card: #0d1117; --border: #1f2937;
            --gold: #f5c842; --green: #00f291; --red: #ff385c; --text: #e2e8f0; --muted: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; padding: 15px; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 20px; border-left: 4px solid var(--gold); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900; color: var(--gold); letter-spacing: 2px; }
        .price-engine { text-align: right; }
        .live-price { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); }
        .tick-meta { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; display: flex; flex-direction: column; position: relative; }
        .tf-tag { position: absolute; top: 15px; right: 15px; font-family: 'Orbitron'; color: var(--gold); font-size: 14px; font-weight: 700; opacity: 0.5; }

        /* TABLE */
        .smc-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        .smc-table td { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 12px; }
        .ind-label { color: var(--muted); }
        .ind-status { text-align: right; font-weight: bold; }

        /* DECISION */
        .decision-panel { padding: 15px; border-radius: 6px; text-align: center; background: rgba(0,0,0,0.2); border: 1px solid var(--border); margin-top: auto; }
        .decision-panel.BUY { border-color: var(--green); background: rgba(0,242,145,0.03); }
        .decision-panel.SELL { border-color: var(--red); background: rgba(255,56,92,0.03); }
        
        .signal-title { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; margin-bottom: 10px; color: var(--muted); }
        .BUY .signal-title { color: var(--green); }
        .SELL .signal-title { color: var(--red); }

        .targets { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .target-box { background: #000; padding: 8px; border-radius: 4px; border: 1px solid var(--border); }
        .t-lbl { font-size: 8px; color: var(--muted); display: block; margin-bottom: 3px; }
        .t-val { font-size: 11px; font-weight: bold; color: #fff; }

        .loading-text { font-size: 11px; color: var(--gold); font-style: italic; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">XAUUSD STRICT SMC</div>
    <div class="price-engine">
        <div id="price" class="live-price">LOADING...</div>
        <div class="tick-meta">Ticks Stored: <span id="tick-count">0</span> / 200,000</div>
    </div>
</div>

<div class="grid" id="dashboard"></div>

<script>
// --- CORE CONFIG ---
const MAX_TICKS = 200000;
let tickHistory = [];
const timeframes = ['M1', 'M5', 'M15', 'M30', 'H1'];
const tfSeconds = { M1: 60, M5: 300, M15: 900, M30: 1800, H1: 3600 };

// --- DATA ENGINE (PUBLIC API - NO CORS ERRORS) ---
async function fetchPrice() {
    try {
        // Χρησιμοποιούμε το API της Binance (PAXG/USDT) που αντιστοιχεί στον Χρυσό
        const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
        const data = await response.json();
        const price = parseFloat(data.price);
        
        if (tickHistory.length === 0 || tickHistory[tickHistory.length - 1].p !== price) {
            tickHistory.push({ p: price, t: Date.now() });
            if (tickHistory.length > MAX_TICKS) tickHistory.shift();
            
            document.getElementById('price').innerText = price.toFixed(2);
            document.getElementById('tick-count').innerText = tickHistory.length.toLocaleString();
        }
    } catch (e) {
        console.error("Price fetch error. Retrying...");
    }
}

// --- SMC & FRACTAL CALCULATOR ---
function getCandles(tf) {
    const sec = tfSeconds[tf] * 1000;
    const candles = [];
    if (tickHistory.length < 2) return [];

    let current = null;
    tickHistory.forEach(tick => {
        const bucket = Math.floor(tick.t / sec) * sec;
        if (!current || current.time !== bucket) {
            if (current) candles.push(current);
            current = { time: bucket, open: tick.p, high: tick.p, low: tick.p, close: tick.p };
        } else {
            current.high = Math.max(current.high, tick.p);
            current.low = Math.min(current.low, tick.p);
            current.close = tick.p;
        }
    });
    return candles;
}

function analyzeSMC(tf) {
    const candles = getCandles(tf);
    if (candles.length < 15) return { status: 'LOADING', count: candles.length };

    const n = candles.length;
    const last = candles[n-1];
    const prev = candles[n-2];
    const p3 = candles[n-3];

    // 1. ORDER BLOCKS (STRICT) - Ανεξάρτητος υπολογισμός
    let obType = 'NONE';
    let obPrice = 0;
    // Αναζήτηση για τελευταίο Bearish πριν από δυνατό Bullish (Bull OB)
    for(let i = n-10; i < n-1; i++) {
        if(candles[i].close < candles[i].open && candles[i+1].close > candles[i].high) {
            obType = 'BULLISH OB'; obPrice = candles[i].low;
        }
        if(candles[i].close > candles[i].open && candles[i+1].close < candles[i].low) {
            obType = 'BEARISH OB'; obPrice = candles[i].high;
        }
    }

    // 2. FVG (FAIR VALUE GAP) - Ανεξάρτητος υπολογισμός
    const fvgBull = prev.low > p3.high;
    const fvgBear = prev.high < p3.low;
    const fvgStatus = fvgBull ? 'BULLISH GAP' : (fvgBear ? 'BEARISH GAP' : 'MITIGATED');

    // 3. FRACTAL SIMILARITY (PATTERN) - Ανεξάρτητος υπολογισμός
    const isFractalBull = prev.low < p3.low && last.close > prev.high;
    const isFractalBear = prev.high > p3.high && last.close < prev.low;
    const fractalStatus = isFractalBull ? 'BULLISH SIM' : (isFractalBear ? 'BEARISH SIM' : 'NEUTRAL');

    // ΤΕΛΙΚΗ ΑΠΟΦΑΣΗ (Πρέπει κάθε δείκτης να είναι ΟΚ μεμονωμένα)
    let decision = 'WAIT';
    let tp = 0, sl = 0;
    const waveSize = Math.abs(candles[n-5].high - candles[n-5].low); // Fractal wave projection

    if (obType === 'BULLISH OB' && fvgBull && isFractalBull) {
        decision = 'BUY';
        sl = obPrice - 0.5;
        tp = last.close + waveSize;
    } else if (obType === 'BEARISH OB' && fvgBear && isFractalBear) {
        decision = 'SELL';
        sl = obPrice + 0.5;
        tp = last.close - waveSize;
    }

    return { status: 'READY', ob: obType, fvg: fvgStatus, fractal: fractalStatus, decision, tp, sl, entry: last.close, count: n };
}

// --- UI RENDERER ---
function render() {
    const container = document.getElementById('dashboard');
    let html = '';

    timeframes.forEach(tf => {
        const data = analyzeSMC(tf);
        
        if (data.status === 'LOADING') {
            html += `<div class="card"><div class="tf-tag">${tf}</div><div class="loading-text">Building Candles: ${data.count}/15...</div></div>`;
        } else {
            html += `
            <div class="card">
                <div class="tf-tag">${tf}</div>
                <table class="smc-table">
                    <tr><td class="ind-label">Order Block</td><td class="ind-status" style="color:var(--gold)">${data.ob}</td></tr>
                    <tr><td class="ind-label">Fair Value Gap</td><td class="ind-status" style="color:var(--green)">${data.fvg}</td></tr>
                    <tr><td class="ind-label">Fractal Pattern</td><td class="ind-status">${data.fractal}</td></tr>
                </table>

                <div class="decision-panel ${data.decision}">
                    <div class="signal-title">${data.decision}</div>
                    ${data.decision !== 'WAIT' ? `
                        <div class="targets">
                            <div class="target-box"><span class="t-lbl">ENTRY</span><span class="t-val">${data.entry.toFixed(2)}</span></div>
                            <div class="target-box"><span class="t-lbl">SL</span><span class="t-val" style="color:var(--red)">${data.sl.toFixed(2)}</span></div>
                            <div class="target-box"><span class="t-lbl">TP</span><span class="t-val" style="color:var(--green)">${data.tp.toFixed(2)}</span></div>
                        </div>
                    ` : '<div style="font-size:10px; color:var(--muted)">Awaiting Strict Confluence...</div>'}
                </div>
            </div>`;
        }
    });
    container.innerHTML = html;
}

// --- EXECUTION ---
setInterval(fetchPrice, 1000); // Μάζεψε ticks κάθε δευτερόλεπτο
setInterval(render, 2000);     // Ανανέωσε το UI κάθε 2 δευτερόλεπτα
</script>

</body>
</html>
