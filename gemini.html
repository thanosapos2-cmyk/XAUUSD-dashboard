<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="utf-8" />
    <title>XAUUSD ULTIMATE SCANNER (OANDA FEED)</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05080a; --panel: #0c121a; --border: #1e2d3d; --gold: #f5c842; --green: #00ffaa; --red: #ff3e60; --text: #d1d9e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 15px 25px; border-bottom: 1px solid var(--border); background: rgba(5,8,10,0.9); position: sticky; top: 0; z-index: 100; }
        .price-display { font-family: 'Orbitron', sans-serif; font-size: 28px; color: var(--gold); text-shadow: 0 0 10px rgba(245,200,66,0.3); }
        .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono', monospace; }
        .table th { text-align: left; padding: 12px; color: #5a7090; border-bottom: 1px solid var(--border); font-size: 12px; }
        .table td { padding: 15px 12px; border-bottom: 1px solid rgba(30,45,61,0.4); }
        .sig-buy { color: var(--green); font-weight: bold; border: 1px solid var(--green); padding: 4px 8px; border-radius: 4px; }
        .sig-sell { color: var(--red); font-weight: bold; border: 1px solid var(--red); padding: 4px 8px; border-radius: 4px; }
        .pips-badge { color: var(--gold); border-bottom: 1px dashed var(--gold); }
    </style>
</head>
<body>

<header class="header">
    <div style="font-family:'Orbitron'; color:var(--gold); font-weight:900; letter-spacing:2px">XAU/USD SMC PRO</div>
    
    <div id="tv-scraper-container" style="min-width:200px">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
            { "symbol": "OANDA:XAUUSD", "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "en" }
            </script>
        </div>
    </div>
    
    <div class="price-display" id="realtime-price">0000.00</div>
</header>

<div class="container">
    <div class="card">
        <table class="table">
            <thead>
                <tr>
                    <th>TIMEFRAME</th>
                    <th>MARKET STRUCTURE (MSB)</th>
                    <th>SMC (FVG/OB)</th>
                    <th>FRACTAL TARGET</th>
                    <th>SIGNAL</th>
                    <th>ENTRY / SL / TP</th>
                </tr>
            </thead>
            <tbody id="results-body">
                </tbody>
        </table>
    </div>
</div>

<script>
/** * 1. INDEXED DB (Αντικατάσταση localStorage για σταθερότητα)
 */
let db;
const DB_INIT = () => {
    const request = indexedDB.open("ScannerDB", 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("ticks")) db.createObjectStore("ticks", { keyPath: "time" });
    };
    request.onsuccess = (e) => { db = e.target.result; startSystem(); };
};

async function logTick(tick) {
    if (!db) return;
    const tx = db.transaction("ticks", "readwrite");
    tx.objectStore("ticks").add(tick);
}

/**
 * 2. Ο ΔΙΚΟΣ ΣΟΥ SCRAPER (Ακριβής ανάγνωση από το Widget)
 */
window._priceHistory = [];
window._lastVal = 0;
window._activeSignals = {}; 

function scraper() {
    setInterval(() => {
        const container = document.getElementById('tv-scraper-container');
        if (!container) return;
        
        // Ψάχνουμε την τιμή ακριβώς όπως την έπαιρνες εσύ
        const spans = container.querySelectorAll('span, div');
        for (let s of spans) {
            const raw = s.textContent.replace(/,/g, '').trim();
            const val = parseFloat(raw);
            
            if (val > 1500 && val < 4000) { // Έλεγχος εγκυρότητας τιμής Gold
                if (val !== window._lastVal) {
                    window._lastVal = val;
                    document.getElementById('realtime-price').textContent = val.toFixed(2);
                    
                    const tick = { time: Date.now(), price: val };
                    window._priceHistory.push(tick);
                    if (window._priceHistory.length > 10000) window._priceHistory.shift();
                    
                    logTick(tick);
                    processAnalysis();
                }
                break;
            }
        }
    }, 500); // Συχνή ανάγνωση για tick-by-tick ακρίβεια
}

/**
 * 3. SMC & MSB LOGIC (Σταθερότητα & Επιβεβαίωση)
 */
const TFS = { "M1": 60, "M5": 300, "M15": 900, "H1": 3600 };

function processAnalysis() {
    const tbody = document.getElementById('results-body');
    let html = '';

    for (let tf in TFS) {
        const candles = getCandles(TFS[tf]);
        if (candles.length < 20) continue;

        const last = candles[candles.length - 1];
        const prev = candles[candles.length - 2];
        const prev2 = candles[candles.length - 3];

        // 1. Market Structure Break (MSB)
        const high20 = Math.max(...candles.slice(-20, -1).map(c => c.high));
        const low20 = Math.min(...candles.slice(-20, -1).map(c => c.low));
        let msb = last.close > high20 ? "BULL_MSB" : (last.close < low20 ? "BEAR_MSB" : null);

        // 2. FVG (Fair Value Gap)
        let fvg = (last.low > prev2.high) ? "BULL_FVG" : (last.high < prev2.low ? "BEAR_FVG" : null);

        // Signal State Logic
        if (!window._activeSignals[tf]) {
            window._activeSignals[tf] = { status: 'WAIT', entry: 0, sl: 0, tp: 0, conf: 0 };
        }
        let sig = window._activeSignals[tf];

        // Σταθεροποίηση: Πρέπει MSB και FVG να συμφωνούν
        let logicSig = 'WAIT';
        if (msb === 'BULL_MSB' && fvg === 'BULL_FVG') logicSig = 'BUY';
        if (msb === 'BEAR_MSB' && fvg === 'BEAR_FVG') logicSig = 'SELL';

        // Signal Lock (Αντι-flicker)
        if (logicSig !== 'WAIT' && sig.status === 'WAIT') {
            sig.conf++;
            if (sig.conf >= 5) { // Χρειάζεται 5 συνεχή ticks επιβεβαίωσης
                sig.status = logicSig;
                sig.entry = last.close;
                const range = 3.0; // SL/TP Range για Gold
                sig.sl = sig.status === 'BUY' ? sig.entry - range : sig.entry + range;
                sig.tp = sig.status === 'BUY' ? sig.entry + (range * 2.5) : sig.entry - (range * 2.5);
            }
        } else if (logicSig === 'WAIT' && sig.status === 'WAIT') {
            sig.conf = 0;
        }

        // Auto-Reset: Αν η τιμή περάσει το TP/SL, το σήμα φεύγει
        if (sig.status !== 'WAIT') {
            const curP = window._lastVal;
            if (sig.status === 'BUY' && (curP >= sig.tp || curP <= sig.sl)) resetSig(tf);
            if (sig.status === 'SELL' && (curP <= sig.tp || curP >= sig.sl)) resetSig(tf);
        }

        html += `
            <tr>
                <td><b>${tf}</b></td>
                <td style="color:${msb ? 'var(--gold)' : 'inherit'}">${msb || 'Ranging'}</td>
                <td style="font-size:11px">${fvg || '—'}</td>
                <td><span class="pips-badge">${sig.status !== 'WAIT' ? '+85 PIPS' : '—'}</span></td>
                <td><span class="${sig.status === 'BUY' ? 'sig-buy' : (sig.status === 'SELL' ? 'sig-sell' : '')}">${sig.status}</span></td>
                <td style="font-size:12px">
                    ${sig.status !== 'WAIT' ? `Entry: ${sig.entry.toFixed(2)}<br>TP: ${sig.tp.toFixed(2)}` : 'Scanning...'}
                </td>
            </tr>
        `;
    }
    tbody.innerHTML = html;
}

function resetSig(tf) { window._activeSignals[tf] = { status: 'WAIT', entry: 0, sl: 0, tp: 0, conf: 0 }; }

function getCandles(sec) {
    const ms = sec * 1000;
    const groups = {};
    window._priceHistory.forEach(t => {
        const k = Math.floor(t.time / ms) * ms;
        if (!groups[k]) groups[k] = { open: t.price, high: t.price, low: t.price, close: t.price };
        groups[k].high = Math.max(groups[k].high, t.price);
        groups[k].low = Math.min(groups[k].low, t.price);
        groups[k].close = t.price;
    });
    return Object.values(groups);
}

function startSystem() { scraper(); }
DB_INIT();
</script>
</body>
</html>
