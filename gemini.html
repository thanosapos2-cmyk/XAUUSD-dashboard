<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAUUSD Pro Trading System</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050709; --surface: #090d12; --panel: #0b1018; --border: #1c2a3a;
  --gold: #f5c842; --gold2: #e8a020; --gold-glow: rgba(245,200,66,0.25);
  --green: #00e5a0; --red: #ff4060; --blue: #3de0ff; --purple: #a855f7;
  --text: #c8d8e8; --muted: #3d5068; --muted2: #5a7090;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 14px; min-height: 100vh; overflow-x: hidden; }

/* GOLD GRID BG */
body::before { content:''; position: fixed; inset:0; background-image: linear-gradient(rgba(245,200,66,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(245,200,66,0.025) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index:0; }

/* HEADER */
.header { position: sticky; top:0; z-index:200; background: rgba(5,7,9,0.96); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
.logo { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900; letter-spacing: 4px; background: linear-gradient(135deg, var(--gold), var(--gold2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 12px var(--gold-glow)); }

/* TABS */
.tabs { display:flex; gap:2px; padding: 0 28px; background: var(--surface); border-bottom: 1px solid var(--border); position: relative; z-index:10; }
.tab { padding: 12px 22px; font-family:'Orbitron',sans-serif; font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color: var(--muted2); cursor:pointer; border-bottom: 2px solid transparent; transition: all 0.25s; }
.tab.active { color:var(--gold); border-bottom-color: var(--gold); }

/* PANELS */
.panel { display:none; padding: 24px 28px; position:relative; z-index:1; animation: fadeUp 0.3s ease; }
.panel.active { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* SECTION HEADER */
.sh { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
.sh-title { font-family:'Orbitron',sans-serif; font-size:13px; font-weight:700; letter-spacing:3px; color:var(--gold); white-space:nowrap; }
.sh-line { flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }

/* STAT CARDS */
.stat-card { background: var(--panel); border: 1px solid var(--border); border-radius:6px; padding:16px; position:relative; overflow:hidden; transition: 0.25s; }
.stat-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--muted2); margin-bottom:8px; }
.stat-val { font-family:'Orbitron',sans-serif; font-size:24px; font-weight:700; }

.grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.decision-box { margin-top:10px; padding:10px; border-radius:4px; text-align:center; font-family:'Orbitron'; font-weight:900; }
.BUY { color: var(--green); border: 1px solid var(--green); background: rgba(0,229,160,0.05); }
.SELL { color: var(--red); border: 1px solid var(--red); background: rgba(255,64,96,0.05); }
.WAIT { color: var(--muted2); border: 1px solid var(--border); }
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="logo">XAU/USD PRO</div>
    <div style="font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted2);">SMC STRICT EDITION</div>
  </div>
  <div id="tv-widget-wrap" style="min-width:200px">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
      { "symbol": "FX_IDC:XAUUSD", "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "en" }
      </script>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('smc-panel', this)">⚡ SMC STRICT</div>
  <div class="tab" onclick="showTab('old-overview', this)">📊 OVERVIEW</div>
</div>

<div id="smc-panel" class="panel active">
  <div class="sh"><div class="sh-title">⚡ SMART MONEY CONCEPTS (STRICT)</div><div class="sh-line"></div></div>
  <div style="margin-bottom:20px; font-family:'Share Tech Mono'; font-size:11px; color:var(--gold)">
    STATUS: <span id="smc-status" style="color:var(--red)">SEARCHING PRICE...</span> | 
    TICKS: <span id="smc-tick-count">0</span>
  </div>
  <div class="grid3" id="smc-display">
    </div>
</div>

<div id="old-overview" class="panel">
  <div class="sh"><div class="sh-title">SYSTEM MONITOR</div><div class="sh-line"></div></div>
  <p style="color:var(--muted2)">Το παλιό overview περιεχόμενο παραμένει εδώ...</p>
</div>

<script>
// --- GLOBAL DATA ---
let priceHistory = [];
const MAX_TICKS = 100000;
const T_FRAMES = ['M1', 'M5', 'M15', 'M30', 'H1'];
const TF_MAP = { M1: 60, M5: 300, M15: 900, M30: 1800, H1: 3600 };

// --- SCRAPER LOGIC (ΕΠΙΜΟΝΗ ΑΝΑΖΗΤΗΣΗ ΣΤΟ DOM) ---
function scrapePrice() {
    const elements = document.querySelectorAll('.tradingview-widget-container span, .tradingview-widget-container div');
    let found = null;
    elements.forEach(el => {
        const val = parseFloat(el.innerText.replace(/,/g, ''));
        if (!isNaN(val) && val > 1500 && val < 4000 && el.innerText.includes('.')) {
            found = val;
        }
    });

    if (found) {
        const now = Date.now();
        if (priceHistory.length === 0 || priceHistory[priceHistory.length - 1].p !== found) {
            priceHistory.push({ p: found, t: now });
            if (priceHistory.length > MAX_TICKS) priceHistory.shift();
            document.getElementById('smc-status').innerText = "RUNNING";
            document.getElementById('smc-status').style.color = "var(--green)";
            document.getElementById('smc-tick-count').innerText = priceHistory.length;
        }
    }
}

// --- SMC ENGINE ---
function getCandles(tf) {
    const sec = TF_MAP[tf] * 1000;
    const candles = [];
    if (priceHistory.length === 0) return [];
    let cur = null;
    priceHistory.forEach(tick => {
        const bucket = Math.floor(tick.t / sec) * sec;
        if (!cur || cur.time !== bucket) {
            if (cur) candles.push(cur);
            cur = { time: bucket, open: tick.p, high: tick.p, low: tick.p, close: tick.p };
        } else {
            cur.high = Math.max(cur.high, tick.p);
            cur.low = Math.min(cur.low, tick.p);
            cur.close = tick.p;
        }
    });
    return candles;
}

function runStrictSMC(tf) {
    const candles = getCandles(tf);
    if (candles.length < 12) return { decision: 'WAIT', ob: 'NONE', fvg: 'NONE', fractal: 'NEUTRAL' };

    const last = candles[candles.length - 1];
    const prev = candles[candles.length - 2];
    const p3 = candles[candles.length - 3];

    // 1. Order Block (OB)
    const obBull = candles.slice(-12, -2).find(c => c.close < c.open && prev.close > c.high);
    const obBear = candles.slice(-12, -2).find(c => c.close > c.open && prev.close < c.low);

    // 2. Fair Value Gap (FVG)
    const fvgBull = prev.low > p3.high;
    const fvgBear = prev.high < p3.low;

    // 3. Fractal Similarity (Bottom/Top)
    const isBot = prev.low < p3.low && prev.low < last.low;
    const isTop = prev.high > p3.high && prev.high > last.high;

    let decision = 'WAIT';
    // STRICT CONFLUENCE: Πρέπει να ισχύουν και τα 3
    if (obBull && fvgBull && isBot) decision = 'BUY';
    if (obBear && fvgBear && isTop) decision = 'SELL';

    return {
        decision,
        ob: obBull ? 'BULL OB' : (obBear ? 'BEAR OB' : 'NONE'),
        fvg: fvgBull ? 'BULL' : (fvgBear ? 'BEAR' : 'NONE'),
        fractal: isBot ? 'BULLISH' : (isTop ? 'BEARISH' : 'NEUTRAL')
    };
}

// --- UI UPDATE ---
function updateSMCUI() {
    const container = document.getElementById('smc-display');
    let html = '';
    T_FRAMES.forEach(tf => {
        const data = runStrictSMC(tf);
        html += `
            <div class="stat-card">
                <div class="stat-label">${tf} TIMEFRAME</div>
                <div style="font-size:11px; margin-bottom:4px;">OB: <span style="color:var(--gold)">${data.ob}</span></div>
                <div style="font-size:11px; margin-bottom:4px;">FVG: <span style="color:var(--gold)">${data.fvg}</span></div>
                <div style="font-size:11px; margin-bottom:12px;">FRAC: <span style="color:var(--gold)">${data.fractal}</span></div>
                <div class="decision-box ${data.decision}">${data.decision}</div>
            </div>`;
    });
    container.innerHTML = html;
}

function showTab(id, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
}

// LOOPS
setInterval(scrapePrice, 1000);
setInterval(updateSMCUI, 2000);
</script>

</body>
</html>
