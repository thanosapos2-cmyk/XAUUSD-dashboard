<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>XAUUSD PRO · SMC & MSB Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --panel: rgba(13, 19, 28, 0.8);
            --border: #1e2d3d;
            --gold: #ffcc33;
            --green: #00ffaa;
            --red: #ff3366;
            --muted: #647a90;
            --text: #e0e6ed;
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #0a101a 0%, #030508 100%);
            color: var(--text); 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding: 0; 
            min-height: 100vh;
        }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 25px; border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
            background: rgba(3, 5, 8, 0.8);
        }

        .logo { font-family: 'Orbitron', sans-serif; color: var(--gold); font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 15px rgba(255,204,51,0.4); }
        
        .container { padding: 20px; max-width: 1400px; margin: 0 auto; }

        .panel-card {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 15px;
            backdrop-filter: blur(5px); box-shadow: var(--shadow);
        }

        .grid-main { display: grid; grid-template-columns: 1fr; gap: 15px; }

        .table { width: 100%; border-collapse: separate; border-spacing: 0 8px; font-family: 'Share Tech Mono', monospace; }
        .table th { padding: 12px; color: var(--muted); text-transform: uppercase; font-size: 11px; text-align: left; }
        .table td { padding: 15px 12px; background: rgba(255,255,255,0.03); border-top: 1px solid rgba(255,255,255,0.05); }
        .table tr:hover td { background: rgba(255,255,255,0.07); }

        .signal-buy { color: var(--green); font-weight: 700; text-shadow: 0 0 10px rgba(0,255,170,0.3); }
        .signal-sell { color: var(--red); font-weight: 700; text-shadow: 0 0 10px rgba(255,51,102,0.3); }
        .signal-wait { color: var(--muted); }

        .badge-msb { background: rgba(255,204,51,0.1); color: var(--gold); padding: 2px 6px; border-radius: 4px; font-size: 10px; border: 1px solid var(--gold); }
        
        .fractal-pips { color: var(--gold); font-weight: bold; border-bottom: 1px dashed var(--gold); }

        .live-badge { font-family: 'Share Tech Mono', monospace; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); box-shadow: 0 0 8px var(--muted); }
        .status-dot.active { background: var(--green); box-shadow: 0 0 10px var(--green); }

        .canvas-spark { width: 100%; height: 50px; filter: drop-shadow(0 0 5px rgba(0,255,170,0.2)); }
        
        button { cursor: pointer; background: var(--border); color: var(--text); border: none; padding: 8px 15px; border-radius: 6px; font-family: 'Orbitron'; font-size: 10px; }
        button:hover { background: var(--gold); color: #000; }

        @media (min-width: 1100px) { .grid-main { grid-template-columns: 3fr 1fr; } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">XAU/USD · PRO SCANNER</div>
    <div style="display:flex; gap:20px; align-items:center">
        <div id="price-display" style="font-family:'Orbitron'; font-size:22px; color:var(--gold)">0.00</div>
        <div class="live-badge">
            <span class="status-dot" id="live-dot"></span>
            <span id="live-status-text" style="font-size:12px">CONNECTING</span>
        </div>
    </div>
</header>

<div class="container">
    <div class="grid-main">
        <div class="panel-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center">
                <h3 style="margin:0; font-family:'Orbitron'; font-size:14px; color:var(--muted)">MARKET ANALYSIS ENGINE</h3>
                <span class="small" style="color:var(--muted); font-size:11px">DATABASE: <b id="db-count">0</b> TICKS</span>
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>TF</th>
                        <th>MSB/Structure</th>
                        <th>SMC Zones (OB/FVG)</th>
                        <th>Fractal Target</th>
                        <th>Signal</th>
                        <th>Entry/SL/TP</th>
                        <th>Est. Profit</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                    </tbody>
            </table>
        </div>

        <div class="panel-card">
            <h3 style="margin:0 0 15px 0; font-family:'Orbitron'; font-size:13px; color:var(--gold)">REAL-TIME VOLATILITY</h3>
            <canvas id="spark-canvas" class="canvas-spark"></canvas>
            <div style="margin-top:20px">
                <div style="font-size:12px; color:var(--muted); margin-bottom:10px">CONTROLS</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <button onclick="clearDatabase()">WIPE DB</button>
                    <button onclick="forceAnalyze()">REFRESH</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * SETTINGS & STATE
 */
const DB_NAME = "XAUScannerDB";
const STORE_NAME = "ticks";
const TFS = ['M1','M5','M15','M30','H1'];
const TF_MAP = {M1:60, M5:300, M15:900, M30:1800, H1:3600};

let db;
window._priceHistory = [];
window._lastKnownPrice = null;
window._activeSignals = {}; // Για σταθερότητα σημάτων

/**
 * INDEXED DB ENGINE
 */
const initDB = () => {
    return new Promise((resolve) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { keyPath: "time" });
            }
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadRecentTicks().then(resolve);
        };
    });
};

async function saveTick(tick) {
    if (!db) return;
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).add(tick);
}

async function loadRecentTicks() {
    const tx = db.transaction(STORE_NAME, "readonly");
    const store = tx.objectStore(STORE_NAME);
    const request = store.getAll(); 
    return new Promise(res => {
        request.onsuccess = () => {
            window._priceHistory = request.result.slice(-50000); // Κρατάμε τα τελευταία 50k στην RAM
            document.getElementById('db-count').textContent = window._priceHistory.length;
            res();
        };
    });
}

function clearDatabase() {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).clear();
    window._priceHistory = [];
    location.reload();
}

/**
 * MSB & SMC LOGIC
 */
function detectMSB(candles) {
    if (candles.length < 20) return null;
    const highs = candles.map(c => c.high);
    const lows = candles.map(c => c.low);
    
    // Εντοπισμός Swing Points
    let lastSwingHigh = Math.max(...highs.slice(-20, -5));
    let lastSwingLow = Math.min(...lows.slice(-20, -5));
    
    const currentClose = candles[candles.length - 1].close;
    
    if (currentClose > lastSwingHigh) return { type: 'BOS/MSB', dir: 'BULLISH', level: lastSwingHigh };
    if (currentClose < lastSwingLow) return { type: 'BOS/MSB', dir: 'BEARISH', level: lastSwingLow };
    return null;
}

function analyzeTimeframe(tf) {
    const candles = buildCandles(tf);
    if (!candles || candles.length < 25) return { ready: false };

    const msb = detectMSB(candles);
    const ob = detectOB(candles); // Simplified OB check
    const fvg = detectFVG(candles);
    const fractal = findFractalPattern(candles.map(c => c.close));

    // Decision Logic with MSB Filter
    let logicDir = 'WAIT';
    if (msb) {
        if (msb.dir === 'BULLISH' && (ob?.type === 'BULL_OB' || fvg?.type === 'BULL_FVG')) logicDir = 'BUY';
        if (msb.dir === 'BEARISH' && (ob?.type === 'BEAR_OB' || fvg?.type === 'BEAR_FVG')) logicDir = 'SELL';
    }

    // Stability & Persistence (Signal lock)
    updateSignalState(tf, logicDir, candles[candles.length-1].close, fractal);

    return {
        tf, msb, ob, fvg, fractal,
        state: window._activeSignals[tf]
    };
}

function updateSignalState(tf, logicDir, price, fractal) {
    if (!window._activeSignals[tf]) {
        window._activeSignals[tf] = { status: 'WAIT', entry: null, sl: null, tp: null, pips: 0, conf: 0 };
    }

    let s = window._activeSignals[tf];

    // Reset if trade passed
    if (s.status === 'BUY' && (price >= s.tp || price <= s.sl)) { s.status = 'WAIT'; s.conf = 0; }
    if (s.status === 'SELL' && (price <= s.tp || price >= s.sl)) { s.status = 'WAIT'; s.conf = 0; }

    // Signal confirmation (απαιτεί 3 συνεχόμενα hits για να "κλειδώσει")
    if (logicDir !== 'WAIT' && s.status === 'WAIT') {
        s.conf++;
        if (s.conf >= 3) {
            s.status = logicDir;
            s.entry = price;
            const atr = calculateATR(tf);
            s.sl = logicDir === 'BUY' ? price - (atr * 1.5) : price + (atr * 1.5);
            s.tp = logicDir === 'BUY' ? price + (atr * 3) : price - (atr * 3);
            s.pips = fractal ? Math.abs(fractal.predictedMove * 1000).toFixed(0) : 0;
        }
    } else if (logicDir === 'WAIT' && s.status === 'WAIT') {
        s.conf = 0;
    }
}

/**
 * UI RENDERING
 */
function render() {
    const tbody = document.getElementById('results-body');
    tbody.innerHTML = '';

    TFS.forEach(tf => {
        const res = analyzeTimeframe(tf);
        if (!res.ready) return;

        const s = res.state;
        const sigClass = s.status === 'BUY' ? 'signal-buy' : (s.status === 'SELL' ? 'signal-sell' : 'signal-wait');
        
        const row = `
            <tr>
                <td><b style="color:var(--gold)">${tf}</b></td>
                <td>${res.msb ? `<span class="badge-msb">${res.msb.dir}</span>` : '<span style="color:var(--muted)">RANGING</span>'}</td>
                <td style="font-size:11px">
                    ${res.ob ? `<div style="color:var(--green)">OB: ${res.ob.type}</div>` : ''}
                    ${res.fvg ? `<div style="color:var(--gold)">FVG: DETECTED</div>` : ''}
                </td>
                <td><span class="fractal-pips">${s.pips > 0 ? '+' + s.pips + ' PIPS' : '—'}</span></td>
                <td class="${sigClass}">${s.status}</td>
                <td style="font-size:12px; font-family:'Share Tech Mono'">
                    ${s.entry ? `E: ${s.entry.toFixed(2)}<br>TP: ${s.tp.toFixed(2)}` : '—'}
                </td>
                <td style="color:var(--green)">${s.status !== 'WAIT' ? '$' + (s.pips * 1).toFixed(2) : '—'}</td>
            </tr>
        `;
        tbody.insertAdjacentHTML('beforeend', row);
    });

    if (window._lastKnownPrice) {
        const el = document.getElementById('price-display');
        el.textContent = window._lastKnownPrice.toFixed(2);
        document.getElementById('live-dot').classList.add('active');
        document.getElementById('live-status-text').textContent = "LIVE";
    }
}

/**
 * HELPERS (Candles, ATR, OB, etc.)
 */
function buildCandles(tf) {
    const tfMs = TF_MAP[tf] * 1000;
    const history = window._priceHistory;
    if (history.length < 10) return null;
    
    const buckets = {};
    history.forEach(t => {
        const k = Math.floor(t.time / tfMs) * tfMs;
        if (!buckets[k]) buckets[k] = { open: t.price, high: t.price, low: t.price, close: t.price, time: k };
        else {
            buckets[k].high = Math.max(buckets[k].high, t.price);
            buckets[k].low = Math.min(buckets[k].low, t.price);
            buckets[k].close = t.price;
        }
    });
    return Object.values(buckets).sort((a,b) => a.time - b.time);
}

function detectOB(candles) {
    const last = candles[candles.length-2];
    const prev = candles[candles.length-3];
    if (!last || !prev) return null;
    if (Math.abs(last.close - last.open) > Math.abs(prev.close - prev.open) * 2) {
        return { type: last.close > last.open ? 'BULL_OB' : 'BEAR_OB' };
    }
    return null;
}

function detectFVG(candles) {
    const c1 = candles[candles.length-3], c3 = candles[candles.length-1];
    if (!c1 || !c3) return null;
    if (c3.low > c1.high) return { type: 'BULL_FVG' };
    if (c3.high < c1.low) return { type: 'BEAR_FVG' };
    return null;
}

function calculateATR(tf) {
    return 1.2; // Simplified for XAUUSD. Πραγματικό ATR calculation προαιρετικό.
}

function findFractalPattern(closes) {
    if (closes.length < 15) return null;
    return { predictedMove: 0.05 + Math.random() * 0.1 }; // Mock prediction for Pips visualization
}

// Sparkline
function drawSpark() {
    const canvas = document.getElementById('spark-canvas');
    const ctx = canvas.getContext('2d');
    const data = window._priceHistory.slice(-100).map(t => t.price);
    if (data.length < 2) return;
    
    ctx.clearRect(0,0, canvas.width, canvas.height);
    const min = Math.min(...data), max = Math.max(...data), range = max - min;
    ctx.beginPath();
    ctx.strokeStyle = data[data.length-1] > data[0] ? '#00ffaa' : '#ff3366';
    ctx.lineWidth = 2;
    data.forEach((p, i) => {
        const x = (i / (data.length-1)) * canvas.width;
        const y = canvas.height - ((p - min) / range) * canvas.height;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
}

/**
 * INITIALIZATION
 */
initDB().then(() => {
    console.log("System Ready");
    
    // Simulation / Tick Ingester
    setInterval(() => {
        const base = window._lastKnownPrice || 2150.00;
        const newPrice = base + (Math.random() - 0.5) * 0.5;
        const tick = { time: Date.now(), price: newPrice };
        window._priceHistory.push(tick);
        window._lastKnownPrice = newPrice;
        saveTick(tick);
        if (window._priceHistory.length % 10 === 0) {
            render();
            drawSpark();
        }
    }, 1000);
});

function forceAnalyze() { render(); drawSpark(); }

</script>
</body>
</html>
