<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD STRICT SMC ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020406; --card: #0a0e14; --border: #1a222d;
            --gold: #f5c842; --green: #00ffaa; --red: #ff3355; --text: #e0e6ed; --muted: #607080;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; padding: 20px; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .live-info { display: flex; gap: 30px; text-align: right; }
        .val { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; display: block; }
        .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; transition: 0.3s; }
        .tf-label { font-family: 'Orbitron', sans-serif; font-size: 18px; color: var(--gold); margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        /* TABLE */
        .stats-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .stats-table td { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 12px; }
        .indicator-name { color: var(--muted); }
        .indicator-status { text-align: right; font-weight: bold; }

        /* SIGNALS */
        .decision-box { padding: 15px; border-radius: 8px; text-align: center; background: rgba(255,255,255,0.03); border: 1px dashed var(--border); }
        .decision-box.BUY { border: 2px solid var(--green); background: rgba(0,255,170,0.05); }
        .decision-box.SELL { border: 2px solid var(--red); background: rgba(255,51,85,0.05); }
        
        .signal-title { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; margin-bottom: 10px; }
        .BUY .signal-title { color: var(--green); }
        .SELL .signal-title { color: var(--red); }
        
        .targets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .t-item { background: #000; padding: 8px; border-radius: 4px; border: 1px solid var(--border); }
        .t-lbl { font-size: 8px; color: var(--muted); display: block; margin-bottom: 3px; }
        .t-val { font-size: 11px; font-weight: bold; }

        /* WIDGET CONTAINER */
        #scraper-container { position: fixed; bottom: 0; right: 0; width: 200px; height: 60px; z-index: -100; opacity: 0.01; overflow: hidden; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">XAUUSD PURE SMC</div>
    <div class="live-info">
        <div><span class="lbl">Price (Scraped)</span><span id="price-display" class="val">---</span></div>
        <div><span class="lbl">Ticks Stored</span><span id="ticks-display" class="val">0</span></div>
    </div>
</div>

<div class="grid" id="main-grid"></div>

<div id="scraper-container">
    <div class="tradingview-widget-container" id="tv-widget">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
        { "symbol": "FX_IDC:XAUUSD", "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "en" }
        </script>
    </div>
</div>

<script>
// --- CONFIGURATION ---
const MAX_TICKS = 200000;
let ticks = [];
const timeframes = ['M1', 'M3', 'M5', 'M15', 'M30', 'M45', 'H1'];
const tfSeconds = { M1: 60, M3: 180, M5: 300, M15: 900, M30: 1800, M45: 2700, H1: 3600 };

// --- DOM SCRAPER (ΒΡΙΣΚΕΙ ΤΗΝ ΤΙΜΗ ΟΠΟΥ ΚΑΙ ΝΑ ΕΙΝΑΙ) ---
function scrapePrice() {
    const container = document.getElementById('tv-widget');
    if (!container) return;

    const allElements = container.getElementsByTagName('*');
    for (let el of allElements) {
        if (el.children.length === 0) { // Μόνο τελικά στοιχεία κειμένου
            const text = el.innerText.replace(/,/g, '').trim();
            const num = parseFloat(text);
            // Έλεγχος αν είναι ρεαλιστική τιμή χρυσού
            if (!isNaN(num) && num > 1800 && num < 3500 && text.includes('.')) {
                addTick(num);
                break; 
            }
        }
    }
}

function addTick(p) {
    const now = Date.now();
    if (ticks.length === 0 || ticks[ticks.length - 1].p !== p) {
        ticks.push({ p: p, t: now });
        if (ticks.length > MAX_TICKS) ticks.shift();
        
        document.getElementById('price-display').innerText = p.toFixed(2);
        document.getElementById('ticks-display').innerText = ticks.length.toLocaleString();
    }
}

// --- CANDLE GENERATOR ---
function getCandles(tf) {
    const sec = tfSeconds[tf] * 1000;
    const candles = [];
    if (ticks.length === 0) return [];

    let current = null;
    ticks.forEach(t => {
        const bucket = Math.floor(t.t / sec) * sec;
        if (!current || current.time !== bucket) {
            if (current) candles.push(current);
            current = { time: bucket, open: t.p, high: t.p, low: t.p, close: t.p };
        } else {
            current.high = Math.max(current.high, t.p);
            current.low = Math.min(current.low, t.p);
            current.close = t.p;
        }
    });
    return candles;
}

// --- SMC LOGIC ENGINE ---
function analyzeSMC(tf) {
    const candles = getCandles(tf);
    if (candles.length < 20) return null;

    const n = candles.length;
    const last = candles[n-1];
    const prev = candles[n-2];
    const p3 = candles[n-3];
    const p4 = candles[n-4];

    // 1. ORDER BLOCKS (STRICT)
    let obBull = false, obBear = false;
    let obPrice = 0;
    // Αναζήτηση στα τελευταία 15 κεριά για "Clear Break of Structure"
    for (let i = n - 15; i < n - 2; i++) {
        if (candles[i].close < candles[i].open && candles[i+1].close > candles[i].high) {
            obBull = true; obPrice = candles[i].low;
        }
        if (candles[i].close > candles[i].open && candles[i+1].close < candles[i].low) {
            obBear = true; obPrice = candles[i].high;
        }
    }

    // 2. FVG (FAIR VALUE GAP)
    const fvgBull = prev.low > p3.high;
    const fvgBear = prev.high < p3.low;

    // 3. FRACTAL SIMILARITY (TREND & PROJECTION)
    const fractalBull = prev.low < p3.low && prev.low < p4.low && last.close > prev.high;
    const fractalBear = prev.high > p3.high && prev.high > p4.high && last.close < prev.low;

    // TARGET PROJECTION (Based on previous wave size)
    const waveSize = Math.abs(candles[n-10].high - candles[n-10].low) || 5;

    // FINAL DECISION (INDIVIDUAL REQUIREMENTS)
    let decision = 'WAIT';
    let entry = last.close, sl = 0, tp = 0;

    if (obBull && fvgBull && fractalBull) {
        decision = 'BUY';
        sl = obPrice - 0.5;
        tp = entry + waveSize;
    } else if (obBear && fvgBear && fractalBear) {
        decision = 'SELL';
        sl = obPrice + 0.5;
        tp = entry - waveSize;
    }

    return {
        ob: obBull ? 'BULL OB' : (obBear ? 'BEAR OB' : 'NONE'),
        fvg: fvgBull ? 'ACTIVE GAP' : (fvgBear ? 'ACTIVE GAP' : 'NONE'),
        fractal: fractalBull ? 'BULLISH' : (fractalBear ? 'BEARISH' : 'NEUTRAL'),
        decision, entry, sl, tp, count: n
    };
}

// --- UI UPDATE ---
function updateUI() {
    const grid = document.getElementById('main-grid');
    let html = '';

    timeframes.forEach(tf => {
        const data = analyzeSMC(tf);
        if (!data) {
            html += `<div class="card"><div class="tf-label">${tf}</div><p style="color:var(--muted)">Syncing Ticks... (${ticks.length})</p></div>`;
            return;
        }

        const dClass = data.decision;
        html += `
        <div class="card">
            <div class="tf-label">${tf}</div>
            <table class="stats-table">
                <tr><td class="indicator-name">Order Block</td><td class="indicator-status" style="color:var(--gold)">${data.ob}</td></tr>
                <tr><td class="indicator-name">Fair Value Gap</td><td class="indicator-status" style="color:var(--green)">${data.fvg}</td></tr>
                <tr><td class="indicator-name">Fractal Similarity</td><td class="indicator-status" style="color:var(--text)">${data.fractal}</td></tr>
            </table>

            <div class="decision-box ${dClass}">
                <div class="lbl">FINAL DECISION</div>
                <div class="signal-title">${data.decision}</div>
                
                ${data.decision !== 'WAIT' ? `
                <div class="targets">
                    <div class="t-item"><span class="t-lbl">ENTRY</span><span class="t-val">${data.entry.toFixed(2)}</span></div>
                    <div class="t-item"><span class="t-lbl">SL</span><span class="t-val" style="color:var(--red)">${data.sl.toFixed(2)}</span></div>
                    <div class="t-item"><span class="t-lbl">TP</span><span class="t-val" style="color:var(--green)">${data.tp.toFixed(2)}</span></div>
                </div>` : '<div style="font-size:10px; color:var(--muted)">Awaiting Strict Confluence</div>'}
            </div>
            <div style="font-size:9px; color:var(--muted); margin-top:10px; text-align:right">Candles: ${data.count}</div>
        </div>`;
    });
    grid.innerHTML = html;
}

// --- LOOPS ---
setInterval(scrapePrice, 1000); // Κάθε δευτερόλεπτο σαρώνει το DOM για νέα τιμή
setInterval(updateUI, 2000);    // Κάθε 2 δευτερόλεπτα ανανεώνει το Dashboard

</script>
</body>
</html>
