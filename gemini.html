<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAUUSD SMC DOM-Scraper Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #050709; --surface: #090d12; --panel: #0b1018; --border: #1c2a3a;
        --gold: #f5c842; --green: #00e5a0; --red: #ff4060; --text: #c8d8e8; --muted: #5a7090;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; padding: 20px; }

    .header { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border: 1px solid var(--border); padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; }
    .logo { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900; color: var(--gold); }

    /* TRADINGVIEW WIDGET CONTAINER - HIDDEN BUT ACTIVE */
    #tv-scraper-container {
        position: absolute; left: -10000px; top: 0; width: 200px; height: 200px; overflow: hidden;
    }

    .tf-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 15px; }
    .tf-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; }
    .tf-title { font-family: 'Orbitron', sans-serif; font-size: 18px; color: var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 10px; }

    .tf-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
    .tf-table td { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .label { color: var(--muted); font-size: 11px; }

    .decision-box { padding: 15px; border-radius: 6px; text-align: center; border: 1px solid var(--border); }
    .BUY { border-color: var(--green); background: rgba(0, 229, 160, 0.1); color: var(--green); }
    .SELL { border-color: var(--red); background: rgba(255, 64, 96, 0.1); color: var(--red); }
    .WAIT { color: var(--muted); }

    .stats { display: flex; gap: 20px; }
    .stat-item { text-align: right; }
    .val { font-family: 'Orbitron'; font-weight: 700; display: block; }
</style>
</head>
<body>

<div class="header">
    <div class="logo">XAUUSD PRO DOM-SMC</div>
    <div class="stats">
        <div class="stat-item"><span class="label">LIVE PRICE</span><span id="live-price" class="val">LOADING...</span></div>
        <div class="stat-item"><span class="label">TICKS</span><span id="tick-count" class="val">0</span></div>
    </div>
</div>

<div id="tv-scraper-container">
    <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
        { "symbol": "FX_IDC:XAUUSD", "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "en" }
        </script>
    </div>
</div>

<div class="tf-grid" id="main-grid"></div>

<script>
// --- CONFIG & GLOBALS ---
const MAX_TICKS = 200000;
let tickHistory = [];
const timeframes = ['M1', 'M5', 'M15', 'M30', 'H1'];
const TF_SECONDS = { M1: 60, M5: 300, M15: 900, M30: 1800, H1: 3600 };

// --- DOM SCRAPER ENGINE ---
function initDomScraper() {
    const targetNode = document.getElementById('tv-scraper-container');
    const observer = new MutationObserver(() => {
        // Ψάχνουμε για την τιμή μέσα στο widget shadow/iframe structure
        const priceElement = targetNode.querySelector('.tv-embed-widget-wrapper__body span[class*="last"], .tradingview-widget-container span');
        if (priceElement) {
            const rawPrice = priceElement.innerText.replace(/,/g, '');
            const price = parseFloat(rawPrice);
            if (!isNaN(price) && price > 0) {
                processNewTick(price);
            }
        }
    });
    observer.observe(targetNode, { childList: true, subtree: true, characterData: true });
}

function processNewTick(price) {
    const now = Date.now();
    tickHistory.push({ p: price, t: now });
    if (tickHistory.length > MAX_TICKS) tickHistory.shift();

    document.getElementById('live-price').innerText = price.toFixed(2);
    document.getElementById('tick-count').innerText = tickHistory.length.toLocaleString();
}

// --- SMC LOGIC (Strict) ---
function analyzeSMC(tf) {
    const candles = buildCandles(tf);
    if (candles.length < 20) return { decision: 'WAIT' };

    const last = candles[candles.length - 1];
    const prev = candles[candles.length - 2];
    const p3 = candles[candles.length - 3];
    
    // 1. Order Block (OB) - Last opposite candle before Break of Structure
    let obBull = candles.slice(-15, -5).find(c => c.close < c.open && candles[candles.length-2].close > c.high);
    let obBear = candles.slice(-15, -5).find(c => c.close > c.open && candles[candles.length-2].close < c.low);

    // 2. FVG (Fair Value Gap)
    const fvgBull = last.low > p3.high;
    const fvgBear = last.high < p3.low;

    // 3. Fractal Pattern Similarity
    const isFractalLow = prev.low < candles[candles.length-3].low && prev.low < last.low;
    const isFractalHigh = prev.high > candles[candles.length-3].high && prev.high > last.high;

    // Independent Requirements Check
    let decision = 'WAIT';
    let sl = 0, tp = 0;
    const atr = (last.high - last.low) * 2;

    if (obBull && fvgBull && isFractalLow) {
        decision = 'BUY';
        sl = obBull.low - (atr * 0.5);
        tp = last.close + (atr * 3);
    } else if (obBear && fvgBear && isFractalHigh) {
        decision = 'SELL';
        sl = obBear.high + (atr * 0.5);
        tp = last.close - (atr * 3);
    }

    return {
        decision, 
        ob: obBull ? 'BULL OB FOUND' : (obBear ? 'BEAR OB FOUND' : 'NONE'),
        fvg: fvgBull ? 'BULL FVG' : (fvgBear ? 'BEAR FVG' : 'NONE'),
        fractal: isFractalLow ? 'BULL FRACTAL' : (isFractalHigh ? 'BEAR FRACTAL' : 'NONE'),
        sl: sl.toFixed(2),
        tp: tp.toFixed(2)
    };
}

function buildCandles(tf) {
    const period = TF_SECONDS[tf] * 1000;
    const candles = [];
    if (tickHistory.length === 0) return [];

    let currentCandle = null;
    tickHistory.forEach(tick => {
        const bucket = Math.floor(tick.t / period) * period;
        if (!currentCandle || currentCandle.time !== bucket) {
            if (currentCandle) candles.push(currentCandle);
            currentCandle = { time: bucket, open: tick.p, high: tick.p, low: tick.p, close: tick.p };
        } else {
            currentCandle.high = Math.max(currentCandle.high, tick.p);
            currentCandle.low = Math.min(currentCandle.low, tick.p);
            currentCandle.close = tick.p;
        }
    });
    return candles;
}

// --- UI ENGINE ---
function updateUI() {
    const grid = document.getElementById('main-grid');
    let html = '';

    timeframes.forEach(tf => {
        const res = analyzeSMC(tf);
        html += `
            <div class="tf-card">
                <div class="tf-title">${tf} Analysis</div>
                <table class="tf-table">
                    <tr><td class="label">Order Block</td><td>${res.ob || 'Searching...'}</td></tr>
                    <tr><td class="label">FVG Detection</td><td>${res.fvg || 'Searching...'}</td></tr>
                    <tr><td class="label">Fractal Pattern</td><td>${res.fractal || 'Searching...'}</td></tr>
                </table>
                <div class="decision-box ${res.decision}">
                    <div style="font-size:20px; font-weight:900;">${res.decision}</div>
                    ${res.decision !== 'WAIT' ? `
                        <div style="margin-top:10px; font-size:12px;">
                            TP: <span class="c-green">${res.tp}</span> | SL: <span class="c-red">${res.sl}</span>
                        </div>
                    ` : '<div style="font-size:10px;">Waiting for Strict Confluence...</div>'}
                </div>
            </div>
        `;
    });
    grid.innerHTML = html;
}

// Initialization
initDomScraper();
setInterval(updateUI, 1000);
</script>
</body>
</html>
