<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD STRICT SMC DOM ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #040608; --panel: #0b1118; --border: #1e293b;
            --gold: #f5c842; --green: #00ffaa; --red: #ff3355; --text: #e2e8f0; --muted: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; padding: 15px; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; border-top: 3px solid var(--gold); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; color: var(--gold); letter-spacing: 2px; }
        .live-stats { display: flex; gap: 40px; }
        .stat-group { text-align: right; }
        .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; }

        /* WIDGET CONTAINER - SCRAPING TARGET */
        #tv-widget-box { position: fixed; top: -1000px; left: -1000px; width: 300px; height: 200px; opacity: 0.01; }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 20px; }
        .tf-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
        .tf-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 15px; }
        .tf-name { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--gold); font-weight: 800; }
        .tf-count { font-size: 10px; color: var(--muted); }

        /* TABLE */
        .data-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        .data-table td { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; }
        .lbl { color: var(--muted); width: 50%; }
        .val { text-align: right; font-weight: bold; }
        .tag { padding: 3px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; }
        .tag-green { background: rgba(0,255,170,0.1); color: var(--green); border: 1px solid var(--green); }
        .tag-red { background: rgba(255,51,85,0.1); color: var(--red); border: 1px solid var(--red); }

        /* DECISION BOX */
        .decision-box { margin-top: auto; padding: 15px; border-radius: 8px; text-align: center; border: 2px solid var(--border); transition: 0.3s; }
        .decision-box.BUY { border-color: var(--green); background: rgba(0,255,170,0.05); }
        .decision-box.SELL { border-color: var(--red); background: rgba(255,51,85,0.05); }
        
        .signal { font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 900; letter-spacing: 2px; margin-bottom: 10px; color: var(--muted); }
        .BUY .signal { color: var(--green); }
        .SELL .signal { color: var(--red); }

        .targets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .t-box { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; border: 1px solid var(--border); }
        .t-lbl { font-size: 8px; color: var(--muted); display: block; margin-bottom: 4px; }
        .t-val { font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">XAUUSD STRICT DOM ENGINE</div>
    <div class="live-stats">
        <div class="stat-group"><span class="stat-label">DOM Price (TV)</span><div id="dom-price" class="stat-value" style="color:var(--gold)">CONNECTING...</div></div>
        <div class="stat-group"><span class="stat-label">Tick History</span><div id="tick-count" class="stat-value">0</div></div>
    </div>
</div>

<div class="grid" id="main-dashboard"></div>

<div id="tv-widget-box">
    <div class="tradingview-widget-container" id="tv-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
        { "symbol": "OANDA:XAUUSD", "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "en" }
        </script>
    </div>
</div>

<script>
// ==========================================
// 1. DATA STORAGE & CONFIG
// ==========================================
const MAX_TICKS = 200000;
let tickHistory = [];
const timeframes = ['M1', 'M3', 'M5', 'M15', 'M30', 'M45', 'H1'];
const TF_MAP = { M1: 60, M3: 180, M5: 300, M15: 900, M30: 1800, M45: 2700, H1: 3600 };

// ==========================================
// 2. DOM SCRAPER (THE EXACT WAY YOU ASKED)
// ==========================================
function scrapeTradingViewDOM() {
    const container = document.getElementById('tv-container');
    if (!container) return;

    // Ψάχνει βαθιά στο Shadow DOM ή στα iframe στοιχεία που κάνει embed το TV
    // Συνήθως η τιμή βρίσκεται σε classes που περιέχουν το "price" ή "last"
    const priceElements = container.querySelectorAll('span, div');
    let foundPrice = null;

    for (let el of priceElements) {
        const txt = el.innerText.replace(/,/g, '').trim();
        const val = parseFloat(txt);
        // Έλεγχος εγκυρότητας τιμής Χρυσού (μεταξύ 1500 και 3500)
        if (!isNaN(val) && val > 1500 && val < 3500 && txt.includes('.')) {
            foundPrice = val;
            break;
        }
    }

    if (foundPrice) {
        processNewTick(foundPrice);
    }
}

function processNewTick(price) {
    const now = Date.now();
    // Προσθήκη μόνο αν άλλαξε η τιμή
    if (tickHistory.length === 0 || tickHistory[tickHistory.length - 1].p !== price) {
        tickHistory.push({ p: price, t: now });
        if (tickHistory.length > MAX_TICKS) tickHistory.shift();
        
        document.getElementById('dom-price').innerText = price.toFixed(2);
        document.getElementById('tick-count').innerText = tickHistory.length.toLocaleString();
    }
}

// ==========================================
// 3. CANDLE CONSTRUCTOR
// ==========================================
function buildCandles(tf) {
    const ms = TF_MAP[tf] * 1000;
    const candles = [];
    if (tickHistory.length === 0) return [];

    let current = null;
    tickHistory.forEach(tk => {
        const bucket = Math.floor(tk.t / ms) * ms;
        if (!current || current.time !== bucket) {
            if (current) candles.push(current);
            current = { time: bucket, open: tk.p, high: tk.p, low: tk.p, close: tk.p };
        } else {
            current.high = Math.max(current.high, tk.p);
            current.low = Math.min(current.low, tk.p);
            current.close = tk.p;
        }
    });
    return candles;
}

// ==========================================
// 4. STRICT SMC & FRACTAL ENGINE
// ==========================================
function analyzeSTRICT(tf) {
    const candles = buildCandles(tf);
    if (candles.length < 20) return { status: 'SYNCING', count: candles.length };

    const n = candles.length;
    const cur = candles[n-1];
    const prev = candles[n-2];
    const p3 = candles[n-3];

    // --- ΔΕΙΚΤΗΣ 1: ORDER BLOCKS (Strict Independent) ---
    let obData = { type: 'NONE', price: 0 };
    for (let i = n-15; i < n-2; i++) {
        // Bullish OB: Last down candle before explosive up move
        if (candles[i].close < candles[i].open && candles[i+1].close > candles[i].high * 1.0005) {
            obData = { type: 'BULLISH', price: candles[i].low };
        }
        // Bearish OB: Last up candle before explosive down move
        if (candles[i].close > candles[i].open && candles[i+1].close < candles[i].low * 0.9995) {
            obData = { type: 'BEARISH', price: candles[i].high };
        }
    }

    // --- ΔΕΙΚΤΗΣ 2: FVG (Strict Independent) ---
    let fvgStatus = 'NONE';
    const isFvgBull = prev.low > p3.high;
    const isFvgBear = prev.high < p3.low;
    if (isFvgBull) fvgStatus = 'BULLISH GAP';
    if (isFvgBear) fvgStatus = 'BEARISH GAP';

    // --- ΔΕΙΚΤΗΣ 3: FRACTAL SIMILARITY (Strict Independent) ---
    // Υπολογισμός "κύματος" (Wave Size) για TP
    const lastSwingHigh = Math.max(...candles.slice(n-10, n).map(c => c.high));
    const lastSwingLow = Math.min(...candles.slice(n-10, n).map(c => c.low));
    const waveSize = lastSwingHigh - lastSwingLow;

    let fractalTrend = 'NEUTRAL';
    if (prev.low < p3.low && cur.close > prev.high) fractalTrend = 'BULLISH';
    if (prev.high > p3.high && cur.close < prev.low) fractalTrend = 'BEARISH';

    // --- ΤΕΛΙΚΗ ΑΠΟΦΑΣΗ (STRICT CONFLUENCE) ---
    let decision = 'WAIT';
    let entry = cur.close, sl = 0, tp = 0;

    // BUY entry μόνο αν και οι 3 δείκτες συμφωνούν μεμονωμένα
    if (obData.type === 'BULLISH' && isFvgBull && fractalTrend === 'BULLISH') {
        decision = 'BUY';
        sl = obData.price - 0.20;
        tp = entry + waveSize; // Fractal Similarity Projection
    } 
    // SELL entry
    else if (obData.type === 'BEARISH' && isFvgBear && fractalTrend === 'BEARISH') {
        decision = 'SELL';
        sl = obData.price + 0.20;
        tp = entry - waveSize;
    }

    return {
        status: 'READY',
        ob: obData.type,
        fvg: fvgStatus,
        fractal: fractalTrend,
        decision, entry, sl, tp, count: n
    };
}

// ==========================================
// 5. UI GENERATOR
// ==========================================
function refreshUI() {
    const dashboard = document.getElementById('main-dashboard');
    let html = '';

    timeframes.forEach(tf => {
        const res = analyzeSTRICT(tf);
        
        if (res.status === 'SYNCING') {
            html += `<div class="tf-card"><div class="tf-name">${tf}</div><p style="color:var(--muted)">Syncing DOM Ticks... (${res.count}/20)</p></div>`;
        } else {
            html += `
            <div class="tf-card">
                <div class="tf-header">
                    <div class="tf-name">${tf}</div>
                    <div class="tf-count">${res.count} Candles</div>
                </div>

                <table class="data-table">
                    <tr><td class="lbl">Order Block</td><td class="val"><span class="tag ${res.ob === 'BULLISH' ? 'tag-green' : 'tag-red'}">${res.ob}</span></td></tr>
                    <tr><td class="lbl">Fair Value Gap</td><td class="val"><span class="tag ${res.fvg.includes('BULL') ? 'tag-green' : 'tag-red'}">${res.fvg}</span></td></tr>
                    <tr><td class="lbl">Fractal Similarity</td><td class="val"><span class="tag ${res.fractal === 'BULLISH' ? 'tag-green' : 'tag-red'}">${res.fractal}</span></td></tr>
                </table>

                <div class="decision-box ${res.decision}">
                    <div class="signal">${res.decision}</div>
                    ${res.decision !== 'WAIT' ? `
                    <div class="targets-grid">
                        <div class="t-box"><span class="t-lbl">ENTRY</span><span class="t-val">${res.entry.toFixed(2)}</span></div>
                        <div class="t-box"><span class="t-lbl">STOP LOSS</span><span class="t-val" style="color:var(--red)">${res.sl.toFixed(2)}</span></div>
                        <div class="t-box"><span class="t-lbl">TOTAL PROFIT</span><span class="t-val" style="color:var(--green)">${res.tp.toFixed(2)}</span></div>
                    </div>
                    ` : `<div style="font-size:10px; color:var(--muted)">Awaiting Strict Independent Confirmation</div>`}
                </div>
            </div>`;
        }
    });
    dashboard.innerHTML = html;
}

// ==========================================
// 6. ENGINE LOOPS
// ==========================================
// Scraper: Τρέχει κάθε 500ms για να "αρπάξει" κάθε αλλαγή στο DOM του Widget
setInterval(scrapeTradingViewDOM, 500);

// UI/Logic: Τρέχει κάθε 1000ms για να ενημερώσει τους πίνακες
setInterval(refreshUI, 1000);
</script>

</body>
</html>
