<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>XAUUSD SMC STRICT - REALTIME</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #050709; --surface: #090d12; --panel: #0b1018; --border: #1c2a3a;
        --gold: #f5c842; --green: #00e5a0; --red: #ff4060; --text: #c8d8e8; --muted: #5a7090;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; padding: 20px; }

    /* TRADINGVIEW WIDGET - MUST BE VISIBLE TO SCRAPE */
    #widget-area {
        position: relative; width: 200px; height: 100px; margin-bottom: 20px; border: 1px solid var(--border);
    }

    .stats-bar { display: flex; gap: 40px; background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; align-items: center; }
    .stat-val { font-family: 'Orbitron'; font-size: 20px; color: var(--gold); font-weight: 700; }
    .label { font-size: 10px; color: var(--muted); display: block; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 15px; }
    .tf-header { font-family: 'Orbitron'; color: var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; }

    .smc-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
    .smc-table td { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 12px; }
    .c-muted { color: var(--muted); }

    .decision-box { padding: 15px; border-radius: 6px; text-align: center; border: 2px solid var(--border); font-family: 'Orbitron'; }
    .BUY { border-color: var(--green); background: rgba(0, 229, 160, 0.05); color: var(--green); }
    .SELL { border-color: var(--red); background: rgba(255, 64, 96, 0.05); color: var(--red); }
    .WAIT { color: var(--muted); border-style: dashed; }

    .entry-info { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; }
    .info-tag { background: rgba(0,0,0,0.3); padding: 5px; border-radius: 4px; border: 1px solid var(--border); }
</style>
</head>
<body>

<div id="widget-area">
    <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js" async>
        { "symbol": "FX_IDC:XAUUSD", "width": "100%", "colorTheme": "dark", "isTransparent": true, "locale": "en" }
        </script>
    </div>
</div>

<div class="stats-bar">
    <div><span class="label">LIVE XAUUSD</span><span id="price-now" class="stat-val">0.00</span></div>
    <div><span class="label">MEMORY (TICKS)</span><span id="tick-count" class="stat-val">0</span></div>
    <div style="margin-left: auto; text-align: right;"><span class="label">ENGINE</span><span style="color:var(--green)">ACTIVE</span></div>
</div>

<div class="grid" id="dashboard"></div>

<script>
let tickHistory = [];
const MAX_TICKS = 200000;
const timeframes = ['M1', 'M5', 'M15', 'M30', 'H1'];
const TF_MS = { M1: 60000, M5: 300000, M15: 900000, M30: 1800000, H1: 3600000 };

// --- ΤΡΟΠΟΣ ΥΠΟΛΟΓΙΣΜΟΥ ΤΙΜΗΣ ΟΠΩΣ Ο ΚΩΔΙΚΑΣ ΣΟΥ (DOM SCRAPING) ---
function scrapeTradingView() {
    // Ψάχνει το span που περιέχει την τιμή στο widget
    const priceSpan = document.querySelector('span[class*="last-"], span[class*="price-"], .tv-embed-widget-wrapper__body span');
    if (priceSpan) {
        const val = parseFloat(priceSpan.innerText.replace(/,/g, ''));
        if (!isNaN(val) && val > 1000) {
            const now = Date.now();
            if (tickHistory.length === 0 || tickHistory[tickHistory.length-1].p !== val) {
                tickHistory.push({ p: val, t: now });
                if (tickHistory.length > MAX_TICKS) tickHistory.shift();
                
                document.getElementById('price-now').innerText = val.toFixed(2);
                document.getElementById('tick-count').innerText = tickHistory.length.toLocaleString();
            }
        }
    }
}

// --- SMC & FRACTAL SIMILARITY ENGINE ---
function analyzeSMC(tf) {
    const candles = buildCandles(tf);
    if (candles.length < 20) return { decision: 'WAIT', ob: 'Wait..', fvg: 'Wait..', frac: 'Wait..' };

    const last = candles[candles.length - 1];
    const prev = candles[candles.length - 2];
    const p3 = candles[candles.length - 3];
    const atr = (last.high - last.low) || 0.8;

    // 1. Order Blocks (OB)
    let bullOB = candles.slice(-15, -3).find(c => c.close < c.open && candles[candles.length-2].close > c.high);
    let bearOB = candles.slice(-15, -3).find(c => c.close > c.open && candles[candles.length-2].close < c.low);

    // 2. FVG (Fair Value Gap)
    const isBullFVG = prev.low > p3.high;
    const isBearFVG = prev.high < p3.low;

    // 3. Fractal Pattern Similarity (Similarity Check)
    const fractalDown = prev.low < p3.low && prev.low < last.low; // Πιθανό Bottom
    const fractalUp = prev.high > p3.high && prev.high > last.high; // Πιθανό Top

    let decision = 'WAIT';
    let sl = 0, tp = 0;

    // --- STRICT CONFLUENCE: Πρέπει όλα να είναι TRUE μεμονωμένα ---
    if (bullOB && isBullFVG && fractalDown) {
        decision = 'BUY';
        sl = bullOB.low - (atr * 0.5);
        tp = last.close + (Math.abs(last.close - sl) * 3); // Fractal projection 1:3
    } else if (bearOB && isBearFVG && fractalUp) {
        decision = 'SELL';
        sl = bearOB.high + (atr * 0.5);
        tp = last.close - (Math.abs(sl - last.close) * 3);
    }

    return {
        decision,
        ob: bullOB ? 'BULL OB' : (bearOB ? 'BEAR OB' : 'NONE'),
        fvg: isBullFVG ? 'BULL GAP' : (isBearFVG ? 'BEAR GAP' : 'NONE'),
        frac: fractalDown ? 'BULLISH' : (fractalUp ? 'BEARISH' : 'NONE'),
        sl: sl.toFixed(2),
        tp: tp.toFixed(2),
        entry: last.close.toFixed(2)
    };
}

function buildCandles(tf) {
    const ms = TF_MS[tf];
    const result = [];
    if (tickHistory.length === 0) return [];
    let current = null;
    tickHistory.forEach(t => {
        const bucket = Math.floor(t.t / ms) * ms;
        if (!current || current.time !== bucket) {
            if (current) result.push(current);
            current = { time: bucket, open: t.p, high: t.p, low: t.p, close: t.p };
        } else {
            current.high = Math.max(current.high, t.p);
            current.low = Math.min(current.low, t.p);
            current.close = t.p;
        }
    });
    return result;
}

function updateUI() {
    const dash = document.getElementById('dashboard');
    let html = '';
    timeframes.forEach(tf => {
        const data = analyzeSMC(tf);
        html += `
            <div class="card">
                <div class="tf-header"><span>${tf} TIMEFRAME</span></div>
                <table class="smc-table">
                    <tr><td class="c-muted">Order Block</td><td style="text-align:right">${data.ob}</td></tr>
                    <tr><td class="c-muted">FVG / Imbalance</td><td style="text-align:right">${data.fvg}</td></tr>
                    <tr><td class="c-muted">Fractal Similarity</td><td style="text-align:right">${data.frac}</td></tr>
                </table>
                <div class="decision-box ${data.decision}">
                    <div style="font-size:24px; font-weight:900">${data.decision}</div>
                    ${data.decision !== 'WAIT' ? `
                        <div class="entry-info">
                            <div class="info-tag">SL: ${data.sl}</div>
                            <div class="info-tag">TP: ${data.tp}</div>
                            <div class="info-tag" style="grid-column: span 2; color:var(--gold)">ENTRY: ${data.entry}</div>
                        </div>
                    ` : '<div style="font-size:10px; margin-top:5px">SCANNING FOR CONFLUENCE...</div>'}
                </div>
            </div>
        `;
    });
    dash.innerHTML = html;
}

// INTERVALS
setInterval(scrapeTradingView, 1000);
setInterval(updateUI, 2000);
</script>
</body>
</html>
