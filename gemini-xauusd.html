<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD ULTIMATE v51.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #050709; --panel: #0b1018; --gold: #f5c842; --green: #00e5a0; --red: #ff4060; --text: #c8d1d9; --border: #1c2a3a; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .main-layout { display: grid; grid-template-columns: 320px 1fr 300px; height: 100vh; }
        .panel { background: var(--panel); padding: 15px; border: 0.5px solid var(--border); overflow-y: auto; }
        input { background: #161b22; border: 1px solid var(--border); color: white; padding: 12px; width: 85%; margin-bottom: 10px; border-radius: 4px; font-family: monospace; }
        button { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .price-tag { font-family: 'Orbitron', sans-serif; font-size: 32px; color: var(--gold); text-shadow: 0 0 10px rgba(245,200,66,0.3); }
        .smc-tag { padding: 10px; margin: 8px 0; border-radius: 4px; font-size: 14px; font-weight: bold; border-left: 4px solid #333; background: rgba(255,255,255,0.03); }
        .supply { border-color: var(--red); color: var(--red); }
        .demand { border-color: var(--green); color: var(--green); }
        canvas { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="panel">
            <h2 style="color:var(--gold); border-bottom: 1px solid #333;">CONFIG</h2>
            <label>API KEY</label>
            <input type="text" id="api-key" placeholder="Enter TwelveData Key...">
            <label>SYMBOL</label>
            <input type="text" id="symbol" value="XAUUSD">
            <button onclick="start()">ACTIVATE SYSTEM</button>
            <div id="smc-list" style="margin-top:20px;"></div>
        </div>
        
        <div class="panel" style="padding:0; position:relative; background:#000;">
            <div style="position:absolute; top:20px; right:20px; z-index:10; text-align:right;">
                <div id="cur-sym" style="color:var(--gold); font-size:12px;">XAUUSD</div>
                <div id="live-price" class="price-tag">0.00</div>
            </div>
            <canvas id="mainChart"></canvas>
        </div>

        <div class="panel" style="text-align:center;">
            <h2 style="color:var(--gold); border-bottom: 1px solid #333;">SIGNALS</h2>
            <div id="h1-trend" style="font-size:20px; margin:20px 0;">TREND: --</div>
            <div id="stars" style="font-size:30px; color:var(--gold);">☆☆☆☆☆</div>
            <div id="status" style="font-size:50px; font-weight:bold; margin:20px 0;">WAIT</div>
            <div id="msg" style="color:var(--gold); font-size:14px; padding:10px; border:1px solid #333;">System Offline</div>
        </div>
    </div>

    <script>
        let chart = null;
        const alertSnd = new Audio('https://actions.google.com/sounds/v1/notification/beep.ogg');

        async function start() {
            const key = document.getElementById('api-key').value.trim();
            const sym = document.getElementById('symbol').value.trim();
            if(!key) return alert("Please enter API Key");
            
            localStorage.setItem('saved_key', key);
            document.getElementById('msg').innerText = "Connecting to Market...";
            
            try {
                const url = `https://api.twelvedata.com/time_series?symbol=${sym}&interval=5min&apikey=${key}&outputsize=50`;
                const res = await fetch(url);
                const data = await res.json();

                if(data.status === "error") {
                    document.getElementById('msg').innerText = "API Error: " + data.message;
                    return;
                }

                const candles = data.values.map(v => ({
                    t: v.datetime.split(' ')[1],
                    c: parseFloat(v.close),
                    h: parseFloat(v.high),
                    l: parseFloat(v.low)
                })).reverse();

                updateUI(candles, sym);
                document.getElementById('msg').innerText = "LIVE DATA ACTIVE";
            } catch(e) {
                document.getElementById('msg').innerText = "Connection Failed";
            }
        }

        function updateUI(candles, sym) {
            const last = candles[candles.length-1];
            document.getElementById('live-price').innerText = last.c.toFixed(2);
            document.getElementById('cur-sym').innerText = sym;

            // Simple Chart
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: candles.map(c => c.t),
                    datasets: [{ data: candles.map(c => c.c), borderColor: '#f5c842', pointRadius: 0, borderWidth: 2 }]
                },
                options: { maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#1c2a3a' } } } }
            });

            // SMC Zones
            const list = document.getElementById('smc-list');
            list.innerHTML = "";
            for(let i=candles.length-10; i<candles.length-1; i++) {
                if(candles[i].h > candles[i-1].h && candles[i].h > candles[i+1].h) {
                    list.innerHTML += `<div class="smc-tag supply">SUPPLY: ${candles[i].h.toFixed(2)}</div>`;
                }
            }
        }

        // Auto-load if key exists
        const saved = localStorage.getItem('saved_key');
        if(saved) { document.getElementById('api-key').value = saved; }
    </script>
</body>
</html>
