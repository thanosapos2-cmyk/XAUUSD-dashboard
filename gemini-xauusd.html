<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD FIX v51.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #050709; --panel: #0b1018; --gold: #f5c842; --green: #00e5a0; --red: #ff4060; --text: #c8d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; overflow: hidden; }
        .main-layout { display: grid; grid-template-columns: 320px 1fr 300px; height: 100vh; }
        .panel { background: var(--panel); padding: 20px; border: 0.5px solid #1c2a3a; }
        input { background: #161b22; border: 1px solid #1c2a3a; color: white; padding: 12px; width: 85%; margin-bottom: 10px; border-radius: 4px; }
        button { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .price-tag { font-family: 'Orbitron', sans-serif; font-size: 32px; color: var(--gold); }
        canvas { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="panel">
            <h2 style="color:var(--gold)">SETTING</h2>
            <label>API KEY</label>
            <input type="text" id="api-key" placeholder="Paste Key here...">
            <label>SYMBOL</label>
            <input type="text" id="symbol" value="GC=F">
            <button onclick="fetchData()">RUN ALGO</button>
            <p id="error-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
        
        <div class="panel" style="padding:0; position:relative; background:#000;">
            <div style="position:absolute; top:20px; right:20px; z-index:10; text-align:right;">
                <div id="display-sym" style="color:var(--gold)">GC=F</div>
                <div id="live-price" class="price-tag">0.00</div>
            </div>
            <canvas id="mainChart"></canvas>
        </div>

        <div class="panel" style="text-align:center;">
            <h2 style="color:var(--gold)">ANALYSIS</h2>
            <div id="status" style="font-size:40px; font-weight:bold; margin-top:50px;">OFFLINE</div>
            <div id="sub-msg" style="color:#666">Enter Key and Symbol to Start</div>
        </div>
    </div>

    <script>
        let myChart = null;

        async function fetchData() {
            const key = document.getElementById('api-key').value.trim();
            const sym = document.getElementById('symbol').value.trim();
            const err = document.getElementById('error-msg');
            
            if(!key) { err.innerText = "Missing API Key"; return; }
            err.innerText = "Connecting...";

            try {
                // Χρησιμοποιούμε https://api.twelvedata.com/time_series
                const response = await fetch(`https://api.twelvedata.com/time_series?symbol=${sym}&interval=5min&apikey=${key}&outputsize=50`);
                const data = await response.json();

                if(data.status === "error") {
                    err.innerText = "API Says: " + data.message;
                    return;
                }

                const candles = data.values.map(v => ({
                    t: v.datetime.split(' ')[1],
                    c: parseFloat(v.close)
                })).reverse();

                document.getElementById('live-price').innerText = candles[candles.length-1].c.toFixed(2);
                document.getElementById('display-sym').innerText = sym;
                document.getElementById('status').innerText = "LIVE";
                document.getElementById('status').style.color = "var(--green)";
                err.innerText = "";

                renderChart(candles);
            } catch(e) {
                err.innerText = "Network Error. Check console.";
            }
        }

        function renderChart(candles) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: candles.map(c => c.t),
                    datasets: [{ data: candles.map(c => c.c), borderColor: '#f5c842', pointRadius: 0, borderWidth: 2 }]
                },
                options: { maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#1c2a3a' } } } }
            });
        }
    </script>
</body>
</html>
