<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>SMC MASTER SWITCHER v59.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05080a; --gold: #f5c842; --green: #00ffaa; --red: #ff3355; --panel: #0d1117; --border: #1c2a3a; }
        body, html { background: var(--bg); color: #adbac7; margin: 0; padding: 0; height: 100vh; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .main-layout { display: grid; grid-template-columns: 280px 1fr 280px; height: 100vh; gap: 1px; background: var(--border); }
        .sidebar { background: var(--panel); padding: 20px; display: flex; flex-direction: column; gap: 15px; border: 0.5px solid var(--border); }
        .chart-container { background: #000; position: relative; }
        input { background: #161b22; border: 1px solid #333; color: white; padding: 12px; width: 88%; border-radius: 6px; font-family: monospace; font-size: 14px; text-transform: uppercase; }
        button { background: var(--gold); color: black; border: none; padding: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; font-family: 'Orbitron'; transition: 0.2s; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        .status-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; border: 1px solid #222; text-align: center; }
        .signal-text { font-size: 38px; font-weight: bold; margin: 5px 0; font-family: 'Orbitron'; letter-spacing: 2px; }
        .smc-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 13px; }
        .pair-badge { background: #222; color: var(--gold); padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="sidebar">
            <h2 style="color:var(--gold); font-family:'Orbitron'; font-size:14px;">TERMINAL CONTROL</h2>
            
            <div style="background: rgba(245,200,66,0.05); padding: 15px; border-radius: 8px;">
                <label style="font-size:10px; color: var(--gold);">ENTER BINANCE SYMBOL</label>
                <input type="text" id="pair-input" value="PAXGUSDT" placeholder="e.g. BTCUSDT">
                <p style="font-size:9px; opacity:0.5; margin-top:5px;">Gold: PAXGUSDT | Euro: EURUSDT</p>
                <button onclick="changePair()" style="width:100%; margin-top:10px;">SWITCH & SYNC</button>
            </div>

            <div class="status-box" style="margin-top:20px;">
                <div id="active-pair-display" class="pair-badge">CURRENT: PAXG/USDT</div>
                <div style="font-size:10px; opacity: 0.5;">LIVE ENGINE PRICE</div>
                <div id="engine-price" style="font-family:'Orbitron'; font-size:24px; color:white;">0.00</div>
                <button onclick="manualSync()" style="background:transparent; color:var(--gold); border:1px solid var(--gold); padding:5px; font-size:10px; margin-top:10px; width:auto;">CALIBRATE PRICE</button>
            </div>
            
            <div id="log" style="font-size:11px; color:#555;">Status: System Ready.</div>
        </div>

        <div class="chart-container" id="tv-wrapper">
            <div id="tradingview_widget" style="width:100%; height:100%;"></div>
        </div>

        <div class="sidebar">
            <h2 style="color:var(--gold); font-family:'Orbitron'; font-size:14px; text-align:center;">SMC ANALYSIS</h2>
            
            <div class="status-box">
                <div style="font-size:10px; opacity:0.6;">ALGO SIGNAL</div>
                <div id="signal" class="signal-text" style="color:#333;">WAIT</div>
                <div id="signal-desc" style="font-size:11px; color:var(--gold);">Initializing Stream...</div>
            </div>

            <div style="margin-top:20px;">
                <div class="smc-item"><span>Structure (BOS):</span> <span id="smc-struct" style="color:white;">Scanning...</span></div>
                <div class="smc-item"><span>Trend (H1):</span> <span id="smc-trend" style="color:white;">---</span></div>
                <div class="smc-item"><span>Liquidity:</span> <span id="smc-liq" style="color:white;">Finding...</span></div>
                <div class="smc-item"><span>Momentum:</span> <span id="smc-mom" style="color:white;">0.00</span></div>
            </div>

            <div style="margin-top:auto; font-size:10px; opacity:0.3; text-align:center; letter-spacing: 1px;">
                PRO-SYNC CORE v59.0
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let ws = null;
        let priceOffset = 0;
        let history = [];
        let currentPair = "PAXGUSDT";

        // 1. Λειτουργία Αλλαγής Pair
        function changePair() {
            const newPair = document.getElementById('pair-input').value.toUpperCase().trim();
            if(!newPair) return;
            
            currentPair = newPair;
            document.getElementById('active-pair-display').innerText = "CURRENT: " + currentPair;
            document.getElementById('log').innerText = "Status: Switching to " + currentPair + "...";
            
            // Καθαρισμός παλαιών δεδομένων
            history = [];
            priceOffset = 0; 
            
            // Επαναφόρτωση Chart & Stream
            loadTVChart(currentPair);
            initWebSocket(currentPair);
        }

        // 2. Φόρτωση TradingView Widget
        function loadTVChart(pair) {
            let tvSymbol = (pair === "PAXGUSDT") ? "OANDA:XAUUSD" : "BINANCE:" + pair;
            
            new TradingView.widget({
                "width": "100%", "height": "100%",
                "symbol": tvSymbol,
                "interval": "5", "timezone": "Europe/Athens",
                "theme": "dark", "style": "1", "locale": "el",
                "container_id": "tradingview_widget"
            });
        }

        // 3. Σύνδεση με Binance WebSocket
        function initWebSocket(pair) {
            if(ws) ws.close();
            
            const wsUrl = `wss://stream.binance.com:9443/ws/${pair.toLowerCase()}@kline_5m`;
            ws = new WebSocket(wsUrl);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const candle = data.k;
                const livePrice = parseFloat(candle.c);
                const finalPrice = livePrice + priceOffset;

                document.getElementById('engine-price').innerText = finalPrice.toFixed(pair.includes("USD") && !pair.includes("PAXG") ? 5 : 2);
                
                // Αν κλείσει το 5λεπτο κερί, το αποθηκεύουμε για την ανάλυση
                if (candle.x) {
                    history.push({ h: parseFloat(candle.h), l: parseFloat(candle.l), c: parseFloat(candle.c) });
                    if(history.length > 40) history.shift();
                }
                
                runSMCLogic(finalPrice);
            };

            ws.onerror = () => {
                document.getElementById('log').innerText = "Error: Invalid Symbol or Connection Lost.";
            };
        }

        // 4. Χειροκίνητος Συγχρονισμός (Calibration)
        function manualSync() {
            const tvPrice = prompt("Πληκτρολόγησε την τιμή που βλέπεις στο Chart:");
            if(!tvPrice) return;
            
            const rawPrice = parseFloat(document.getElementById('engine-price').innerText) - priceOffset;
            priceOffset = parseFloat(tvPrice) - rawPrice;
            document.getElementById('log').innerText = "Status: Calibrated with Offset " + priceOffset.toFixed(2);
        }

        // 5. SMC Αλγόριθμος
        function runSMCLogic(price) {
            if(history.length < 5) return;

            const high = Math.max(...history.slice(-10).map(c => c.h));
            const low = Math.min(...history.slice(-10).map(c => c.l));

            let sig = "WAIT";
            let struct = "Internal";
            let col = "#333";

            if(price > high) {
                sig = "BUY"; struct = "BOS BULLISH"; col = "var(--green)";
            } else if(price < low) {
                sig = "SELL"; struct = "BOS BEARISH"; col = "var(--red)";
            }

            document.getElementById('signal').innerText = sig;
            document.getElementById('signal').style.color = col;
            document.getElementById('smc-struct').innerText = struct;
            document.getElementById('smc-trend').innerText = price > history[0].c ? "Bullish" : "Bearish";
            document.getElementById('smc-mom').innerText = (price - history[history.length-1].c).toFixed(4);
        }

        // Initial Load
        window.onload = () => {
            loadTVChart("PAXGUSDT");
            initWebSocket("PAXGUSDT");
        };
    </script>
</body>
</html>
