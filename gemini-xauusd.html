<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>SMC ULTIMATE SYNC v55.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05080a; --gold: #f5c842; --panel: #0d1117; }
        body, html { background: var(--bg); color: white; margin: 0; padding: 0; height: 100vh; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .main-layout { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }
        .sidebar { background: var(--panel); border-right: 1px solid #1c2a3a; padding: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .chart-container { position: relative; width: 100%; height: 100%; background: #000; }
        .status-card { background: #161b22; padding: 15px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .price-big { font-family: 'Orbitron'; font-size: 30px; color: var(--gold); margin: 10px 0; }
        button { background: var(--gold); color: black; border: none; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; font-family: 'Orbitron'; width: 100%; }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="sidebar">
            <h2 style="color:var(--gold); font-family:'Orbitron'; font-size:18px; margin:0;">SMC TERMINAL</h2>
            
            <div class="status-card">
                <div style="font-size: 12px; opacity: 0.6;">CURRENT MARKET</div>
                <div id="active-symbol" style="font-size: 18px; font-weight: bold;">XAUUSD</div>
            </div>

            <div class="status-card">
                <div style="font-size: 11px; color: var(--gold);">ALGO STATUS</div>
                <div style="font-size: 24px; font-weight: bold; color: #00ffaa; margin: 10px 0;">LIVE SYNC</div>
                <p style="font-size: 12px; opacity: 0.7;">TradingView Engine Active</p>
            </div>

            <div style="margin-top: auto; padding-bottom: 20px;">
                <p style="font-size: 10px; opacity: 0.4;">v55.0 Institutional Connection</p>
                <button onclick="location.reload()">REFRESH SYSTEM</button>
            </div>
        </div>

        <div class="chart-container">
            <div id="tradingview_widget" style="width: 100%; height: 100%;"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                    "width": "100%",
                    "height": "100%",
                    "symbol": "OANDA:XAUUSD",
                    "interval": "5",
                    "timezone": "Europe/Athens",
                    "theme": "dark",
                    "style": "1",
                    "locale": "el",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_widget"
                });
            </script>
            </div>
    </div>
</body>
</html>
