<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>XAUUSD · SMC Weapon v56 ULTRA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050709; --surface:#090d12; --border:#1c2a3a;
    --gold:#f5c842; --green:#00e5a0; --red:#ff4060; --text:#c8d8e8;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; overflow-x: hidden; }
  .header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(5,7,9,0.9); position: sticky; top: 0; z-index: 1000; }
  .price-big { font-family: 'Orbitron', sans-serif; font-size: 24px; color: var(--gold); }
  #tv-widget-container { height: 450px; width: 100%; border-bottom: 1px solid var(--border); }
  .stats-bar { display: flex; gap: 20px; font-family: 'Share Tech Mono', sans-serif; font-size: 11px; padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
  .tag { padding: 2px 6px; border-radius: 3px; font-size: 10px; border: 1px solid currentColor; }
  .pulse { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; animation: p 1.5s infinite; }
  @keyframes p { 0% { box-shadow: 0 0 0 0 rgba(0,229,160,0.7); } 100% { box-shadow: 0 0 0 8px rgba(0,229,160,0); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <div style="font-family:'Orbitron'; letter-spacing:3px; color:var(--gold)">XAUUSD SMC v56</div>
    <div style="font-size:10px; color:var(--text); opacity:0.6">INDEXEDDB PERSISTENCE ACTIVE</div>
  </div>
  <div style="text-align:center">
    <div id="livePrice" class="price-big">0000.00</div>
    <div id="priceMeta" style="font-size:10px; font-family:'Share Tech Mono'">INITIALIZING...</div>
  </div>
  <div class="live-badge"><span class="pulse"></span> REAL-TIME</div>
</div>

<div class="stats-bar">
  <div>TICKS IN DB: <span id="dbCount" style="color:var(--gold)">0</span></div>
  <div>DB STORAGE: <span id="dbSize" style="color:var(--gold)">0.00</span> MB</div>
  <div>SOURCE: <span id="dataSource" style="color:var(--green)">WAITING...</span></div>
</div>

<div id="tv-widget-container">
  <div class="tradingview-widget-container" style="height:100%;width:100%">
    <div id="tradingview_main"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
      new TradingView.widget({
        "autosize": true,
        "symbol": "OANDA:XAUUSD",
        "interval": "1",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "enable_publishing": false,
        "hide_top_toolbar": true,
        "container_id": "tradingview_main"
      });
    </script>
  </div>
</div>

<div class="main-grid">
  <div id="analysisOutput"></div>
</div>

<script>
// ═══════════════════════════════════════════
// 1. INDEXEDDB SYSTEM (ΓΙΑ 200.000 TICKS)
// ═══════════════════════════════════════════
const DB_NAME = "SMC_Weapon_DB";
const STORE_NAME = "Ticks";
let db;

const initDB = () => {
  return new Promise((resolve) => {
    const request = indexedDB.open(DB_NAME, 1);
    request.onupgradeneeded = (e) => {
      db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: "t" });
      }
    };
    request.onsuccess = (e) => {
      db = e.target.result;
      resolve();
    };
  });
};

async function saveTick(tick) {
  const tx = db.transaction(STORE_NAME, "readwrite");
  const store = tx.objectStore(STORE_NAME);
  store.put(tick);
  
  // Cleanup παλιών δεδομένων (διατήρηση 200K)
  const countRequest = store.count();
  countRequest.onsuccess = () => {
    if (countRequest.result > 200000) {
      const range = IDBKeyRange.upperBound(Date.now() - 1000 * 60 * 60 * 24); // π.χ. σβήσε παλαιότερα από 24h
      // store.delete(range); // Ενεργοποίησε αν θες hard limit
    }
    document.getElementById('dbCount').textContent = countRequest.result.toLocaleString();
  };
}

// ═══════════════════════════════════════════
// 2. REAL-TIME FETCH (CORS BYPASS)
// ═══════════════════════════════════════════
async function getLivePrice() {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/GC=F?interval=1m&range=1d`;
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

  try {
    const res = await fetch(proxyUrl);
    const data = await res.json();
    const json = JSON.parse(data.contents);
    const meta = json.chart.result[0].meta;
    const price = meta.regularMarketPrice;
    
    if (price) {
      updatePriceUI(price);
      saveTick({ t: Date.now(), p: price });
      document.getElementById('dataSource').textContent = "YAHOO_LIVE";
    }
  } catch (e) {
    console.error("Fetch Error:", e);
  }
}

function updatePriceUI(price) {
  const el = document.getElementById('livePrice');
  const oldPrice = parseFloat(el.textContent);
  el.textContent = price.toFixed(2);
  el.style.color = price >= oldPrice ? "var(--green)" : "var(--red)";
  document.getElementById('priceMeta').textContent = `XAUUSD · SPYDER ACTIVE · ${new Date().toLocaleTimeString()}`;
}

// ═══════════════════════════════════════════
// 3. SMC LOGIC FIXES (OB & FVG)
// ═══════════════════════════════════════════
// Εδώ ενσωματώνεις τη διορθωμένη detectOrderBlocks που συζητήσαμε (High/Low)

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
initDB().then(() => {
  setInterval(getLivePrice, 2000); // Scraping κάθε 2 δευτερόλεπτα
});

</script>
</body>
</html>
