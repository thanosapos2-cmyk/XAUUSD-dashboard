<style>
:root {
  --bg:#050709; --surface:#090d12; --panel:#0b1018;
  --border:#1c2a3a; --border2:#243444;
  --gold:#f5c842; --gold2:#e8a020; --gold-glow:rgba(245,200,66,0.18);
  --green:#00e5a0; --red:#ff4060; --blue:#3de0ff; --purple:#a855f7; --orange:#ff8c00;
  --text:#c8d8e8; --muted:#3d5068; --muted2:#5a7090;
  --ob-bull:rgba(0,229,160,0.10); --ob-bear:rgba(255,64,96,0.10);
  --fvg-bull:rgba(61,224,255,0.08); --fvg-bear:rgba(168,85,247,0.08);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(245,200,66,0.022) 1px,transparent 1px),
  linear-gradient(90deg,rgba(245,200,66,0.022) 1px,transparent 1px);
  background-size:52px 52px;pointer-events:none;z-index:0;}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:300;background:rgba(5,7,9,0.98);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;}
.logo{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;letter-spacing:5px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 14px var(--gold-glow));}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted2);letter-spacing:4px;}
.hdr-center{display:flex;flex-direction:column;align-items:center;gap:3px;}
.price-big{font-family:'Orbitron',monospace;font-size:24px;font-weight:700;color:var(--gold);letter-spacing:2px;transition:color .3s;}
.price-meta{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted2);letter-spacing:2px;}
.hdr-right{display:flex;align-items:center;gap:14px;}
.live-badge{display:flex;align-items:center;gap:7px;background:rgba(0,229,160,0.07);
  border:1px solid rgba(0,229,160,0.28);border-radius:3px;padding:4px 10px;
  font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--green);letter-spacing:2px;}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,229,160,0.5);}50%{opacity:.5;box-shadow:0 0 0 5px rgba(0,229,160,0);}}

.tick-count{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted2);}

/* ── MAIN ── */
.main{position:relative;z-index:1;padding:22px 24px;display:flex;flex-direction:column;gap:22px;}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.sh-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;color:var(--gold);white-space:nowrap;}
.sh-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.sh-badge{font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 8px;border-radius:2px;letter-spacing:2px;}

/* ── OVERVIEW ROW ── */
.overview-row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
.ov-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:12px 14px;transition:border-color .25s;}

/* ── TF GRID ── */

/* ── SMC ROW ── */

.g-fail{background:rgba(255,64,96,.12);color:var(--red);border:1px solid rgba(255,64,96,.35);}

.frac-fill{height:100%;border-radius:3px;transition:width .8s;}

/* ── FINAL ENTRY PANEL ── */
.final-panel{border-radius:6px;border:1px solid;overflow:hidden;}
.final-top{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}

.final-gate-summary{font-family:'Share Tech Mono',monospace;font-size:10px;line-height:1.8;}

.fp-cell{padding:12px 14px;border-right:1px solid var(--border);}

.fp-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--muted2);margin-bottom:5px;}
.fp-val{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;}
.fp-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted2);margin-top:2px;}

/* ── MINI CANDLES ── */
.mini-chart{height:50px;display:flex;align-items:flex-end;gap:2px;overflow:hidden;}

/* ── PROJECTED TARGET ── */

/* ── TAGS ── */
.tag{display:inline-block;padding:2px 7px;border-radius:2px;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;}
.tag-g{background:rgba(0,229,160,.12);color:var(--green);border:1px solid rgba(0,229,160,.3);}
.tag-r{background:rgba(255,64,96,.12);color:var(--red);border:1px solid rgba(255,64,96,.3);}
.tag-gold{background:rgba(245,200,66,.10);color:var(--gold);border:1px solid rgba(245,200,66,.25);}
.tag-b{background:rgba(61,224,255,.10);color:var(--blue);border:1px solid rgba(61,224,255,.25);}
.tag-p{background:rgba(168,85,247,.10);color:var(--purple);border:1px solid rgba(168,85,247,.25);}
.tag-n{background:rgba(90,112,144,.10);color:var(--muted2);border:1px solid rgba(90,112,144,.25);}

/* ── STATUS BAR ── */
.status-bar{background:var(--surface);border-top:1px solid var(--border);padding:8px 24px;
  display:flex;align-items:center;gap:20px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted2);}

/* ── ANIMATIONS ── */

.tf-block:nth-child(5){animation-delay:.24s;}.tf-block:nth-child(6){animation-delay:.29s;}
.tf-block:nth-child(7){animation-delay:.34s;}
@keyframes priceFlash{0%{opacity:.5}50%{opacity:1}100%{opacity:1}}

::-webkit-scrollbar{width:4px;height:4px;}

<div class="main">

      <div class="sh-badge tag-gold">GATE LOGIC</div>
    </div>

  </div>
  <div>
    <div class="sh">
      <div class="sh-title">📊 TIMEFRAME ANALYSIS · SMC + FVG + FRACTAL SIMILARITY</div>

    </div>

  </div>
</div>

<!-- STATUS BAR -->

  <div class="si"><div class="pulse"></div><span id="statusTxt">Initializing...</span></div>
  <div class="si">OBs: <span id="sOB" style="color:var(--gold)">—</span></div>
  <div class="si">FVGs: <span id="sFVG" style="color:var(--blue)">—</span></div>
  <div class="si">FRACTALS: <span id="sFrac" style="color:var(--purple)">—</span></div>
  <div class="si">UPDATE: <span id="sTime" style="color:var(--muted2)">—</span></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  TICK HISTORY ENGINE  ·  200 000 tick max
// ══════════════════════════════════════════════════════════
const MAX_TICKS = 200000;
window._priceHistory = [];
window._lastKnownPrice = null;
window._prevTickPrice  = null;

function recordTick(price, source) {
  const now = Date.now();
  window._prevTickPrice  = window._lastKnownPrice;
  window._lastKnownPrice = price;
  window._priceHistory.push({ t: now, p: price });
  if (window._priceHistory.length > MAX_TICKS)
    window._priceHistory.shift();
  document.getElementById('tickCount').textContent =
    window._priceHistory.length.toLocaleString('el-GR');
  if (source) document.getElementById('feedSrc').textContent = source;
}

// ══════════════════════════════════════════════════════════
//  CANDLE BUILDER  ·  from tick history
// ══════════════════════════════════════════════════════════
const TF_MS = { M1:60000, M5:300000, M15:900000, M30:1800000, H1:3600000, H4:14400000, D1:86400000 };
const TF_LABELS = { M1:'1 MIN', M5:'5 MIN', M15:'15 MIN', M30:'30 MIN', H1:'1 HOUR', H4:'4 HOUR', D1:'DAILY' };

function buildCandles(tf, limit=300) {
  const hist = window._priceHistory;
  if (hist.length < 4) return null;
  const ms = TF_MS[tf];
  const map = {};
  for (const tick of hist) {
    const key = Math.floor(tick.t / ms) * ms;
    if (!map[key]) {
      map[key] = { t:key, o:tick.p, h:tick.p, l:tick.p, c:tick.p, vol:1 };
    } else {
      const c = map[key];
      if (tick.p > c.h) c.h = tick.p;
      if (tick.p < c.l) c.l = tick.p;
      c.c = tick.p; c.vol++;
    }
  }
  return Object.values(map).sort((a,b)=>a.t-b.t).slice(-limit);
}

// Synthetic candles seeded from real price when tick history is thin
function syntheticCandles(basePrice, tf, count=120) {
  const ms  = TF_MS[tf] || 300000;
  const vol = { M1:0.4, M5:1.0, M15:2.2, M30:3.5, H1:6, H4:16, D1:32 }[tf] || 5;
  const out = [];
  let p = basePrice, t = Date.now() - count*ms;
  // Add slight trend bias based on timeframe seed
  const bias = (Math.sin(basePrice*0.01 + TF_MS[tf]*0.000001)*0.08);
  for (let i=0;i<count;i++) {
    const rnd = (Math.random()-0.5+bias)*vol;
    const o=p, c=p+rnd;
    const h=Math.max(o,c)+Math.random()*vol*0.35;
    const l=Math.min(o,c)-Math.random()*vol*0.35;
    out.push({ t, o:parseFloat(o.toFixed(2)), h:parseFloat(h.toFixed(2)),
               l:parseFloat(l.toFixed(2)), c:parseFloat(c.toFixed(2)), vol:Math.floor(5+Math.random()*80) });
    p=c; t+=ms;
  }
  return out;
}

function getCandles(tf, limit=220) {
  const live = buildCandles(tf, limit);
  if (live && live.length >= 25) return live;
  const base = window._lastKnownPrice || 3300;
  return syntheticCandles(base, tf, limit);
}

// ══════════════════════════════════════════════════════════
//  MATH HELPERS
// ══════════════════════════════════════════════════════════
function calcATR(candles, period=14) {
  if (!candles || candles.length < 2) return 5;
  const trs=[];
  for (let i=1;i<candles.length;i++) {
    trs.push(Math.max(
      candles[i].h-candles[i].l,
      Math.abs(candles[i].h-candles[i-1].c),
      Math.abs(candles[i].l-candles[i-1].c)
    ));
  }
  const sl=trs.slice(-period);
  return sl.reduce((a,b)=>a+b,0)/sl.length||5;
}

function calcEMA(prices, period) {
  if (!prices||prices.length<period) return prices?.[prices.length-1]||0;
  const k=2/(period+1); let ema=prices.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for (let i=period;i<prices.length;i++) ema=prices[i]*k+ema*(1-k);
  return ema;
}

function calcRSI(prices, period=14) {
  if (!prices||prices.length<period+1) return 50;
  let g=0,l=0;
  for (let i=prices.length-period;i<prices.length;i++) {
    const ch=prices[i]-prices[i-1];
    if (ch>0) g+=ch; else l-=ch;
  }
  return 100-100/(1+(g/(l||0.001)));
}

function calcMACD(prices) {
  if (!prices||prices.length<26) return {macd:0,signal:0,hist:0};
  const fast=calcEMA(prices,12), slow=calcEMA(prices,26);
  const macdLine=fast-slow;
  // Approximate signal with EMA9 of last macd values
  const macdArr=[];
  for (let i=26;i<=prices.length;i++) {
    const f=calcEMA(prices.slice(0,i),12), s=calcEMA(prices.slice(0,i),26);
    macdArr.push(f-s);
  }
  const signal=calcEMA(macdArr,9);
  return {macd:macdLine, signal, hist:macdLine-signal};
}

// ══════════════════════════════════════════════════════════
//  ORDER BLOCKS DETECTION
// ══════════════════════════════════════════════════════════
function detectOrderBlocks(candles) {
  const obs=[];
  if (!candles||candles.length<6) return obs;
  const atr=calcATR(candles);
  for (let i=2;i<candles.length-2;i++) {
    const p=candles[i-1], c=candles[i], n1=candles[i+1], n2=candles[i+2]||n1;
    // Bullish OB: bearish candle followed by strong bullish impulse
    if (p.c<p.o) {
      const impulse=n1.c-n1.o;
      if (impulse>atr*0.4 && n1.c>p.h) {
        const str=Math.min(100,Math.round((impulse/atr)*30));
        obs.push({type:'BULL',top:p.o,bottom:p.l,mid:(p.o+p.l)/2,idx:i-1,strength:str,swept:false});
      }
    }
    // Bearish OB: bullish candle followed by strong bearish impulse
    if (p.c>p.o) {
      const impulse=p.o-n1.c;
      if (impulse>atr*0.4 && n1.c<p.l) {
        const str=Math.min(100,Math.round((impulse/atr)*30));
        obs.push({type:'BEAR',top:p.h,bottom:p.c,mid:(p.h+p.c)/2,idx:i-1,strength:str,swept:false});
      }
    }
  }
  // Mark swept OBs (price passed through them)
  const price=candles[candles.length-1].c;
  obs.forEach(ob=>{
    if (ob.type==='BULL' && price<ob.bottom) ob.swept=true;
    if (ob.type==='BEAR' && price>ob.top)    ob.swept=true;
  });
  // Keep last 4 of each type, unswept preferred
  const sort=(arr)=>[...arr.filter(o=>!o.swept),...arr.filter(o=>o.swept)].slice(-4);
  return [...sort(obs.filter(o=>o.type==='BULL')), ...sort(obs.filter(o=>o.type==='BEAR'))];
}

// ══════════════════════════════════════════════════════════
//  FAIR VALUE GAP DETECTION
// ══════════════════════════════════════════════════════════
function detectFVGs(candles) {
  const fvgs=[];
  if (!candles||candles.length<3) return fvgs;
  const atr=calcATR(candles);
  for (let i=1;i<candles.length-1;i++) {
    const c0=candles[i-1], c2=candles[i+1];
    // Bullish FVG
    if (c2.l>c0.h) {
      const gap=c2.l-c0.h;
      if (gap>=atr*0.1)
        fvgs.push({type:'BULL',top:c2.l,bottom:c0.h,mid:(c2.l+c0.h)/2,idx:i,
          gapPct:Math.round(gap/atr*100),filled:false});
    }
    // Bearish FVG
    if (c0.l>c2.h) {
      const gap=c0.l-c2.h;
      if (gap>=atr*0.1)
        fvgs.push({type:'BEAR',top:c0.l,bottom:c2.h,mid:(c0.l+c2.h)/2,idx:i,
          gapPct:Math.round(gap/atr*100),filled:false});
    }
  }
  const price=candles[candles.length-1].c;
  return fvgs.slice(-8).map(f=>({
    ...f, filled: f.type==='BULL'?price<f.bottom:price>f.top
  }));
}

// ══════════════════════════════════════════════════════════
//  MARKET STRUCTURE — BOS / CHoCH
// ══════════════════════════════════════════════════════════
function detectStructure(candles) {
  if (!candles||candles.length<12) return {bos:'NONE',choch:false,trend:'NEUTRAL',swing:'—'};
  const win=Math.min(candles.length,30);
  const recent=candles.slice(-win);
  const older =candles.slice(-win*2,-win);
  const rH=Math.max(...recent.map(c=>c.h)), rL=Math.min(...recent.map(c=>c.l));
  const oH=older.length?Math.max(...older.map(c=>c.h)):rH;
  const oL=older.length?Math.min(...older.map(c=>c.l)):rL;
  const price=candles[candles.length-1].c;
  let bos='NEUTRAL',trend='NEUTRAL',choch=false;
  if (rH>oH && rL>oL) {bos='BOS BULL';trend='BULLISH';}
  else if (rH<oH && rL<oL) {bos='BOS BEAR';trend='BEARISH';}
  else if (rH<oH && rL>oL) {bos='CHoCH';trend='REVERSAL';choch=true;}
  else if (price>oH) {bos='BREAKOUT ↑';trend='BULLISH';}
  else if (price<oL) {bos='BREAKDOWN ↓';trend='BEARISH';}
  return {bos,trend,choch,
    swing: trend==='BULLISH'?'Higher Highs + Higher Lows':trend==='BEARISH'?'Lower Highs + Lower Lows':'Consolidation'};
}

// ══════════════════════════════════════════════════════════
//  FRACTALS
// ══════════════════════════════════════════════════════════
function detectFractals(candles, n=5) {
  const up=[],down=[];
  if (!candles||candles.length<n*2) return {up,down};
  const mid=Math.floor(n/2);
  for (let i=mid;i<candles.length-mid;i++) {
    let isUp=true,isDown=true;
    for (let j=1;j<=mid;j++) {
      if (candles[i].h<=candles[i-j].h||candles[i].h<=candles[i+j].h) isUp=false;
      if (candles[i].l>=candles[i-j].l||candles[i].l>=candles[i+j].l) isDown=false;
    }
    if (isUp)   up.push({idx:i,price:candles[i].h,t:candles[i].t});
    if (isDown) down.push({idx:i,price:candles[i].l,t:candles[i].t});
  }
  return {up,down};
}

// ══════════════════════════════════════════════════════════
//  FRACTAL PATTERN SIMILARITY
// ══════════════════════════════════════════════════════════
function normPat(arr) {
  const mn=Math.min(...arr),mx=Math.max(...arr),rng=mx-mn||1;
  return arr.map(v=>(v-mn)/rng);
}
function similarity(a,b) {
  let s=0;for(let i=0;i<a.length;i++)s+=Math.pow(a[i]-b[i],2);
  return Math.max(0,1-Math.sqrt(s/a.length));
}

function fractalPatternAnalysis(candles, pLen=12, lb=160) {
  const fail={similarity:0,direction:'NEUTRAL',target:null,confidence:0,matches:0,proj:0};
  if (!candles||candles.length<pLen+10) return fail;
  const n=candles.length;
  const recent=normPat(candles.slice(-pLen).map(c=>c.c));
  const matches=[];
  const start=Math.max(0,n-pLen-lb);
  for (let i=start;i<n-pLen*2;i++) {
    const seg=normPat(candles.slice(i,i+pLen).map(c=>c.c));
    const sim=similarity(seg,recent);
    if (sim>0.70) {
      const aft=candles.slice(i+pLen,i+pLen+Math.ceil(pLen/2));
      if (aft.length>0) {
        const move=aft[aft.length-1].c-candles[i+pLen-1].c;
        matches.push({sim,move});
      }
    }
  }
  if (!matches.length) {
    // best single match
    let best={sim:0};
    for (let i=start;i<n-pLen*2;i++) {
      const seg=normPat(candles.slice(i,i+pLen).map(c=>c.c));
      const s=similarity(seg,recent);
      if (s>best.sim) best={sim:s};
    }
    return {...fail,similarity:Math.round(best.sim*100),confidence:Math.round(best.sim*50)};
  }
  const totSim=matches.reduce((a,m)=>a+m.sim,0);
  const wMove=matches.reduce((a,m)=>a+m.move*m.sim,0)/totSim;
  const price=candles[n-1].c;
  const bulls=matches.filter(m=>m.move>0).length;
  const bears=matches.filter(m=>m.move<0).length;
  const dir=bulls>bears?'BULL':bears>bulls?'BEAR':'NEUTRAL';
  const avgSim=totSim/matches.length;
  return {
    similarity:Math.round(avgSim*100),
    direction:dir,
    target:parseFloat((price+wMove).toFixed(2)),
    proj:parseFloat(wMove.toFixed(2)),
    confidence:Math.min(95,Math.round(avgSim*100*(matches.length/5))),
    matches:matches.length
  };
}

// ══════════════════════════════════════════════════════════
//  GATE-BASED DECISION ENGINE
//  Each indicator evaluated independently with pass/fail/warn
//  Final decision = BUY/SELL only if ALL primary gates PASS
//  Otherwise = WAIT
// ══════════════════════════════════════════════════════════
const TF_ATR_MULT = { M1:{tp:1.2,sl:0.8}, M5:{tp:1.8,sl:1.1}, M15:{tp:2.5,sl:1.6},
  M30:{tp:3.2,sl:2.0}, H1:{tp:4.5,sl:2.8}, H4:{tp:6.0,sl:3.5}, D1:{tp:9.0,sl:5.5} };

function evalGates(params) {
  const {candles, obs, fvgs, struct, fractal, fractals, price, atr, tf} = params;
  const closes=candles.map(c=>c.c);
  const highs =candles.map(c=>c.h);
  const lows  =candles.map(c=>c.l);
  const rsi   =calcRSI(closes);
  const ema21 =calcEMA(closes,21);
  const ema50 =calcEMA(closes,50);
  const macd  =calcMACD(closes);

  // ── GATE 1: ORDER BLOCK — is price at/near a valid OB? ──
  const nearBullOBs=obs.filter(o=>o.type==='BULL'&&!o.swept&&price>=o.bottom*0.9998&&price<=o.top*1.003);
  const nearBearOBs=obs.filter(o=>o.type==='BEAR'&&!o.swept&&price<=o.top*1.0002&&price>=o.bottom*0.997);
  const hasBullOB=nearBullOBs.length>0;
  const hasBearOB=nearBearOBs.length>0;
  const bestBullOB=obs.filter(o=>o.type==='BULL'&&!o.swept).sort((a,b)=>Math.abs(price-a.mid)-Math.abs(price-b.mid))[0];
  const bestBearOB=obs.filter(o=>o.type==='BEAR'&&!o.swept).sort((a,b)=>Math.abs(price-a.mid)-Math.abs(price-b.mid))[0];
  let obSignal='NEUTRAL', obPass='WAIT';
  if (hasBullOB) {obSignal='BULL';obPass='PASS';}
  else if (hasBearOB) {obSignal='BEAR';obPass='PASS';}
  else if (bestBullOB && Math.abs(price-bestBullOB.mid)<atr*2) {obSignal='NEAR_BULL';obPass='WARN';}
  else if (bestBearOB && Math.abs(price-bestBearOB.mid)<atr*2) {obSignal='NEAR_BEAR';obPass='WARN';}
  else obPass='FAIL';

  // ── GATE 2: FVG — is there an active unmitigated FVG in direction? ──
  const activeBullFVG=fvgs.filter(f=>f.type==='BULL'&&!f.filled&&price>=f.bottom*0.9997&&price<=f.top*1.002);
  const activeBearFVG=fvgs.filter(f=>f.type==='BEAR'&&!f.filled&&price<=f.top*1.0003&&price>=f.bottom*0.998);
  const pendingBullFVG=fvgs.filter(f=>f.type==='BULL'&&!f.filled);
  const pendingBearFVG=fvgs.filter(f=>f.type==='BEAR'&&!f.filled);
  let fvgSignal='NEUTRAL', fvgPass='WAIT';
  if (activeBullFVG.length>0) {fvgSignal='BULL';fvgPass='PASS';}
  else if (activeBearFVG.length>0) {fvgSignal='BEAR';fvgPass='PASS';}
  else if (pendingBullFVG.length>0 && obSignal.includes('BULL')) {fvgSignal='NEAR_BULL';fvgPass='WARN';}
  else if (pendingBearFVG.length>0 && obSignal.includes('BEAR')) {fvgSignal='NEAR_BEAR';fvgPass='WARN';}
  else fvgPass='FAIL';
  const bestBullFVG=pendingBullFVG.sort((a,b)=>Math.abs(price-a.mid)-Math.abs(price-b.mid))[0];
  const bestBearFVG=pendingBearFVG.sort((a,b)=>Math.abs(price-a.mid)-Math.abs(price-b.mid))[0];

  // ── GATE 3: MARKET STRUCTURE — BOS / CHoCH alignment ──
  let structSignal='NEUTRAL', structPass='FAIL';
  if (struct.trend==='BULLISH') {structSignal='BULL';structPass='PASS';}
  else if (struct.trend==='BEARISH') {structSignal='BEAR';structPass='PASS';}
  else if (struct.trend==='REVERSAL') {structPass='WARN';structSignal='REVERSAL';}
  else structPass='FAIL';

  // ── GATE 4: FRACTAL PATTERN SIMILARITY — ≥70% sim with matching direction ──
  let fracPass='FAIL', fracSignal='NEUTRAL';
  if (fractal.similarity>=75 && fractal.direction!=='NEUTRAL') {
    fracSignal=fractal.direction;
    fracPass=fractal.confidence>=60?'PASS':'WARN';
  } else if (fractal.similarity>=60) {
    fracSignal=fractal.direction||'NEUTRAL';
    fracPass='WARN';
  } else {
    fracPass='FAIL';
  }

  // ── GATE 5: FRACTAL SWING — last Up/Down fractals ──
  const lastUpF  = fractals.up  [fractals.up.length-1];
  const lastDownF= fractals.down[fractals.down.length-1];
  let swingSignal='NEUTRAL', swingPass='WARN';
  if (lastUpF&&lastDownF) {
    if (price>lastDownF.price && price<lastUpF.price) {
      // Between fractals — look at which is closer
      const distUp=lastUpF.price-price, distDown=price-lastDownF.price;
      swingSignal=distDown<distUp?'BULL':'BEAR';
      swingPass='PASS';
    } else if (price>lastUpF.price) {swingSignal='BULL';swingPass='PASS';}
    else if (price<lastDownF.price) {swingSignal='BEAR';swingPass='PASS';}
  } else swingPass='FAIL';

  // ── AGGREGATE DIRECTION ──
  const sigMap={'BULL':1,'BEAR':-1,'NEUTRAL':0,'NEAR_BULL':0.5,'NEAR_BEAR':-0.5,'REVERSAL':0};
  const allSigs=[obSignal,fvgSignal,structSignal,fracSignal,swingSignal].map(s=>sigMap[s]||0);
  const sumSig=allSigs.reduce((a,b)=>a+b,0);
  const bullVotes=allSigs.filter(v=>v>0).length;
  const bearVotes=allSigs.filter(v=>v<0).length;
  const aggDir=sumSig>0?'BUY':sumSig<0?'SELL':'NEUTRAL';

  // ── FINAL DECISION: All primary gates must align ──
  // Primary gates: OB, Structure, Fractal Pattern (FVG and Swing are confirmatory)
  const primaryBull = obPass!=='FAIL' && structPass!=='FAIL' && obSignal.includes('BULL') && structSignal==='BULL';
  const primaryBear = obPass!=='FAIL' && structPass!=='FAIL' && obSignal.includes('BEAR') && structSignal==='BEAR';
  // Confirmatory: FVG + fractal agree
  const confirmBull = (fvgSignal.includes('BULL') || fvgPass==='WARN') && (fracSignal==='BULL'||fracPass==='WARN');
  const confirmBear = (fvgSignal.includes('BEAR') || fvgPass==='WARN') && (fracSignal==='BEAR'||fracPass==='WARN');

  let decision='WAIT', decisionReason='';
  if (primaryBull && confirmBull) {decision='BUY'; decisionReason='All gates aligned BULLISH';}
  else if (primaryBear && confirmBear) {decision='SELL'; decisionReason='All gates aligned BEARISH';}
  else if (primaryBull) {decision='WAIT'; decisionReason='BUY setup — awaiting FVG/Fractal confirm';}
  else if (primaryBear) {decision='WAIT'; decisionReason='SELL setup — awaiting FVG/Fractal confirm';}
  else if (obPass==='FAIL') {decision='WAIT'; decisionReason='No valid Order Block in range';}
  else if (structPass==='FAIL') {decision='WAIT'; decisionReason='Market structure ambiguous';}
  else {decision='WAIT'; decisionReason='Conflicting signals across gates';}

  // ── TP / SL ──
  const mult=TF_ATR_MULT[tf]||{tp:2,sl:1.5};
  let tp, sl;
  if (decision==='BUY' || (decision==='WAIT' && aggDir==='BUY')) {
    sl=price-atr*mult.sl;
    tp=price+atr*mult.tp;
    // Snap SL to OB bottom
    if (bestBullOB && bestBullOB.bottom>sl) sl=bestBullOB.bottom-atr*0.15;
    // Snap TP to next Bear OB
    const nextBearOB=obs.filter(o=>o.type==='BEAR'&&o.bottom>price).sort((a,b)=>a.bottom-b.bottom)[0];
    if (nextBearOB&&nextBearOB.bottom<tp&&nextBearOB.bottom>price+atr*0.4) tp=nextBearOB.bottom;
    // Use fractal target if higher quality
    if (fractal.target&&fractal.direction==='BULL'&&fractal.target>price&&fractal.confidence>65) tp=fractal.target;
  } else {
    sl=price+atr*mult.sl;
    tp=price-atr*mult.tp;
    if (bestBearOB && bestBearOB.top<sl) sl=bestBearOB.top+atr*0.15;
    const nextBullOB=obs.filter(o=>o.type==='BULL'&&o.top<price).sort((a,b)=>b.top-a.top)[0];
    if (nextBullOB&&nextBullOB.top>tp&&nextBullOB.top<price-atr*0.4) tp=nextBullOB.top;
    if (fractal.target&&fractal.direction==='BEAR'&&fractal.target<price&&fractal.confidence>65) tp=fractal.target;
  }
  const rr=Math.abs(tp-price)/Math.abs(sl-price||1);

  return {
    decision, decisionReason, aggDir,
    gates:{
      ob:    {pass:obPass,    signal:obSignal,    label:'Order Block',          val:bestBullOB||bestBearOB, cond: obPass==='PASS'?'Price AT valid OB zone':obPass==='WARN'?'Price near OB (±2 ATR)':'No OB in proximity'},
      fvg:   {pass:fvgPass,   signal:fvgSignal,   label:'Fair Value Gap',        val:bestBullFVG||bestBearFVG, cond: fvgPass==='PASS'?'Active unmitigated FVG':fvgPass==='WARN'?'Pending FVG nearby':'No unmitigated FVG'},
      struct:{pass:structPass,signal:structSignal,label:'Market Structure (BOS)', cond: struct.bos+' · '+struct.swing},
      fractal:{pass:fracPass, signal:fracSignal,  label:'Fractal Pattern Sim',   cond:`${fractal.similarity}% similarity · ${fractal.matches} historical matches`},
      swing: {pass:swingPass, signal:swingSignal, label:'Fractal Swing',          cond: lastUpF&&lastDownF?`Up: ${lastUpF.price.toFixed(2)} · Down: ${lastDownF.price.toFixed(2)}`:'Insufficient fractal data'},
    },
    rsi, ema21, ema50, macd,
    bestBullOB, bestBearOB, bestBullFVG, bestBearFVG,
    tp:parseFloat(tp.toFixed(2)), sl:parseFloat(sl.toFixed(2)), rr:parseFloat(rr.toFixed(2))
  };
}

// ══════════════════════════════════════════════════════════
//  ANALYSE ONE TIMEFRAME
// ══════════════════════════════════════════════════════════
const TIMEFRAMES=['M1','M5','M15','M30','H1','H4','D1'];

function analyseTF(tf) {
  const candles=getCandles(tf,220);
  if (!candles||candles.length<10) return null;
  const price=candles[candles.length-1].c;
  const atr  =calcATR(candles);
  const obs   =detectOrderBlocks(candles);
  const fvgs  =detectFVGs(candles);
  const struct=detectStructure(candles);
  const fractal=fractalPatternAnalysis(candles,Math.min(14,Math.floor(candles.length/8)),Math.min(160,candles.length-28));
  const fractals=detectFractals(candles);
  const result=evalGates({candles,obs,fvgs,struct,fractal,fractals,price,atr,tf});
  return {tf,price,atr,candles:candles.slice(-20),obs,fvgs,struct,fractal,fractals,...result};
}

function fmt(v) { return v!=null?v.toFixed(2):'—'; }
function fmtD(v,ref) {
  if (v==null||ref==null) return '';
  const d=v-ref; return (d>=0?'+':'')+d.toFixed(2);
}

function gateColor(pass) {
  return {PASS:'var(--green)',FAIL:'var(--red)',WARN:'var(--gold)',WAIT:'var(--muted2)'}[pass]||'var(--muted2)';
}
function gateClass(pass) {
  return {PASS:'g-pass',FAIL:'g-fail',WARN:'g-warn',WAIT:'g-na'}[pass]||'g-na';
}
function gateIcon(pass) {
  return {PASS:'✓',FAIL:'✗',WARN:'⚠',WAIT:'—'}[pass]||'—';
}
function sigTag(sig) {
  if (sig.includes('BULL')) return '<span class="tag tag-g">BULL</span>';
  if (sig.includes('BEAR')) return '<span class="tag tag-r">BEAR</span>';
  if (sig==='REVERSAL') return '<span class="tag tag-gold">REVERSAL</span>';
  return '<span class="tag tag-n">NEUTRAL</span>';
}

function miniChart(candles) {
  if (!candles||!candles.length) return '';
  const maxH=Math.max(...candles.map(c=>c.h)), minL=Math.min(...candles.map(c=>c.l));
  const range=maxH-minL||1;
  return candles.map(c=>{
    const bull=c.c>=c.o, col=bull?'var(--green)':'var(--red)';
    const bodyH=Math.max(2,Math.round(Math.abs(c.c-c.o)/range*40));
    const wickT=Math.round((c.h-Math.max(c.o,c.c))/range*50);
    const wickB=Math.round((Math.min(c.o,c.c)-c.l)/range*50);
    return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;height:50px;justify-content:flex-end;">
      <div style="width:1px;height:${wickT}px;background:${col}"></div>
      <div style="width:5px;height:${bodyH}px;background:${col};border-radius:1px;flex-shrink:0"></div>
      <div style="width:1px;height:${wickB}px;background:${col}"></div>
    </div>`;
  }).join('');
}

              <div class="smc-box-sub" style="color:var(--blue)">BULL · ${a.bestBullFVG.gapPct}% ATR</div>`
            :a.bestBearFVG
            ?`<div class="smc-box-val" style="color:var(--purple)">${fmt(a.bestBearFVG.mid)}</div>
              <div class="smc-box-sub">${fmt(a.bestBearFVG.bottom)} → ${fmt(a.bestBearFVG.top)}</div>
              <div class="smc-box-sub" style="color:var(--purple)">BEAR · ${a.bestBearFVG.gapPct}% ATR</div>`
            :`<div class="smc-box-val" style="color:var(--muted2);font-size:10px">—</div><div class="smc-box-sub">No active FVG</div>`}
        </div>
      </div>

      <!-- FRACTAL PATTERN SIMILARITY -->
      <div style="padding:10px 12px;background:rgba(245,200,66,0.03);border:1px solid rgba(245,200,66,0.14);border-radius:5px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div style="font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--muted2)">FRACTAL PATTERN SIMILARITY</div>
          <div style="display:flex;gap:6px;align-items:center;">
            ${sigTag(a.fractal.direction)}
            <span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted2)">${a.fractal.matches} matches</span>
          </div>
        </div>
        <div class="frac-bar-wrap">
          <span style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted2);white-space:nowrap">SIM</span>
          <div class="frac-track"><div class="frac-fill" style="width:${a.fractal.similarity}%;background:${fracCol}"></div></div>
          <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:${fracCol};min-width:34px;text-align:right">${a.fractal.similarity}%</span>
        </div>
        <div class="frac-bar-wrap" style="margin-top:5px;">
          <span style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted2);white-space:nowrap">CONF</span>
          <div class="frac-track"><div class="frac-fill" style="width:${a.fractal.confidence}%;background:${fracCol}88"></div></div>
          <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:${fracCol};min-width:34px;text-align:right">${a.fractal.confidence}%</span>
        </div>
        ${a.fractal.target
          ?`<div class="proj-box" style="margin-top:8px;">
              <div class="proj-arrow" style="color:${fracCol}">${a.fractal.direction==='BULL'?'↑':'↓'}</div>
              <div>
                <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted2);letter-spacing:1px">PROJECTED TARGET</div>
                <div style="font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:${fracCol}">${fmt(a.fractal.target)}</div>
              </div>
              <div style="margin-left:auto;text-align:right;">
                <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted2)">PROJECTED MOVE</div>
                <div style="font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:${fracCol}">${a.fractal.proj>=0?'+':''}${a.fractal.proj} pts</div>
              </div>
            </div>`:''}
      </div>

      <!-- ⚡ GATE DECISION TABLE ⚡ -->
      <div style="border:1px solid var(--border);border-radius:5px;overflow:hidden;">
        <table class="gate-table">
          <thead>
            <tr>
              <th>INDICATOR</th>
              <th>SIGNAL</th>
              <th>GATE STATUS</th>
              <th>CONDITIONS MET</th>
            </tr>
          </thead>
          <tbody>
            ${Object.values(g).map(gate=>`
            <tr>
              <td class="gt-name">${gate.label}</td>
              <td>${sigTag(gate.signal||'NEUTRAL')}</td>
              <td><span class="gate-pass ${gateClass(gate.pass)}">${gateIcon(gate.pass)} ${gate.pass}</span></td>
              <td class="gt-cond">${gate.cond}</td>
            </tr>`).join('')}
            <tr style="background:rgba(245,200,66,0.04);">
              <td colspan="2" style="font-family:'Orbitron',sans-serif;font-size:11px;font-weight:900;color:${col}">⚡ FINAL DECISION</td>
              <td><span class="gate-pass ${isBuy?'g-pass':isSell?'g-fail':'g-warn'}" style="font-size:11px">${a.decision}</span></td>
              <td class="gt-cond" style="color:${col}">${a.decisionReason}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- ENTRY PANEL -->
      <div class="final-panel" style="border-color:${col}35;">
        <div class="final-top" style="background:${sigBg};">
          <div>
            <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted2);letter-spacing:2px;margin-bottom:3px">DECISION · ${a.tf}</div>
            <div class="final-signal-txt" style="color:${col}">${a.decision}</div>
            <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted2);margin-top:3px">${a.decisionReason}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted2)">GATES PASSED</div>
            <div style="font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:${col}">
              ${Object.values(g).filter(x=>x.pass==='PASS').length}<span style="font-size:12px;color:var(--muted2)">/5</span>
            </div>
          </div>
        </div>
        <div class="final-prices" style="border-color:${col}25;">
          <div class="fp-cell">
            <div class="fp-label">ENTRY PRICE</div>
            <div class="fp-val" style="color:var(--gold)">${fmt(a.price)}</div>
          </div>
          <div class="fp-cell">
            <div class="fp-label">TAKE PROFIT</div>
            <div class="fp-val" style="color:var(--green)">${fmt(a.tp)}</div>
            <div class="fp-sub">${fmtD(a.tp,a.price)} pts</div>
          </div>
          <div class="fp-cell">
            <div class="fp-label">STOP LOSS</div>
            <div class="fp-val" style="color:var(--red)">${fmt(a.sl)}</div>
            <div class="fp-sub">${fmtD(a.sl,a.price)} pts</div>
          </div>
          <div class="fp-cell">
            <div class="fp-label">RISK / REWARD</div>
            <div class="fp-val" style="color:${a.rr>=2?'var(--green)':a.rr>=1.5?'var(--gold)':'var(--red)'}">1 : ${a.rr}</div>
          </div>
        </div>
      </div>

    </div>
  </div>`;
}

function updateAll() {
  const analyses=TIMEFRAMES.map(tf=>{ try{return analyseTF(tf);}catch(e){console.error(tf,e);return null;} });
  renderOverview(analyses.filter(Boolean));
  document.getElementById('tfGrid').innerHTML=analyses.map(a=>a?renderTFBlock(a):'').join('');
  const allOBs=analyses.reduce((s,a)=>s+(a?a.obs.length:0),0);
  const allFVGs=analyses.reduce((s,a)=>s+(a?a.fvgs.length:0),0);
  const allFrac=analyses.reduce((s,a)=>s+(a?(a.fractals.up.length+a.fractals.down.length):0),0);
  document.getElementById('sOB').textContent=allOBs;
  document.getElementById('sFVG').textContent=allFVGs;
  document.getElementById('sFrac').textContent=allFrac;
  document.getElementById('statusTxt').textContent='SMC Gate Engine Active';
  document.getElementById('sTime').textContent=new Date().toLocaleTimeString('el-GR');
}

// ══════════════════════════════════════════════════════════
//  LIVE PRICE FEED
//  Chain: metals-live.com → gold-api.com → Yahoo Finance proxy → sim
// ══════════════════════════════════════════════════════════
let _lastPriceFetch=0;
let _simPrice=null;
let _simInterval=null;
let _priceOk=false;

async function fetchGoldPrice() {
  // 1. metals-live.com (free, no key)
  try {
    const r=await fetch('https://metals-live.com/wp-json/metals/v1/spot/XAUUSD',
      {signal:AbortSignal.timeout(4000)});
    if (r.ok) {
      const d=await r.json();
      const p=parseFloat(d?.price||d?.ask||d?.data?.price);
      if (p>1000) { onNewPrice(p,'metals-live'); return; }
    }
  } catch(e){}

  // 2. gold-api.com (free tier, no key for spot)
  try {
    const r=await fetch('https://www.goldapi.io/api/XAU/USD',
      {headers:{'x-access-token':'goldapi-demo'},signal:AbortSignal.timeout(4000)});
    if (r.ok) {
      const d=await r.json();
      const p=parseFloat(d?.price);
      if (p>1000) { onNewPrice(p,'gold-api'); return; }
    }
  } catch(e){}

  // 3. freeforexapi.com (free, no key)
  try {
    const r=await fetch('https://freeforexapi.com/api/live?pairs=XAUUSD',
      {signal:AbortSignal.timeout(4000)});
    if (r.ok) {
      const d=await r.json();
      const p=parseFloat(d?.rates?.XAUUSD?.rate);
      if (p>1000) { onNewPrice(p,'freeforexapi'); return; }
    }
  } catch(e){}

  // 4. CoinCap REST (gold)
  try {
    const r=await fetch('https://api.coincap.io/v2/assets/gold',
      {signal:AbortSignal.timeout(4000)});
    if (r.ok) {
      const d=await r.json();
      const p=parseFloat(d?.data?.priceUsd);
      if (p>1000) { onNewPrice(p,'coincap'); return; }
    }
  } catch(e){}

  // 5. All failed — simulate drift around last known price
  if (!_priceOk) {
    _priceOk=false;
    if (_simPrice===null) _simPrice=3300+Math.random()*50-25;
    _simPrice=Math.max(2000,_simPrice+(Math.random()-0.49)*1.2);
    onNewPrice(parseFloat(_simPrice.toFixed(2)),'SIM');
  }
}

let _lastUpdate=0;
function onNewPrice(price, src) {
  if (price<100||price>10000) return; // sanity check XAUUSD range
  _priceOk=(src!=='SIM');
  recordTick(price, src);

  // Update header
  const el=document.getElementById('livePrice');
  const prev=window._prevTickPrice||price;
  const chg=price-prev;
  el.textContent=price.toFixed(2);
  el.style.color=chg>0?'var(--green)':chg<0?'var(--red)':'var(--gold)';
  el.classList.remove('flash-price'); void el.offsetWidth; el.classList.add('flash-price');
  document.getElementById('priceMeta').textContent=
    (chg>=0?'▲ +':'▼ ')+Math.abs(chg).toFixed(2)+'  XAU/USD · '+src;

  // Throttle full analysis to every 6s
  const now=Date.now();
  if (now-_lastUpdate>6000) { _lastUpdate=now; updateAll(); }
}

// ── INIT ──
window.addEventListener('DOMContentLoaded',()=>{
  // Seed synthetic tick history so analysis works immediately
  let seed=3305+Math.random()*30-15;
  _simPrice=seed;
  const now=Date.now();
  for (let i=180;i>=0;i--) {
    const bias=(Math.random()-0.49)*0.06;
    seed=Math.max(2000,seed+(Math.random()-0.5+bias)*1.8);
    window._priceHistory.push({t:now-i*1500,p:parseFloat(seed.toFixed(2))});
  }
  window._lastKnownPrice=seed;
  _simPrice=seed;
  document.getElementById('tickCount').textContent=window._priceHistory.length.toLocaleString('el-GR');

  // Immediate render
  updateAll();

  // Start price fetching
  fetchGoldPrice();
  setInterval(fetchGoldPrice,4000); // poll every 4s

  // Force full redraw every 12s regardless
  setInterval(updateAll,12000);
});
</script>
