<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>XAUUSD Smart Money Dashboard</title>

<style>

body{
background:#0b0f19;
color:white;
font-family:Arial;
text-align:center;
}

#signals{
font-size:20px;
margin-top:20px;
}

.card{
background:#121a2b;
padding:15px;
margin:10px;
border-radius:8px;
display:inline-block;
min-width:200px;
}

.green{color:#00ff9c}
.red{color:#ff4d4d}
.yellow{color:#ffd000}

</style>

</head>

<body>

<h1>XAUUSD Smart Money Dashboard</h1>

<div class="card">
Price
<div id="price">loading</div>
</div>

<div class="card">
Volume Signal
<div id="volumeSignal">-</div>
</div>

<div class="card">
Breakout
<div id="breakoutSignal">-</div>
</div>

<div class="card">
Liquidity Sweep
<div id="liquiditySignal">-</div>
</div>

<div id="signals"></div>

<script>

const API_KEY="f698ff917a974f4592722d2bc6a6f016"

let candles=[]

async function loadCandles(){

const url=`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=1min&outputsize=5000&apikey=${API_KEY}`

const r=await fetch(url)
const data=await r.json()

if(!data.values) return

candles=data.values.map(c=>({
time:new Date(c.datetime).getTime(),
open:parseFloat(c.open),
high:parseFloat(c.high),
low:parseFloat(c.low),
close:parseFloat(c.close),
volume:parseFloat(c.volume||0)
})).reverse()

updateDashboard()

}

function volumeSpike(){

let last=candles[candles.length-1]

let avg=0

for(let i=candles.length-30;i<candles.length;i++){

avg+=candles[i].volume

}

avg/=30

if(last.volume>avg*2){

return "VOLUME SPIKE"

}

return "NORMAL"

}

function breakout(){

let last=candles[candles.length-1]

let highs=candles.slice(-20).map(c=>c.high)
let lows=candles.slice(-20).map(c=>c.low)

let resistance=Math.max(...highs)
let support=Math.min(...lows)

if(last.close>resistance){

return "BREAKOUT UP"

}

if(last.close<support){

return "BREAKOUT DOWN"

}

return "NO BREAKOUT"

}

function liquiditySweep(){

let last=candles[candles.length-1]
let prev=candles[candles.length-2]

if(last.high>prev.high && last.close<prev.high){

return "BUY LIQUIDITY SWEPT"

}

if(last.low<prev.low && last.close>prev.low){

return "SELL LIQUIDITY SWEPT"

}

return "NONE"

}

function updateDashboard(){

let last=candles[candles.length-1]

document.getElementById("price").innerText=last.close

document.getElementById("volumeSignal").innerText=volumeSpike()

document.getElementById("breakoutSignal").innerText=breakout()

document.getElementById("liquiditySignal").innerText=liquiditySweep()

}

loadCandles()

setInterval(loadCandles,60000)

</script>

</body>
</html>
