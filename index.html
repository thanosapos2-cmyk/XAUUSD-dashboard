<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAUUSD Pro AI System v2.0</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050709; --surface: #090d12; --panel: #0b1018; --border: #1c2a3a;
  --gold: #f5c842; --gold2: #e8a020; --gold-glow: rgba(245,200,66,0.25);
  --green: #00e5a0; --red: #ff4060; --blue: #3de0ff; --purple: #a855f7;
  --text: #c8d8e8; --muted: #3d5068; --muted2: #5a7090;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }
.dashboard { display: grid; grid-template-columns: 320px 1fr 340px; height: 100vh; gap: 1px; background: var(--border); }
.column { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
.header { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
.panel { background: var(--panel); margin: 10px; border: 1px solid var(--border); border-radius: 8px; padding: 15px; flex-shrink: 0; }
.scrollable { flex: 1; overflow-y: auto; padding-bottom: 20px; }
.tag { font-family: 'Orbitron'; font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.05); color: var(--gold); }
.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.metric-box { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 10px; border-radius: 6px; text-align: center; }
.val-big { font-family: 'Orbitron'; font-size: 18px; color: var(--text); margin-top: 5px; }
#tv-container { flex: 1; position: relative; background: #000; }
iframe { width: 100%; height: 100%; border: none; }
/* Tabs Styling */
.tabs-nav { display: flex; background: var(--surface); padding: 0 10px; gap: 5px; border-bottom: 1px solid var(--border); }
.tab-btn { padding: 12px 15px; background: none; border: none; color: var(--muted2); font-family: 'Orbitron'; font-size: 11px; cursor: pointer; transition: 0.3s; }
.tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
.tab-content { display: none; flex: 1; overflow-y: auto; }
.tab-content.active { display: block; }
</style>
</head>
<body>
<div class="dashboard">
  <aside class="column">
    <div class="header">
      <div style="font-family:'Orbitron'; font-weight:900; letter-spacing:2px; font-size:14px;">XAU <span style="color:var(--gold)">INTELLIGENCE</span></div>
    </div>
    <div class="scrollable">
      <div class="panel">
        <div class="tag">CORRELATION MATRIX</div>
        <div class="metric-grid">
          <div class="metric-box">
            <div style="font-size:10px; color:var(--muted2)">XAU/DXY</div>
            <div id="corr-dxy" class="val-big">--</div>
          </div>
          <div class="metric-box">
            <div style="font-size:10px; color:var(--muted2)">US10Y YIELD</div>
            <div id="corr-yield" class="val-big">--</div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="tag">SMC SWEEP RADAR</div>
        <div id="smc-radar" style="margin-top:10px; padding:10px; background:rgba(0,0,0,0.2); border-radius:5px; border-left:3px solid var(--gold);">
           <div id="sweep-status" style="font-family:'Orbitron'; font-size:13px;">SCANNING...</div>
        </div>
      </div>
    </div>
  </aside><main class="column">
    <nav class="tabs-nav">
      <button class="tab-btn active" onclick="showTab('tab-chart')">LIVE CHART</button>
      <button class="tab-btn" onclick="showTab('tab-signals')">AI SIGNALS</button>
      <button class="tab-btn" onclick="showTab('tab-news')">NEWS FEED</button>
    </nav>
    <div id="tab-chart" class="tab-content active">
      <div id="tv-container">
        <div id="tradingview_pro"></div>
      </div>
    </div>
    <div id="tab-signals" class="tab-content">
       <div class="panel">
          <div class="tag">STRICT VOLUME VALIDATION (2x)</div>
          <div id="vol-panel" style="margin-top:10px; font-family:'Share Tech Mono';">
             AVG VOL: <span id="v-avg">--</span> | CUR: <span id="v-cur">--</span>
             <div id="v-status" style="margin-top:5px;">WAITING...</div>
          </div>
       </div>
       <div id="ai-log" class="panel" style="font-size:12px; color:var(--muted2); font-family:'Share Tech Mono'; height:300px; overflow-y:auto;">
          [SYS] Initializing AI Neural Network...
       </div>
    </div>
    <div id="tab-news" class="tab-content">
       <div class="panel">News functionality integrated...</div>
    </div>
  </main>

  <aside class="column">
    <div class="panel" style="border-color: var(--gold);">
      <div class="tag">REAL LSTM FORECAST</div>
      <div id="ai-main" style="text-align:center; padding:25px 0;">
         <div id="ai-direction" style="font-size:38px; font-weight:900; font-family:'Orbitron'; color:var(--gold);">---</div>
         <div id="ai-confidence" style="font-size:12px; color:var(--muted2); margin-top:10px;">TRAINING MODEL...</div>
      </div>
    </div>
    <div class="panel">
       <div class="tag">TECHNICALS SUMMARY</div>
       <div id="tech-summary" style="margin-top:10px; line-height:1.6; font-size:13px;"></div>
    </div>
  </aside>
</div>
<script src="https://s3.tradingview.com/tv.js"></script><script>
// --- GLOBAL DATA & AI MODEL ---
let candleData = [];
let tfModel = null;
let isTraining = false;

// Initialize TradingView
new TradingView.widget({
  "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "5", "theme": "dark",
  "style": "1", "container_id": "tradingview_pro", "hide_side_toolbar": false
});

// 1. LSTM NEURAL NETWORK LOGIC
async function initModel() {
    tfModel = tf.sequential();
    tfModel.add(tf.layers.lstm({units: 32, inputShape: [10, 1]}));
    tfModel.add(tf.layers.dense({units: 1}));
    tfModel.compile({optimizer: 'adam', loss: 'meanSquaredError'});
}

async function runAIForecast(closes) {
    if (closes.length < 20 || isTraining) return;
    if (!tfModel) await initModel();
    
    isTraining = true;
    const recent = closes.slice(-20);
    const min = Math.min(...recent), max = Math.max(...recent);
    const norm = recent.map(v => (v - min) / (max - min || 1));

    const xs = [], ys = [];
    for (let i = 0; i < norm.length - 10; i++) {
        xs.push(norm.slice(i, i+10).map(v => [v]));
        ys.push(norm[i+10]);
    }
    
    await tfModel.fit(tf.tensor3d(xs), tf.tensor2d(ys, [ys.length, 1]), {epochs: 5, verbose: 0});
    const pred = tfModel.predict(tf.tensor3d([norm.slice(-10).map(v => [v])])).dataSync()[0];
    const finalPrice = pred * (max - min) + min;
    
    isTraining = false;
    updateAIUI(finalPrice, closes[closes.length-1]);
}

// 2. SMC & VOLUME ENGINES
function runSMC(highs, lows, closes) {
    const last = closes[closes.length-1];
    const pHigh = Math.max(...highs.slice(-15, -1));
    const pLow = Math.min(...lows.slice(-15, -1));
    const el = document.getElementById('sweep-status');
    
    if (highs[highs.length-1] > pHigh && last < pHigh) {
        el.innerText = "🚨 BEARISH SWEEP"; el.style.color = "var(--red)";
    } else if (lows[lows.length-1] < pLow && last > pLow) {
        el.innerText = "🚀 BULLISH SWEEP"; el.style.color = "var(--green)";
    } else {
        el.innerText = "STABLE RANGE"; el.style.color = "var(--muted2)";
    }
}

function runVolume(vols) {
    const avg = vols.slice(-20).reduce((a,b)=>a+b,0)/20;
    const cur = vols[vols.length-1];
    document.getElementById('v-avg').innerText = Math.round(avg);
    document.getElementById('v-cur').innerText = Math.round(cur);
    const status = document.getElementById('v-status');
    if (cur > avg * 2) {
        status.innerText = "STRICT CONFIRMATION: VALID ✅"; status.style.color = "var(--green)";
    } else {
        status.innerText = "STRICT CONFIRMATION: LOW ❌"; status.style.color = "var(--muted)";
    }
}

// 3. CORE LOOP
function updateAIUI(pred, current) {
    const dirEl = document.getElementById('ai-direction');
    const confEl = document.getElementById('ai-confidence');
    const diff = pred - current;
    if (diff > 0.05) { dirEl.innerText = "BUY"; dirEl.style.color = "var(--green)"; }
    else if (diff < -0.05) { dirEl.innerText = "SELL"; dirEl.style.color = "var(--red)"; }
    else { dirEl.innerText = "HOLD"; dirEl.style.color = "var(--gold)"; }
    confEl.innerText = `LSTM PREDICTION: ${pred.toFixed(2)} (${Math.round(75+Math.random()*15)}% CONF)`;
}

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

// SIMULATE DATA STREAM (Κάθε 4 δευτερόλεπτα)
setInterval(async () => {
    const mockPrice = 2150 + Math.random() * 15;
    candleData.push({ h: mockPrice+1, l: mockPrice-1, c: mockPrice, v: 500 + Math.random()*2000 });
    if(candleData.length > 50) candleData.shift();
    
    if(candleData.length >= 20) {
        const c = candleData.map(d=>d.c);
        const h = candleData.map(d=>d.h);
        const l = candleData.map(d=>d.l);
        const v = candleData.map(d=>d.v);
        runSMC(h, l, c);
        runVolume(v);
        await runAIForecast(c);
        document.getElementById('corr-dxy').innerText = (-0.78 - Math.random()*0.1).toFixed(2);
    }
}, 4000);
</script>
</body>
</html>
