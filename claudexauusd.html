<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAUUSD PRO FIXED</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#050709;
  --panel:#0b1018;
  --border:#1c2a3a;
  --gold:#f5c842;
  --green:#00e5a0;
  --red:#ff4060;
  --text:#c8d8e8;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Share Tech Mono', monospace;
}

/* HEADER */
.header{
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid var(--border);
}

.logo{
  font-family:'Orbitron';
  color:var(--gold);
}

/* PRICE */
.price-box{
  text-align:center;
  margin:30px;
}

.price{
  font-size:40px;
  font-family:'Orbitron';
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  padding:10px;
}

.tab{
  padding:10px 15px;
  background:#111;
  cursor:pointer;
}

/* PANEL */
.panel{
  padding:20px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">XAUUSD PRO</div>
  <div id="data-status">LOADING...</div>
</div>

<div class="price-box">
  <div class="price" id="price">--</div>
</div>

<div class="tabs">
  <div class="tab" onclick="showTab('main')">MAIN</div>
</div>

<div id="main" class="panel">
  Running...
</div>

<script>

/* =========================
   🔒 TICKS (ΔΕΝ ΠΕΙΡΑΖΕΤΑΙ)
========================= */

if (!window.ticks) {
  window.ticks = JSON.parse(localStorage.getItem("ticks") || "[]");
}

/* =========================
   📡 PRICE FETCH (FIXED)
========================= */

let lastUpdate = Date.now();
let currentPrice = 0;

async function getPrice(){

  try{
    const url = `https://api.gold-api.com/price/XAUUSD?t=${Date.now()}`;

    const res = await fetch(url,{
      cache:"no-store"
    });

    const data = await res.json();

    if(!data.price) return;

    let newPrice = data.price;

    /* smoothing */
    if(currentPrice){
      newPrice = (newPrice*0.7)+(currentPrice*0.3);
    }

    currentPrice = newPrice;

    document.getElementById("price").textContent = newPrice.toFixed(2);

    /* save tick χωρίς reset */
    window.ticks.push({
      price:newPrice,
      time:Date.now()
    });

    localStorage.setItem("ticks", JSON.stringify(window.ticks));

    lastUpdate = Date.now();

  }catch(e){
    console.log("error",e);
  }
}

/* =========================
   🔁 UPDATE LOOP
========================= */

setInterval(getPrice,1000);

/* =========================
   🟢 STATUS
========================= */

setInterval(()=>{
  const diff = Date.now()-lastUpdate;

  document.getElementById("data-status").textContent =
    diff < 5000 ? "LIVE" : "DELAY";

},1000);

/* =========================
   📂 TABS
========================= */

function showTab(id){
  document.querySelectorAll('.panel').forEach(p=>p.style.display='none');
  document.getElementById(id).style.display='block';
}

/* INIT */
getPrice();

</script>

</body>
</html>
